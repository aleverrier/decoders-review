  <script>
    const data = [{"abstract": "The preparation of a quantum state using a noisy quantum computer (gate noise strength $δ$), will necessarily affect an O($δ$)-fraction of the qubits, no matter which protocol is used. Here, we show that fault-tolerant quantum state preparation can be achieved with constant space overhead improving on previous constructions requiring polylogarithmic overhead. To achieve this, we add to the toolbox of fault-tolerant schemes for circuits with quantum input and output. More specifically, we construct fault-tolerant interfaces that decrease the level of protection for quantum low-density parity-check (LDPC) codes. When information is encoded in multiple code blocks, our interfaces have constant space overhead. In our decoder construction that change the level of protection by an arbitrary amount, we circumvent bottlenecks to error pileup and overhead by gradual lowering of the level of encoding at the same time as we increase the number of blocks on which decoding is carried out simultaneously.", "arxiv_id": "2602.16948", "arxiv_version": "v1", "authors": ["Matthias Christandl", "Omar Fawzi", "Ashutosh Goswami"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "655edf5a562866dbe7be423f97acf1f461967e245d1ad668819b980477f87681", "last_processed_at": "2026-02-21T13:36:28.778799+00:00", "links": {"abs_url": "https://arxiv.org/abs/2602.16948v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2602.16948v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "f764778a747e04bd78cce7d7f73dcd9abbead2fa9532766f94c68ecf01e7060b", "submitted_date": "2026-02-18", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Fault-tolerant interfaces for quantum LDPC codes", "updated_date": "2026-02-18"}, {"abstract": "Optimal constructions of classical LDPC codes can be obtained by choosing the Tanner graph uniformly at random among biregular graphs. We introduce a class of codes that we call ``diffusion codes&#x27;&#x27;, defined by placing each edge connecting bits and checks on some graph, and acting on that graph with a random SWAP network. By tuning the depth of the SWAP network, we can tune a tradeoff between the amount of randomness -- and hence the optimality of code parameters -- and locality with respect to the underlying graph. For diffusion codes defined on the cycle graph, if the SWAP network has depth $\\sim Tn$ with $T&gt; n^{2β}$ for arbitrary $β&gt;0$, then we prove that almost surely the Tanner graph is a lossless ``smaller set&#x27;&#x27; vertex expander for small sets up size $δ\\sim \\sqrt T \\sim n^β$, with bounded bit and check degree. At the same time, the geometric size of the largest stabilizer is bounded by $\\sqrt T$ in graph distance. We argue, based on physical intuition, that this result should hold more generally on arbitrary graphs. By taking hypergraph products of these classical codes we obtain quantum LDPC codes defined on the torus with smaller-set boundary and co-boundary expansion and the same expansion/locality tradeoffs as for the classical codes. These codes are self-correcting and admit single-shot decoding, while having the geometric size of the stabilizer growing as an arbitrarily small power law. Our proof technique establishes mixing of a random SWAP network on small subsystems at times scaling with only the subsystem size, which may be of independent interest.", "arxiv_id": "2510.07179", "arxiv_version": "v2", "authors": ["Adithya Sriram", "Vedika Khemani", "Benedikt Placke"], "categories": ["quant-ph", "cond-mat.dis-nn", "cond-mat.stat-mech", "cs.IT", "math.CO"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "431912174070b9555ba08241edc4925f45d339b87a54cd7fe6af805cf47d1129", "last_processed_at": "2026-02-21T13:36:29.974158+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.07179v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.07179v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "3b08a01534f137f1c7fc48da7f631c71d9a6d96073c556f4ac0e0955cf8b376f", "submitted_date": "2025-10-08", "tags": ["cond-mat.dis-nn", "cond-mat.stat-mech", "cs.IT", "decoding", "hypergraph product", "math.CO", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Diffusion Codes: Self-Correction from Small(er)-Set Expansion with Tunable Non-locality", "updated_date": "2026-02-18"}, {"abstract": "Quantum low-density parity-check (QLDPC) codes are a leading approach to quantum error correction, yet conventional belief propagation (BP) decoders often perform poorly, primarily due to non-convergence exacerbated by stabilizer constraints, which induce short cycles and degeneracy. We propose two scheduling variants, sequential check node scheduling (SCNS) and sequential variable node scheduling (SVNS), that improve BP&#x27;s error-correction ability by processing check nodes (CNs) or variable nodes (VNs), respectively, in a fixed order, stabilizing message updates and reducing stalls. We also employ this technique to an improved BP-variant called BP guided decimation (BPGD), where symbols are progressively fixed during decoding iterations. Here, we demonstrate that the sequential BPGD (SBPGD) decoder can further improve the convergence properties and performance of the decoder. On standard QLDPC benchmarks under a Pauli-X noise model, our sequential schedules are shown to lower the block error rate relative to conventional BP, and SBPGD outperforms BPGD while using significantly fewer decimation rounds, translating to lower computational cost. These results demonstrate that changing the update schedule, without altering the code, can improve both the reliability and efficiency of BP-based decoding for QLDPC codes. For the [[1922,50,16]] C2 hypergraph-product code with independent X errors, SVNS-BP surpasses BP-OSD-0 in error correction at roughly the same complexity as standard BP.", "arxiv_id": "2602.13420", "arxiv_version": "v1", "authors": ["Mohsen Moradi", "Salman Habib", "Vahid Nourozi", "David G. M. Mitchell"], "categories": ["cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "ca9a7b618fb18a90fdebbc5d08d473e692ea7f81d3e14f8a2bdf176e249d4b71", "last_processed_at": "2026-02-21T13:36:30.238825+00:00", "links": {"abs_url": "https://arxiv.org/abs/2602.13420v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2602.13420v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "ef1da5a3e2936d41408218578817c6aff6b0c89d4522f9f811fe7b0ee739f09e", "submitted_date": "2026-02-13", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "relevance:maybe"], "title": "Sequential BP-based Decoding of QLDPC Codes", "updated_date": "2026-02-13"}, {"abstract": "This work presents a hardware-efficient and fully parallelizable decoder for quantum LDPC codes that leverages belief propagation (BP) with a speculative post-processing strategy inspired by classical Chase decoding algorithm. By monitoring bit-level oscillation patterns during BP, our method identifies unreliable bits and generates multiple candidate vectors to selectively flip syndromes. Each modified syndrome is then decoded independently using short-depth BP, a process we refer to as BP-SF (syndrome flip). This design eliminates the need for costly Gaussian elimination used in the current BP-OSD approaches. Our implementation achieves logical error rates comparable to or better than BP-OSD while offering significantly lower latency due to its high degree of parallelism for a variety of bivariate bicycle codes. Evaluation on the [[144,12,12]] bivariate bicycle code shows that the proposed decoder reduces average latency to approximately $70\\%$ of BP-OSD. When post-processing is parallelized the average latency is reduced by $55\\%$ compared to the single process implementation, with the maximum latency reaching as low as $18\\%$. These advantages make it particularly well-suited for real-time and resource-constrained quantum error correction systems.", "arxiv_id": "2507.00254", "arxiv_version": "v3", "authors": ["Ming Wang", "Ang Li", "Frank Mueller"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "818c2fb83c7c2fb05b9f7782ece22e59523a809ca46113588360cde3fa18a8cc", "last_processed_at": "2026-02-21T13:36:32.852230+00:00", "links": {"abs_url": "https://arxiv.org/abs/2507.00254v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2507.00254v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "89442873cbda85223d5e8403dfbc5522eb4ad9fd691f7b740c058b24f540ce3e", "submitted_date": "2025-06-30", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Fully Parallelized BP Decoding for Quantum LDPC Codes Can Outperform BP-OSD", "updated_date": "2026-02-10"}, {"abstract": "Erasure qubits reduce overhead in fault-tolerant quantum error correction (QEC) by converting dominant faults into detectable errors known as erasures. They have demonstrated notable improvements in thresholds and scaling in surface and Floquet code memories. In this work, we use erasure qubits on Bivariate Bicycle (BB) codes from the quantum low-density parity-check (QLDPC) regime. Owing to their sparse structure and favorable rate-distance trade-offs, BB codes are practical candidates for QEC. We introduce BiBiEQ, a novel framework that compiles a given BB code into an erasure-aware memory circuit C_E. This erasure circuit C_E comprises erasure checks (ECs), resets, and erasures spread over a user-specified erasure check schedule (2EC, 4EC). BiBiEQ converts this erasure circuit C_E into the stabilizer circuit C for general-purpose decoding. BiBiEQ provides two engines for this conversion, BiBiEQ-Exact and BiBiEQ-Approx. BiBiEQ-Exact preserves the joint-erasure correlations and serves as our accuracy benchmark, while BiBiEQ-Approx uses an independence approximation to accelerate large sweeps and expose accuracy-throughput trade-offs. Using BiBiEQ, we decode the stabilizer circuits to get a per-round logical error rate (LER) for the BB codes and quantify the effect of the EC schedules on the correctable operating region below the pseudo-threshold. The 4EC schedule keeps the accuracy of both engines close to one another, making BiBiEQ-Approx a reliable proxy for BiBiEQ-Exact for faster sweeps. Below the pseudo-threshold, the code distance (d) hop from distance (d) 6 to 10 yields a drop in LER by 10-17x larger than distance (d) 10 to 12, showing that most gains are realized by d=10.", "arxiv_id": "2602.07578", "arxiv_version": "v1", "authors": ["Ameya S. Bhave", "Navnil Choudhury", "Andrew Nemec", "Kanad Basu"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b09972c96bb956a48e68b023e5a3ab28df24dcc3550ac9c91c4c194c0793537c", "last_processed_at": "2026-02-21T13:36:35.421433+00:00", "links": {"abs_url": "https://arxiv.org/abs/2602.07578v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2602.07578v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "691f4ac4e9ecf39fac61e5fa2468f23e07df31bda9510c888e423c12abd88c5b", "submitted_date": "2026-02-07", "tags": ["decoding", "quant-ph", "relevance:maybe"], "title": "BiBiEQ: Bivariate Bicycle Codes on Erasure Qubits", "updated_date": "2026-02-07"}, {"abstract": "While quantum low-density parity check (qLDPC) codes are a low-overhead means of quantum information storage, it is valuable for quantum codes to possess fault-tolerant features beyond this resource efficiency. In this work, we introduce trivariate tricycle (TT) codes, qLDPC codes that combine several desirable features: high thresholds under a circuit-level noise model, partial single-shot decodability for low-time-overhead decoding, a large set of transversal Clifford gates and automorphisms within and between code blocks, and (for several sub-constructions) constant-depth implementations of a (non-Clifford) $CCZ$ gate. TT codes are CSS codes based on a length-3 chain complex, and are defined from three trivariate polynomials, with the 3D toric code (3DTC) belonging to this construction. We numerically search for TT codes and find several candidates with improved parameters relative to the 3DTC, using up to 48$\\times$ fewer data qubits as equivalent 3DTC encodings. We construct syndrome-extraction circuits for these codes and numerically demonstrate single-shot decoding in the X error channel in both phenomenological and circuit-level noise models. Under circuit-level noise, TT codes have a threshold of $0.3\\%$ in the Z error channel and $1\\%$ in the X error channel (with single-shot decoding). All TT codes possess several transversal $CZ$ gates that can partially address logical qubits between two code blocks. Additionally, the codes possess a large set of automorphisms that can perform Clifford gates within a code block. Finally, we establish several TT code polynomial constructions that allows for a constant-depth implementation of logical $CCZ$ gates. We find examples of error-correcting and error-detecting codes using these constructions whose parameters out-perform those of the 3DTC, using up to $4\\times$ fewer data qubits for equivalent-distance 3DTC encodings.", "arxiv_id": "2508.08191", "arxiv_version": "v2", "authors": ["Abraham Jacob", "Campbell McLauchlan", "Dan E. Browne"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0c62f34269f63050db28fd9955791a5dc452b14fb20bee930a3e2e75537384c2", "last_processed_at": "2026-02-21T13:36:36.450640+00:00", "links": {"abs_url": "https://arxiv.org/abs/2508.08191v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2508.08191v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "42352192598e680ec587012d5658d92ff05b26d6ebb6c7733843d476b632a147", "submitted_date": "2025-08-11", "tags": ["decoding", "quant-ph", "relevance:maybe"], "title": "Single-Shot Decoding and Fault-tolerant Gates with Trivariate Tricycle Codes", "updated_date": "2026-01-29"}, {"abstract": "Quantum error-correcting codes protect fragile quantum information by encoding it redundantly, but identifying codes that perform well in practice with minimal overhead remains difficult due to the combinatorial search space and the high cost of logical error rate evaluation. We propose a Bayesian optimization framework to discover quantum error-correcting codes that improves data efficiency and scalability with respect to previous machine learning approaches to this task. Our main contribution is a multi-view chain-complex neural embedding that allows us to predict the logical error rate of quantum LDPC codes without performing expensive simulations. Using bivariate bicycle codes and code capacity noise as a testbed, our algorithm discovers a high-rate code [[144,36]] that achieves competitive per-qubit error rate compared to the gross code, as well as a low-error code [[144,16]] that outperforms the gross code in terms of error rate per qubit. These results highlight the ability of our pipeline to automatically discover codes balancing rate and noise suppression, while the generality of the framework enables application across diverse code families, decoders, and noise models.", "arxiv_id": "2601.18562", "arxiv_version": "v1", "authors": ["Yihua Chengyu", "Richard Meister", "Conor Carty", "Sheng-Ku Lin", "Roberto Bondesan"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "75a1d59ef62c0f75caafe618c84c0ec5698ac59438fdaad08917ea72af8dae6f", "last_processed_at": "2026-02-21T13:36:38.162855+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.18562v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.18562v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "b604ca743dd1baccbace8646d3d3c2c5d6dd55862e7d32b7311c8367ce84040e", "submitted_date": "2026-01-26", "tags": ["decoder", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Bayesian Optimization for Quantum Error-Correcting Code Discovery", "updated_date": "2026-01-26"}, {"abstract": "In this paper, we present an efficient algorithm to sample random sparse matrices to be used as check matrices for quantum Low-Density Parity-Check (LDPC) codes. To ease the treatment, we mainly describe our algorithm as a technique to sample a dual-containing binary LDPC code, hence, a sparse matrix $\\mathbf H\\in\\mathbb F_2^{r\\times n}$ such that $\\mathbf H\\mathbf H^\\top = \\mathbf 0$. However, as we show, the algorithm can be easily generalized to sample dual-containing LDPC codes over non binary finite fields as well as more general quantum stabilizer LDPC codes. While several constructions already exist, all of them are somewhat algebraic as they impose some specific property (e.g., the matrix being quasi-cyclic). Instead, our algorithm is purely combinatorial as we do not require anything apart from the rows of $\\mathbf H$ being sparse enough. In this sense, we can think of our algorithm as a way to sample sparse, self-orthogonal matrices that are as random as possible. Our algorithm is conceptually very simple and, as a key ingredient, uses Information Set Decoding (ISD) to sample the rows of $\\mathbf H$, one at a time. The use of ISD is fundamental as, without it, efficient sampling would not be feasible. We give a theoretical characterization of our algorithm, determining which ranges of parameters can be sampled as well as the expected computational complexity. Numerical simulations and benchmarks confirm the feasibility and efficiency of our approach.", "arxiv_id": "2601.08387", "arxiv_version": "v2", "authors": ["Paolo Santini"], "categories": ["cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "4d9d2e908551b51203d0ab78eee09e45e5307f9be05a5398953aab117e9ce995", "last_processed_at": "2026-02-21T13:36:38.587668+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.08387v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.08387v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "358e3d2e520fe368692ab7c870a0c1df9ab3e34be08b7460f9cdf33302311636", "submitted_date": "2026-01-13", "tags": ["cs.IT", "decoding", "relevance:maybe"], "title": "An Efficient Algorithm to Sample Quantum Low-Density Parity-Check Codes", "updated_date": "2026-01-26"}, {"abstract": "Real-time decoding is crucial for fault-tolerant quantum computing but likely requires specialized hardware such as field-programmable gate arrays (FPGAs), whose parallelism can alter relative algorithmic performance. We analyze FPGA-tailored versions of three decoder classes for quantum low-density parity-check (qLDPC) codes: message passing, ordered statistics, and clustering. For message passing, we analyze the recently introduced Relay decoder and its FPGA implementation; for ordered statistics decoding (OSD), we introduce a filtered variant that concentrates computation on high-likelihood fault locations; and for clustering, we design an FPGA-adapted generalized union-find decoder. We design a systolic algorithm for Gaussian elimination on rank-deficient systems that runs in linear parallel time, enabling fast validity checks and local corrections in clustering and eliminating costly full-rank inversion in filtered-OSD. Despite these improvements, both remain far slower and less accurate than Relay, suggesting message passing is the most viable route to real-time qLDPC decoding.", "arxiv_id": "2511.21660", "arxiv_version": "v2", "authors": ["Satvik Maurya", "Thilo Maurer", "Markus Bühler", "Drew Vandeth", "Michael E. Beverland"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "de85c0cb1a2041e168a3ae08d1091dda1db8e672e5f6856b498c1154b7e534e3", "last_processed_at": "2026-02-21T13:36:40.881224+00:00", "links": {"abs_url": "https://arxiv.org/abs/2511.21660v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2511.21660v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "union-find"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "9e8cd8bacb2f1f4d01dffdb1e57ad9f277a164b89b4eb7804d2af60ad39404c3", "submitted_date": "2025-11-26", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe", "union-find"], "title": "FPGA-tailored algorithms for real-time decoding of quantum LDPC codes", "updated_date": "2026-01-26"}, {"abstract": "Post-selection strategies that discard low-confidence computational results can significantly improve the effective fidelity of quantum error correction at the cost of reduced acceptance rates, which can be particularly useful for offline resource state generation and other moderate-depth fault-tolerant circuits. Prior work has primarily relied on the \"logical gap\" metric with the minimum-weight perfect matching decoder, but this approach faces fundamental limitations including computational overhead that scales exponentially with the number of logical qubits and poor generalizability to arbitrary codes beyond surface codes. We develop post-selection strategies based on computationally efficient heuristic confidence metrics that leverage error cluster statistics (specifically, aggregated cluster sizes and log-likelihood ratios) from clustering-based decoders, which are applicable to arbitrary quantum low-density parity check (QLDPC) codes. We validate our method through extensive numerical simulations on surface codes, bivariate bicycle codes, and hypergraph product codes, demonstrating orders of magnitude reductions in logical error rates with moderate abort rates. For instance, applying our strategy to the [[144, 12, 12]] bivariate bicycle code achieves approximately three orders of magnitude reduction in the logical error rate with an abort rate of only 1% (19%) at a physical error rate of 0.1% (0.3%). Additionally, we integrate our approach with the sliding-window framework for real-time decoding, featuring early mid-circuit abort decisions that eliminate unnecessary overheads. Notably, its performance matches or even surpasses the original strategy for global decoding, while exhibiting favorable scaling in the number of rounds. Our approach provides a practical foundation for efficient post-selection in fault-tolerant quantum computing with QLDPC codes.", "arxiv_id": "2510.05795", "arxiv_version": "v4", "authors": ["Seok-Hyung Lee", "Lucas H. English", "Stephen D. Bartlett"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "8c4c5e30d7d02ac907adc231f78a7101c2c1056f29d05cdeb8185b52446aba66", "last_processed_at": "2026-02-21T13:36:43.447347+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.05795v4", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.05795v4"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "d1a0e08485e0073385d8b5068915753ecc7733952e37dc9b0f33e2d639726bf3", "submitted_date": "2025-10-07", "tags": ["decoder", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Efficient Post-Selection for General Quantum LDPC Codes", "updated_date": "2026-01-25"}, {"abstract": "In this work, we develop a reduced complexity maximum likelihood (ML) decoder for quantum low-density parity-check (QLDPC) codes over erasures. Our decoder combines classical inactivation decoding, which integrates peeling with symbolic guessing, with a new dual peeling procedure. In the dual peeling stage, we perform row operations on the stabilizer matrix to efficiently reveal stabilizer generators and their linear combinations whose support lies entirely on the erased set. Each such stabilizer identified allows us to freely fix a bit in its support without affecting the logical state of the decoded result. This removes one degree of freedom that would otherwise require a symbolic guess, reducing the number of inactivated variables and decreasing the size of the final linear system that must be solved. We further show that dual peeling combined with standard peeling alone, without inactivation, is sufficient to achieve ML for erasure decoding of surface codes. Simulations across several QLDPC code families confirm that our decoder matches ML logical failure performance while significantly reducing the complexity of inactivation decoding, including more than a 20% reduction in symbolic guesses for the B1 lifted product code at high erasure rates.", "arxiv_id": "2601.14236", "arxiv_version": "v1", "authors": ["Giulio Pech", "Mert Gökduman", "Hanwen Yao", "Henry D. Pfister"], "categories": ["cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "555d8a212464294a98907b61c64bc29f55a059fb4b12182d73ccb070e4f98096", "last_processed_at": "2026-02-21T13:36:43.761762+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.14236v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.14236v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "4f1739d2c22bfa2d2465542e0e0a1f3e5f43f07002dbd0fe211995e9ff9108b2", "submitted_date": "2026-01-20", "tags": ["cs.IT", "decoder", "decoding", "lifted product", "relevance:maybe"], "title": "Stabilizer-Assisted Inactivation Decoding of Quantum Error-Correcting Codes with Erasures", "updated_date": "2026-01-20"}, {"abstract": "Classical low-density parity-check (LDPC) codes are a widely deployed and well-established technology, forming the backbone of modern communication and storage systems. It is well known that, in this classical setting, increasing the girth of the Tanner graph while maintaining regular degree distributions leads simultaneously to good belief-propagation (BP) decoding performance and large minimum distance. In the quantum setting, however, this principle does not directly apply because quantum LDPC codes must satisfy additional orthogonality constraints between their parity-check matrices. When one enforces both orthogonality and regularity in a straightforward manner, the girth is typically reduced and the minimum distance becomes structurally upper bounded. In this work, we overcome this limitation by using permutation matrices with controlled commutativity and by restricting the orthogonality constraints to only the active part of the construction, while preserving regular check-matrix structures. This design circumvents conventional structural distance limitations induced by parent-matrix orthogonality, and enables the construction of quantum LDPC codes with large girth while avoiding latent low-weight logical operators. As a concrete demonstration, we construct a girth-8, (3,12)-regular $[[9216,4612, \\leq 48]]$ quantum LDPC code and show that, under BP decoding combined with a low-complexity post-processing algorithm, it achieves a frame error rate as low as $10^{-8}$ on the depolarizing channel with error probability $4 \\%$.", "arxiv_id": "2601.08824", "arxiv_version": "v3", "authors": ["Kenta Kasai"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "d1bd6935315d63bc3e328b5b0cc3b4ed4998862e1b880942a4e27d78ce75a517", "last_processed_at": "2026-02-21T13:36:44.218061+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.08824v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.08824v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "b9e398d8638363f4451d87c8e012f62c6692e59beadf72eee557ff73148b11f4", "submitted_date": "2026-01-13", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Breaking the Orthogonality Barrier in Quantum LDPC Codes", "updated_date": "2026-01-20"}, {"abstract": "We introduce a quantum Maxwell erasure decoder for CSS quantum low-density parity-check (qLDPC) codes that extends peeling with bounded guessing. Guesses are tracked symbolically and can be eliminated by restrictive checks, giving a tunable tradeoff between complexity and performance via a guessing budget: an unconstrained budget recovers Maximum-Likelihood (ML) performance, while a constant budget yields linear-time decoding and approximates ML. We provide theoretical guarantees on asymptotic performance and demonstrate strong performance on bivariate bicycle and quantum Tanner codes.", "arxiv_id": "2601.10713", "arxiv_version": "v1", "authors": ["Bruno Costa Alves Freire", "François-Marie Le Régent", "Anthony Leverrier"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "80b6304a4e94d94033d7c21b161be27c9a961c3c2a9cde16e3eec1b14c73ed8b", "last_processed_at": "2026-02-21T13:36:44.748869+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.10713v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.10713v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "c6845061250f951edfeaeab20b87eeb3660e5a15251307b1d7677d2d7b4ba26a", "submitted_date": "2026-01-15", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Quantum Maxwell Erasure Decoder for qLDPC codes", "updated_date": "2026-01-15"}, {"abstract": "Quantum low-density parity-check (qLDPC) codes have emerged as a promising approach for realizing low-overhead logical quantum memories. Recent theoretical developments have established shift automorphisms as a fundamental building block for completing the universal set of logical gates for qLDPC codes. However, practical challenges remain because the existing SWAP-based shift automorphism yields logical error rates that are orders of magnitude higher than those for fault-tolerant idle operations. In this work, we address this issue by dynamically varying the syndrome measurement circuits to implement the shift automorphisms without reducing the circuit distance. We benchmark our approach on both twisted and untwisted weight-6 generalized toric codes, including the gross code family. Our time-dynamic circuits for shift automorphisms achieve performance comparable to the idle operations under the circuit-level noise model (SI1000). Specifically, the dynamic circuits achieve more than an order of magnitude reduction in logical error rates relative to the SWAP-based scheme for the gross code at a physical error rate of $10^{-3}$, employing the BP-OSD decoder. Our findings improve both the error resilience and the time overhead of the shift automorphisms in qLDPC codes. Furthermore, our work can lead to alternative syndrome extraction circuit designs, such as leakage removal protocols, providing a practical pathway to utilizing dynamic circuits that extend beyond surface codes towards qLDPC codes.", "arxiv_id": "2601.09911", "arxiv_version": "v1", "authors": ["Younghun Kim", "Spiro Gicev", "Martin Sevior", "Muhammad Usman"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "a1c6ca142280884ebb6326ea9443aeee750b62181f3d5fe5cb220916f72693d7", "last_processed_at": "2026-02-21T13:36:51.228470+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.09911v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.09911v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "c9a0d54bfdde98944b48d7613422b1ade6ea550c0430b9fc99b9ee09318a6dc6", "submitted_date": "2026-01-14", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Time-Dynamic Circuits for Fault-Tolerant Shift Automorphisms in Quantum LDPC Codes", "updated_date": "2026-01-14"}, {"abstract": "Quantum low-density parity-check (QLDPC) codes provide a practical balance between error-correction capability and implementation complexity in quantum error correction (QEC). In this paper, we propose an algebraic construction based on dyadic matrices for designing both classical and quantum LDPC codes. The method first generates classical binary quasi-dyadic LDPC codes whose Tanner graphs have girth 6. It is then extended to the Calderbank-Shor-Steane (CSS) framework, where the two component parity-check matrices are built to satisfy the compatibility condition required by the recently introduced CAMEL-ensemble quaternary belief propagation decoder. This compatibility condition ensures that all unavoidable cycles of length 4 are assembled in a single variable node, allowing the mitigation of their detrimental effects by decimating that variable node.", "arxiv_id": "2601.08636", "arxiv_version": "v1", "authors": ["Alessio Baldelli", "Massimo Battaglioni", "Jonathan Mandelbaum", "Sisi Miao", "Laurent Schmalen"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "81f747fde54e5fb174b52df0bd330dd2b07d48ea3580641fad158386d53f727b", "last_processed_at": "2026-02-21T13:36:51.512892+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.08636v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.08636v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "03bd06925134a298587fc2f67459810f28676587240019fff3face8a1fa2bbb6", "submitted_date": "2026-01-13", "tags": ["belief propagation", "cs.IT", "decoder", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Quantum CSS LDPC Codes based on Dyadic Matrices for Belief Propagation-based Decoding", "updated_date": "2026-01-13"}, {"abstract": "Recent research has shown that syndrome-based belief propagation using layered scheduling (sLBP) can not only accelerate the convergence rate but also improve the error rate performance by breaking the quantum trapping sets for quantum low-density parity-check (QLDPC) codes, showcasing a result distinct from classical error correction codes. In this paper, we consider edge-wise informed dynamic scheduling (IDS) for QLDPC codes based on syndrome-based residual belief propagation (sRBP). However, the construction of QLDPC codes and the identical prior intrinsic information assignment will result in an equal residual in many edges, causing a performance limitation for sRBP. Two heuristic strategies, including edge pool design and error pre-correction, are introduced to tackle this obstacle and quantum trapping sets. Then, a novel sRBP equipped with a predict-and-reduce-error mechanism (PRE-sRBP) is proposed, which can provide over one order of performance gain on the considered bicycle codes and symmetric hypergraph (HP) code under similar iterations compared to sLBP.", "arxiv_id": "2410.01197", "arxiv_version": "v2", "authors": ["Tzu-Hsuan Huang", "Yeong-Luh Ueng"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "e54d3453e80159819874337cc67ad39a938b6dd7c81adeffbd163b1e22e4423f", "last_processed_at": "2026-02-21T13:36:52.275668+00:00", "links": {"abs_url": "https://arxiv.org/abs/2410.01197v2", "code_repo_urls": [], "doi": "10.22331/q-2026-01-16-1967", "pdf_url": "https://arxiv.org/pdf/2410.01197v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "aaa6cc965e0214f9f2fb15eaf95a7a1ebe167e484e2f766968c1d21c71c05670", "submitted_date": "2024-10-02", "tags": ["belief propagation", "quant-ph", "relevance:maybe"], "title": "Informed Dynamic Scheduling for QLDPC Codes", "updated_date": "2026-01-11"}, {"abstract": "Bivariate bicycle (BB) codes are a prominent class of quantum LDPC codes constructed from group algebras. While the logical dimension and quantum distance of \\emph{coprime} BB codes are known to be determined by a greatest common divisor polynomial $g(z)$, the properties governing their fault tolerance under noisy measurement have remained implicit. In this work, we prove that this same polynomial $g(z)$ dictates the code&#x27;s stabilizer redundancy and the structure of the classical \\emph{syndrome codes} required for single-shot decoding. We derive a strict equality between the quantum rate and the stabilizer redundancy density, and we provide BCH-like bounds on the achievable single-shot measurement error tolerance. Guided by this framework, we construct small coprime BB codes with significantly improved syndrome distance ($d_S$) and evaluate them using BP+OSD. Our analysis reveals a structural bottleneck: within the coprime BB ansatz, high quantum rate imposes an upper bound on syndrome distance, limiting single-shot performance. These results provide concrete algebraic design rules for next-generation 2BGA codes in measurement-limited architectures.", "arxiv_id": "2601.01137", "arxiv_version": "v1", "authors": ["Mohammad Rowshan"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0f7c2f5aa75212b959f4fa0cd5d8584fd66e96a70c3b0384513e5c207d503e5e", "last_processed_at": "2026-02-21T13:36:52.707998+00:00", "links": {"abs_url": "https://arxiv.org/abs/2601.01137v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2601.01137v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "d5e5822e7829bc3f5a45a8653afcbcc7ac457ba76bcb5886180883a250dd4ed3", "submitted_date": "2026-01-03", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Single-Shot and Few-Shot Decoding via Stabilizer Redundancy in Bivariate Bicycle Codes", "updated_date": "2026-01-03"}, {"abstract": "Quantum LDPC codes have attracted intense interest due to their advantageous properties for realizing efficient fault-tolerant quantum computing. In particular, sheaf codes represent a novel framework that encompasses all well-known good qLDPC codes with profound underlying mathematics. In this work, we generalize Poincaré duality from manifolds to both classical and quantum codes defined via sheaf theory on $t$-dimensional cell complexes. Viewing important code properties including the encoding rate, code distance, local testability soundness, and efficient decoders as parameters of the underlying (co)chain complexes, we rigorously prove a duality relationship between the $i$-th chain and the $(t-i)$-th cochain of sheaf codes. We further build multiplicative structures such as cup and cap products on sheaved chain complexes, inspired by the standard notions of multiplicative structures and Poincaré duality on manifolds. This immediately leads to an explicit isomorphism between (co)homology groups of sheaf codes via a cap product. As an application, we obtain transversal disjoint logical $\\mathrm{C}Z$ gates with $k_{\\mathrm{C}Z}=Θ(n)$ on families of good qLDPC and almost-good quantum locally testable codes. Moreover, we provide multiple new methods to construct transversal circuits composed of $\\mathrm{C}\\mathrm{C}Z$ gates as well as for higher order controlled-$Z$ that are provably logical operations on the code space. We conjecture that they generate nontrivial logical actions, pointing towards fault-tolerant non-Clifford gates on nearly optimal qLDPC sheaf codes. Mathematically, our results are built on establishing the equivalence between sheaf cohomology in the derived-functor sense, Čech cohomology, and the cohomology of sheaf codes, thereby introducing new mathematical tools into quantum coding theory.", "arxiv_id": "2512.21922", "arxiv_version": "v2", "authors": ["Yiming Li", "Zimu Li", "Zi-Wen Liu", "Quynh T. Nguyen"], "categories": ["quant-ph", "cs.CC", "cs.IT", "math-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "ebb12aeab9fcaec08b01e4bafb8ec5dee3bade09d5ebf6094ae6088cc96ff9c7", "last_processed_at": "2026-02-21T13:36:53.228401+00:00", "links": {"abs_url": "https://arxiv.org/abs/2512.21922v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2512.21922v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "205c7d1fb3c3285eb7b0b133b52c026a4570535e038d71c33cde8d5b7e989250", "submitted_date": "2025-12-26", "tags": ["cs.CC", "cs.IT", "decoder", "math-ph", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Poincaré Duality and Multiplicative Structures on Quantum Codes", "updated_date": "2025-12-30"}, {"abstract": "We propose an evolutionary belief propagation (EBP) decoder for quantum error correction, which incorporates trainable weights into the BP algorithm and optimizes them via the differential evolution algorithm. This approach enables end-to-end optimization of the EBP combined with ordered statistics decoding (OSD). Experimental results on surface codes and quantum low-density parity-check codes show that EBP+OSD achieves better decoding performance and lower computational complexity than BP+OSD, particularly under strict low latency constraints (within 5 BP iterations).", "arxiv_id": "2512.18273", "arxiv_version": "v1", "authors": ["Hee-Youl Kwak", "Seong-Joon Park", "Hyunwoo Jung", "Jeongseok Ha", "Jae-Won Kim"], "categories": ["quant-ph", "cs.AI"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "81220bac9cc9fc0bc96cafe8e450e0efbc65efbdf04356f14c9aae2128fc3786", "last_processed_at": "2026-02-21T13:36:54.082864+00:00", "links": {"abs_url": "https://arxiv.org/abs/2512.18273v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2512.18273v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5fcfdd8af00457eecb1d3382d598570811684f8b668594e1cbc0c218b48ca4ca", "submitted_date": "2025-12-20", "tags": ["belief propagation", "cs.AI", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Evolutionary BP+OSD Decoding for Low-Latency Quantum Error Correction", "updated_date": "2025-12-20"}, {"abstract": "(Abridged.) This thesis investigates scalable fault-tolerant quantum computation through the development of bosonic quantum codes, quantum LDPC codes, and decoding protocols that connect continuous-variable and discrete-variable error correction. We investigate superconducting microwave implementations of continuous-variable quantum computing, including the deterministic generation of cubic phase states, and introduce the dissipatively stabilized squeezed cat qubit, a noise-biased bosonic encoding with enhanced error suppression and faster gates. The performance of rotation-symmetric and GKP codes is analyzed under realistic noise and measurement models, revealing key trade-offs in measurement-based schemes. To integrate bosonic codes into larger architectures, we develop decoding methods that exploit analog syndrome information, enabling quasi-single-shot decoding in concatenated systems. On the discrete-variable side, we introduce localized statistics decoding, a highly parallelizable decoder for quantum LDPC codes, and propose quantum radial codes, a new family of single-shot LDPC codes with low overhead and strong circuit-level performance. Finally, we present fault complexes, a homological framework for analyzing faults in dynamic quantum error correction protocols. Extending the role of homology in static CSS codes, fault complexes provide a general language for the design and analysis of fault-tolerant schemes.", "arxiv_id": "2512.15063", "arxiv_version": "v1", "authors": ["Timo Hillmann"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "1016178fd6a9ffd4afd2e48b7a393487f63de64192d7c9bc928ad59a66437976", "last_processed_at": "2026-02-21T13:37:00.161344+00:00", "links": {"abs_url": "https://arxiv.org/abs/2512.15063v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2512.15063v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5aec537db4e50c199cb25103276c30b012d42d8e74bbcd76d8d9a7c298a1db7d", "submitted_date": "2025-12-17", "tags": ["decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Bosonic quantum computing with near-term devices and beyond", "updated_date": "2025-12-17"}, {"abstract": "We propose a decoder for quantum low density parity check (LDPC) codes based on a beam search heuristic guided by belief propagation (BP). Our beam search decoder applies to all quantum LDPC codes and achieves different speed-accuracy tradeoffs by tuning its parameters such as the beam width. We perform numerical simulations under circuit level noise for the $[[144, 12, 12]]$ bivariate bicycle (BB) code at noise rate $p=10^{-3}$ to estimate the logical error rate and the 99.9 percentile runtime and we compare with the BP-OSD decoder which has been the default quantum LDPC decoder for the past six years. A variant of our beam search decoder with a beam width of 64 achieves a $17\\times$ reduction in logical error rate. With a beam width of 8, we reach the same logical error rate as BP-OSD with a $26.2\\times$ reduction in the 99.9 percentile runtime. We identify the beam search decoder with beam width of 32 as a promising candidate for trapped ion architectures because it achieves a $5.6\\times$ reduction in logical error rate with a 99.9 percentile runtime per syndrome extraction round below 1ms at $p=5 \\times10^{-4}$. Remarkably, this is achieved in software on a single core, without any parallelization or specialized hardware (FPGA, ASIC), suggesting one might only need three 32-core CPUs to decode a trapped ion quantum computer with 1000 logical qubits.", "arxiv_id": "2512.07057", "arxiv_version": "v2", "authors": ["Min Ye", "Dave Wecker", "Nicolas Delfosse"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "c41504f743a8fefde9131f14091a43e445aa75dc1ffc321d93e55c33dbf84ce7", "last_processed_at": "2026-02-21T13:37:00.665820+00:00", "links": {"abs_url": "https://arxiv.org/abs/2512.07057v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2512.07057v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "dd5772adaaa9a01427a837df39add81857cac1023b005788e78252b366b7fd5b", "submitted_date": "2025-12-08", "tags": ["belief propagation", "cs.IT", "decoder", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Beam search decoder for quantum LDPC codes", "updated_date": "2025-12-17"}, {"abstract": "To achieve quantum fault tolerance with lower overhead, quantum low-density parity-check (QLDPC) codes have emerged as a promising alternative to topological codes such as the surface code, offering higher code rates. To support their study, an end-to-end framework for simulating QLDPC codes at the circuit level is needed. In this work, we present QUITS, a modular and flexible circuit-level simulator for QLDPC codes. Its design allows users to freely combine LDPC code constructions, syndrome extraction circuits, decoding algorithms, and noise models, enabling comprehensive and customizable studies of the performance of QLDPC codes under circuit-level noise. QUITS supports several leading QLDPC families, including hypergraph product codes, lifted product codes, and balanced product codes. As part of the framework, we introduce a syndrome extraction circuit improved from Tremblay, Delfosse, and Beverland [Phys. Rev. Lett. 129, 050504 (2022)] that applies to all three code families. In particular, for a small hypergraph product code, our circuit achieves lower depth than the conventional method, resulting in improved logical performance. Using QUITS, we evaluate the performance of state-of-the-art QLDPC codes and decoders under various settings, revealing trade-offs between the decoding runtime and the logical failure rate. The source code of QUITS is available online.", "arxiv_id": "2504.02673", "arxiv_version": "v2", "authors": ["Mingyu Kang", "Yingjia Lin", "Hanwen Yao", "Mert Gökduman", "Arianna Meinking", "Kenneth R. Brown"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "9dd0414c7e63d76deaec308e94bd4feb464246d6dea36ce835c4ba84ad4d7360", "last_processed_at": "2026-02-21T13:37:01.244058+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.02673v2", "code_repo_urls": [], "doi": "10.22331/q-2025-12-05-1931", "pdf_url": "https://arxiv.org/pdf/2504.02673v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product", "balanced product", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "44e5333c62ddf6b8bae2ee7d0a10e3b4bdb7bc2eb9bb4baca49392f4b4ab0d78", "submitted_date": "2025-04-03", "tags": ["balanced product", "decoder", "decoding", "hypergraph product", "lifted product", "quant-ph", "relevance:maybe"], "title": "QUITS: A modular Qldpc code circUIT Simulator", "updated_date": "2025-12-01"}, {"abstract": "Single-shot error correction outperforms conventional approaches by requiring only one round of stabilizer measurements for decoding, even in the presence of measurement errors. This capability relates to the confinement property of codes, which provides an energy barrier lower bound. Earlier research established a confinement property for higher-dimensional hypergraph product (HHGP) codes (Quintavalle et al. 2021 PRX Quantum), yielding an energy barrier lower bound for these codes. In this work, by analyzing the structure of logical operators, we show an improved energy barrier lower bound for HHGP codes with low-density parity-check (LDPC) property. Our bound exceeds results derived from confinement alone, and unlike standard hypergraph product codes, these higher dimensional variants can possess macroscopic energy barriers even when the underlying classical codes lack this property. Specifically, our analysis shows that the energy barrier of LDPC HHGP codes is lower bounded by the distance of the underlying classical codes. This bound is tight if the underlying classical codes exhibit system size-dependent distances but constant energy barriers, like 3D and 4D toric codes.", "arxiv_id": "2506.19219", "arxiv_version": "v3", "authors": ["Guangqi Zhao"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "9e8da0aad72e432fbf6e7d67533322c491a161bb7241e059a3829b8caaa11c7d", "last_processed_at": "2026-02-21T13:37:01.913354+00:00", "links": {"abs_url": "https://arxiv.org/abs/2506.19219v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2506.19219v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "7f68cfc48de98b9767185aec374dd1ec49ea990abd19a8d8ed4abf988320b7d6", "submitted_date": "2025-06-24", "tags": ["decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Improved energy barrier in higher-dimensional hypergraph product codes", "updated_date": "2025-11-26"}, {"abstract": "The ultimate goal of quantum error correction is to create logical qubits with very low error rates (e.g. 1e-12) and assemble them into large-scale quantum computers capable of performing many (e.g. billions) of logical gates on many (e.g. thousands) of logical qubits. However, it is necessarily difficult to directly assess the performance of such high-quality logical qubits using standard Monte Carlo sampling because logical failure events become very rare. Building on existing approaches to this problem, we develop three complementary techniques to characterize the rare-event regime for general quantum low-density parity-check (qLDPC) codes under circuit noise. (I) We propose a well-motivated, low-parameter ansatz for the failure spectrum (the fraction of fault sets of each size that fail) that empirically fits all the QEC systems we studied and predicts logical error rates at all physical error rates. (II) We find min-weight logical operators of syndrome measurement circuits and exactly compute the number of min-weight failing configurations. (III) We generalize the splitting method to qLDPC codes using multi-seeded Metropolis sampling to improve convergence for systems with many inequivalent logical operators. We apply these tools to distance-6, -12, and -18 bivariate bicycle codes under circuit noise, observing strong low-error-rate performance with the recently proposed Relay decoder but also considerable scope for further improvement.", "arxiv_id": "2511.15177", "arxiv_version": "v1", "authors": ["Michael E. Beverland", "Malcolm Carroll", "Andrew W. Cross", "Theodore J. Yoder"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f340afc34fbae42c798af9e37afc949cfac9fb1b019127f6813845d785d8b858", "last_processed_at": "2026-02-21T13:37:06.550000+00:00", "links": {"abs_url": "https://arxiv.org/abs/2511.15177v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2511.15177v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "99c6e25783c2507fce8105cd836dade1a1413c5c830235f75c74cc2e16c81a2f", "submitted_date": "2025-11-19", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Fail fast: techniques to probe rare events in quantum error correction", "updated_date": "2025-11-19"}, {"abstract": "Hardware-friendly quantum low-density parity-check (QLDPC) decoders are commonly built upon belief propagation (BP) processing. Yet, quantum degeneracy often prevents BP from achieving reliable convergence. To overcome this fundamental limitation, we propose the restart belief (RB) decoder, an iterative BP-based algorithm inspired by branch-and-bound optimization principles. From our analysis we find that the RB decoder represents both the fastest and most accurate decoding algorithm applicable to QLDPC codes to date, conceived with the explicit goal of approaching error correction up to the code distance.", "arxiv_id": "2511.13281", "arxiv_version": "v1", "authors": ["Lorenzo Valentini", "Diego Forlivesi", "Andrea Talarico", "Marco Chiani"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0a65b9839a0041b30955bfba4449e137ac2c4e360dd0ef140392440a5041b3f4", "last_processed_at": "2026-02-21T13:37:07.474272+00:00", "links": {"abs_url": "https://arxiv.org/abs/2511.13281v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2511.13281v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "3618d5856ec5ff99fcc2ab5f6e9815661e80a0d096b7e6b4f341ff270e1ab84c", "submitted_date": "2025-11-17", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Restart Belief: A General Quantum LDPC Decoder", "updated_date": "2025-11-17"}, {"abstract": "We construct several explicit instances of quantum Tanner codes, a class of asymptotically good quantum low-density parity check (qLDPC) codes. The codes are constructed using dihedral groups and random pairs of classical codes and exhibit high encoding rates, relative distances, and pseudo-thresholds. Using the BP+OSD decoder, we demonstrate good performance in the phenomenological and circuit-level noise settings, comparable to the surface code with similar distances. Finally, we conduct an analysis of the space-time overhead incurred by these codes.", "arxiv_id": "2508.05095", "arxiv_version": "v3", "authors": ["Rebecca Katharina Radebold", "Stephen D. Bartlett", "Andrew C. Doherty"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0f0cf6839c014dc55d247c4c790c73984dbdc4b9456577e155d0a6e70c062e0b", "last_processed_at": "2026-02-21T13:37:08.388485+00:00", "links": {"abs_url": "https://arxiv.org/abs/2508.05095v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2508.05095v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "fc206737f3c44edc1bfc85677bf03cb919335011c8781316957c0cd7ff45f883", "submitted_date": "2025-08-07", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Explicit Instances of Quantum Tanner Codes", "updated_date": "2025-11-14"}, {"abstract": "We propose a method for modifying orthogonal sparse matrix pairs used in CSS codes while preserving their matrix row and column weight distributions, which play a crucial role in determining the performance of belief-propagation decoding. Unlike simple row or column permutations that merely reorder existing elements, the proposed local modification introduces genuine structural randomness through small $2\\times2$ cross-swap operations followed by integer-linear-program-based local repairs that restore orthogonality. By applying this procedure repeatedly in a random manner, ensembles of randomized quantum LDPC codes can be constructed. The computational complexity of each repair depends only on the maximum row and column weights and is independent of the overall matrix size, ensuring scalability to large code blocks.", "arxiv_id": "2511.04634", "arxiv_version": "v1", "authors": ["Koki Okada", "Kenta Kasai"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "8d4e07f0c00060d8a66557c9ad35e506d9675340f39bfdd639497146d408d9b6", "last_processed_at": "2026-02-21T13:37:08.781683+00:00", "links": {"abs_url": "https://arxiv.org/abs/2511.04634v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2511.04634v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "6d668525bd0552c4fb2be7678dc6e436c0c772b0673c031ab4ca43c7079689c4", "submitted_date": "2025-11-06", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Random Construction of Quantum LDPC Codes", "updated_date": "2025-11-06"}, {"abstract": "In this paper, we propose a new decoder, called the Multiple-Bases Belief-Propagation List Decoder (MBBP-LD), for Quantum Low-Density Parity-Check (QLDPC) codes. It extends the Multiple-Bases Belief-Propagation (MBBP) framework, originally developed for classical cyclic LDPC codes. The proposed method preserves the linear-time complexity of standard BP decoder while improving the logical error rate. To further reduce the logical error rate, a new decision rule is introduced for the post-processing list decoder, outperforming the conventional least-metric selector (LMS) criterion. For the recently developed and implemented bivariate bicycle (BB) code with parameters \\([[144,12,12]]\\), our proposed MBBP-LD decoder achieves up to 40\\% lower logical error rate compared to the state-of-the-art decoder for short QLDPC codes, i.e., BP with ordered-statistics decoding (BP-OSD), while retaining the linear-time complexity of the plain BP decoder. In addition, we explore a new subclass of BB codes, that we refer to as the univariate bicycle (UB) codes, specifically with lower-weight parity checks (\\(w=6,8\\)). This reduces the polynomial search space for the code compared to general BB codes, i.e., by reducing the search space over two polynomial components in BB codes to just a single polynomial component in UB codes. Simulations demonstrate the promising performance of these codes under various types of BP decoders.", "arxiv_id": "2511.02951", "arxiv_version": "v1", "authors": ["Sheida Rabeti", "Hessam Mahdavifar"], "categories": ["cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "a91088ccf34bf5e849fda1698bbc35b05144461e8963b43bd654c9143f6a0598", "last_processed_at": "2026-02-21T13:37:09.429950+00:00", "links": {"abs_url": "https://arxiv.org/abs/2511.02951v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2511.02951v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "bcbfc9737c5bb7c693d3bfcbf745f9670e968877cab23499383ca2596faf6a33", "submitted_date": "2025-11-04", "tags": ["cs.IT", "decoder", "decoding", "relevance:maybe"], "title": "List Decoding and New Bicycle Code Constructions for Quantum LDPC Codes", "updated_date": "2025-11-04"}, {"abstract": "Quantum computing requires effective error correction strategies to mitigate noise and decoherence. Quantum Low-Density Parity-Check (QLDPC) codes have emerged as a promising solution for scalable Quantum Error Correction (QEC) applications by supporting constant-rate encoding and a sparse parity-check structure. However, decoding QLDPC codes via traditional approaches such as Belief Propagation (BP) suffers from poor convergence in the presence of short cycles. Machine learning techniques like Graph Neural Networks (GNNs) utilize learned message passing over their node features; however, they are restricted to pairwise interactions on Tanner graphs, which limits their ability to capture higher-order correlations. In this work, we propose HyperNQ, the first Hypergraph Neural Network (HGNN)- based QLDPC decoder that captures higher-order stabilizer constraints by utilizing hyperedges-thus enabling highly expressive and compact decoding. We use a two-stage message passing scheme and evaluate the decoder over the pseudo-threshold region. Below the pseudo-threshold mark, HyperNQ improves the Logical Error Rate (LER) up to 84% over BP and 50% over GNN-based strategies, demonstrating enhanced performance over the existing state-of-the-art decoders.", "arxiv_id": "2511.01741", "arxiv_version": "v1", "authors": ["Ameya S. Bhave", "Navnil Choudhury", "Kanad Basu"], "categories": ["cs.LG", "cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "75d8270fa5f4e59e629c9696dd9dfb6f0cd789c32e3a18703f0e7098568b3319", "last_processed_at": "2026-02-21T13:37:12.059269+00:00", "links": {"abs_url": "https://arxiv.org/abs/2511.01741v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2511.01741v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.LG", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0f33f79996c2c3218440f83ae831cbac2775736305900b160f719ac9500b325a", "submitted_date": "2025-11-03", "tags": ["belief propagation", "cs.IT", "cs.LG", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "HyperNQ: A Hypergraph Neural Network Decoder for Quantum LDPC Codes", "updated_date": "2025-11-03"}, {"abstract": "We derive two families of EA-QC quantum LDPC (EA-QC-QLDPC) codes by tiling permutation matrices of prime and composite orders. The unassisted portion of the Tanner graphs correspondin
