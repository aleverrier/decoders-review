g to these codes, constructed from two distinct classical QC-LDPC codes, exhibits girth greater then 4 an essential property for effective error correction. We analytically derive the exact code rate of the proposed constructions. Remarkably, one of these families requires only a single Bell pair to be shared between the quantum transmitter and receiver. Furthermore, two additional families of EA-QC-QLDPC codes are constructed based on a single classical code, whose Tanner graphs exhibit girths exceeding six, thereby further enhancing the error-correction capability. For one of these families, we explicitly determine the transversal logical operators an aspect that is typically non-trivial for random quasi-cyclic codes. The performance of the proposed codes is assessed under both random and burst error models under the depolarizing and Markovian noise actions. Employing a modified sum-product decoding algorithm over a quaternary alphabet, we demonstrate that correlated Pauli errors can be effectively addressed within the decoding framework. Simulation results reveal nearly an order of improvement in error-correction performance with the quaternary decoder compared to the binary decoder over both depolarizing and Markovian channels. Further, the proposed codes are compared with existing ones, demonstrating significant improvement.", "arxiv_id": "2501.07363", "arxiv_version": "v2", "authors": ["Pavan Kumar", "Abhi Kumar Sharma", "Shayan Srinivasa Garani"], "categories": ["cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5d30762ba6ef6862059183d85f3ed61f3858cacbc0c9740eed7195933306dde9", "last_processed_at": "2026-02-21T13:37:14.220348+00:00", "links": {"abs_url": "https://arxiv.org/abs/2501.07363v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2501.07363v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "1098e36505f31e0315f99f84f1f8ef5808efb355c873641bf7dd8f31d23c2ef1", "submitted_date": "2025-01-13", "tags": ["cs.IT", "decoder", "decoding", "quantum ldpc", "relevance:relevant"], "title": "Entanglement-Assisted Quantum Quasi-Cyclic LDPC Codes with Transversal Logical Operators", "updated_date": "2025-11-03"}, {"abstract": "We introduce a prototype FPGA decoder implementing the recently discovered Relay-BP algorithm and targeting memory experiments on the $[[144,12,12]]$ bivariate bicycle quantum low-density parity check code. The decoder is both fast and accurate, achieving a belief propagation iteration time of 24ns. It matches the logical error performance of a floating-point implementation despite using reduced precision arithmetic. This speed is sufficient for an average per cycle decoding time under $1\\,\\mathrm{μs}$ assuming circuit model error probabilities are less than $3 \\times 10^{-3}$. This prototype decoder offers useful insights on the path toward decoding solutions for scalable fault-tolerant quantum computers.", "arxiv_id": "2510.21600", "arxiv_version": "v1", "authors": ["Thilo Maurer", "Markus Bühler", "Michael Kröner", "Frank Haverkamp", "Tristan Müller", "Drew Vandeth", "Blake R. Johnson"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "37fc801c2d92e9d3948b4477b761d0fd71a4a68023997578fe316953d6f59c81", "last_processed_at": "2026-02-21T13:37:15.595755+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.21600v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.21600v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "d9b880b487d1d003746f42fb27b5368810f8d133e9634118ae6f90071f1d88d5", "submitted_date": "2025-10-24", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Real-time decoding of the gross code memory with FPGAs", "updated_date": "2025-10-24"}, {"abstract": "Quantum error correction (QEC) is a cornerstone of quantum computing, enabling reliable information processing in the presence of noise. Sparse stabilizer codes -- referred to generally as quantum low-density parity-check (QLDPC) codes -- have risen to the forefront of QEC research in recent years. This can be attributed to several key factors. First, classical LDPC codes admit low-complexity belief propagation iterative decoding and near-capacity performance, which contributed to the early interest in QLDPC codes. Then, the result promising constant overhead fault tolerance using QLDPC codes led to the search for code families that go beyond the long-holding $\\sqrt{n}$ scaling barrier of minimum distance for codelength $n$. This resulted in recent breakthroughs in the construction of QLDPC codes, which, combined with efficient decoding algorithms and the development of fault-tolerant protocols operating on QLDPC-encoded quantum information, provide a promising pathway to low-overhead, fault-tolerant quantum computation. However, despite their potential, challenges remain, particularly in constructing and decoding finite-length codes that account for, or efficiently leverage, specific characteristics of quantum hardware, such as connectivity, topology, native gate sets, and noise models. This article provides an in-depth examination of QLDPC codes and their iterative decoders, catering to an information theory audience with no or limited background in quantum mechanics. We discuss the theoretical underpinnings, explore unique characteristics of quantum channels, and delineate key code constructions and decoding algorithms, ultimately highlighting the impact and future prospects of QLDPC codes in quantum information science.", "arxiv_id": "2510.14090", "arxiv_version": "v1", "authors": ["Bane Vasic", "Valentin Savin", "Michele Pacenti", "Shantom Borah", "Nithin Raveendran"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b92e409a0fb6444b22bee3ff3d217bb7cdf3e4b4620a844fa4028520dc29e90b", "last_processed_at": "2026-02-21T13:37:20.964416+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.14090v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.14090v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "ae329d0cb6c351bf5c8c25f88fdad803625d8166624a52ab93799241f08cf769", "submitted_date": "2025-10-15", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Quantum Low-Density Parity-Check Codes", "updated_date": "2025-10-15"}, {"abstract": "We introduce a decoding framework for correlated errors in quantum LDPC codes under circuit-level noise. The core of our approach is a graph augmentation and rewiring for interference (GARI) method, which modifies the correlated detector error model by eliminating 4-cycles involving Y-type errors, while preserving the equivalence of the decoding problem. We test our approach on the bivariate bicycle codes of distances 6, 10, and 12. A normalized min-sum decoder with a hybrid serial-layered schedule is applied on the transformed graph, achieving high accuracy with low latency. Performance is further enhanced through ensemble decoding, where 24 randomized normalized min-sum decoders run in parallel on the transformed graph, yielding the highest reported accuracy (on par with XYZ-Relay-BP) with unprecedented speed for the tested codes under uniform depolarizing circuit level noise. For the distance 12 (gross) code, our approach yields a logical error rate of $(6.70 \\pm 1.93) \\times 10^{-9}$ at a practical physical error rate of $10^{-3}$. Furthermore, preliminary FPGA implementation results show that such high accuracy can be achieved in real time, with a per-round average decoding latency of 273 ns and sub-microsecond latency in 99.99% of the decoding instances.", "arxiv_id": "2510.14060", "arxiv_version": "v1", "authors": ["Arshpreet Singh Maan", "Francisco-Garcia Herrero", "Alexandru Paler", "Valentin Savin"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "bd260f3c2530416b7f8a5e3dc238f4beb8a2a538e2a2ab2fc2ec57d880d4e03f", "last_processed_at": "2026-02-21T13:37:21.413060+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.14060v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.14060v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "7537888daaef6262da62c563055f44a1ffdda83b461039ff77b12d2edff393ca", "submitted_date": "2025-10-15", "tags": ["decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Decoding Correlated Errors in Quantum LDPC Codes", "updated_date": "2025-10-15"}, {"abstract": "Quantum low-density parity-check (qLDPC) codes are promising for realizing scalable fault-tolerant quantum computation due to their potential for low-overhead protocols. A common approach to decoding qLDPC codes is to use the belief propagation (BP) decoder, followed by a post-processing step to enhance decoding accuracy. For real-time decoding, the post-processing algorithm is desirable to have a small computational cost and rely only on local operations on the Tanner graph to facilitate parallel implementation. To address this requirement, we propose degeneracy cutting (DC), an efficient post-processing technique for the BP decoder that operates on information restricted to the support of each stabilizer generator. DC selectively removes one variable node with the lowest error probability for each stabilizer generator, significantly improving decoding performance while retaining the favorable computational scaling and structure amenable to parallelization inherent to BP. We further extend our method to realistic noise models, including phenomenological and circuit-level noise models, by introducing the detector degeneracy matrix, which generalizes the notion of stabilizer-induced degeneracy to these settings. Numerical simulations demonstrate that BP+DC achieves decoding performance approaching that of BP followed by ordered statistics decoding (BP+OSD) in several settings, while requiring significantly less computational cost. Our results present BP+DC as a promising decoder for fault-tolerant quantum computing, offering a valuable balance of accuracy, efficiency, and suitability for parallel implementation.", "arxiv_id": "2510.08695", "arxiv_version": "v1", "authors": ["Kento Tsubouchi", "Hayata Yamasaki", "Shiro Tamiya"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "419403335afa166469a731f12e3147c423907a46916a96c5e790bcce318b60cd", "last_processed_at": "2026-02-21T13:37:22.793761+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.08695v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.08695v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "ec189c713077c6a66a5caa4f2578c4b875d901ed0f110062daf9e09a52a654cb", "submitted_date": "2025-10-09", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Degeneracy Cutting: A Local and Efficient Post-Processing for Belief Propagation Decoding of Quantum Low-Density Parity-Check Codes", "updated_date": "2025-10-09"}, {"abstract": "Hypergraph product codes are a prototypical family of quantum codes with state-of-the-art decodability properties. Recently, Golowich and Guruswami (FOCS 2024) showed a reduction from quantum decoding to syndrome decoding for a general class of codes, which includes hypergraph product codes. In this work we consider the \"noisy\" syndrome decoding problem for hypergraph product codes, and show a similar reduction in the noisy setting, addressing a question posed by Golowich and Guruswami. Our results hold for a general family of codes wherein the code and the dual code are \"simultaneously nice\"; in particular, for codes admitting good syndrome decodability and whose duals look \"similar\". These include expander codes, Reed-Solomon codes, and variants.", "arxiv_id": "2510.07602", "arxiv_version": "v1", "authors": ["Venkata Gandikota", "Elena Grigorescu", "Vatsal Jha", "S. Venkitesh"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "12ecd37226db778e0b969aa59f041dce169518e637bf0f1934f2175459c922d8", "last_processed_at": "2026-02-21T13:37:23.054943+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.07602v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.07602v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0405f12cd9d38ef7e878b68e33c1fa24cac14c88ec99d30ac85e5e27cd5aa96b", "submitted_date": "2025-10-08", "tags": ["decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Noisy-Syndrome Decoding of Hypergraph Product Codes", "updated_date": "2025-10-08"}, {"abstract": "It is a major challenge to perform addressable and parallel logical operations on constant-rate quantum LDPC (qLDPC) codes. Indeed, the overhead of targeting specific logical qubits represents a crucial bottleneck in many quantum fault-tolerance schemes. We introduce fault-tolerant protocols for performing various addressable as well as parallel logical operations with constant space-time overhead, on a family of constant-rate and polynomial-distance qLDPC codes. Specifically, we construct gadgets for a large class of permutations of logical qubits. We apply these logical permutations to construct gadgets for applying a targeted Hadamard (or $CNOT$) gate on any chosen logical qubit (pair). We also construct gadgets for preparing logical code states, and for applying Hadamard gates on all logical qubits in a codeblock. All of our gadgets use constant quantum space-time overhead along with polynomially bounded classical computation. Prior protocols for such operations required larger overhead, or else relied on codes with certain symmetries that lack known asymptotic constructions. Our codes are given by tensor products of classical codes constructed from lossless expander graphs. Our core technical contribution is a constant-overhead code-switching procedure between 2- and 3-dimensional product codes, which generalizes Bombin&#x27;s dimensional jump (arXiv:1412.5079). We prove that all of our gadgets exhibit a constant threshold under locally stochastic noise. Along the way, we develop a small-set flip decoder for high-dimensional product codes from lossless expanders. Our techniques yield additional interesting consequences, such as single-shot state preparation of 2-dimensional product codes with constant space-time overhead. We also propose a method for performing parallel non-Clifford gates by extending our techniques to codes supporting transversal application of such gates.", "arxiv_id": "2510.06760", "arxiv_version": "v1", "authors": ["Louis Golowich", "Kathleen Chang", "Guanyu Zhu"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "4f94bf029b9ced6b42aea3d1483047c1a942e89038c3355ed54031443e49095c", "last_processed_at": "2026-02-21T13:37:24.523731+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.06760v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.06760v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "b9eb65fa79804f073d20f6c5e9f201ce290639c616518725df8dcb2c1d326bd8", "submitted_date": "2025-10-08", "tags": ["cs.IT", "decoder", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Constant-Overhead Addressable Gates via Single-Shot Code Switching", "updated_date": "2025-10-08"}, {"abstract": "Qudits offer significant advantages over qubit-based architectures, including more efficient gate compilation, reduced resource requirements, improved error-correction primitives, and enhanced capabilities for quantum communication and cryptography. Yet, one of the most promising family of quantum error correction codes, namely quantum low-density parity-check (LDPC) codes, have been so far mostly restricted to qubits. Here, we generalize recent advancements in LDPC codes from qubits to qudits. We introduce a general framework for finding qudit LDPC codes and apply our formalism to several promising types of LDPC codes. We generalize bivariate bicycle codes, including their coprime variant; hypergraph product codes, including the recently proposed La-cross codes; subsystem hypergraph product (SHYPS) codes; high-dimensional expander codes, which make use of Ramanujan complexes; and fiber bundle codes. Using the qudit generalization formalism, we then numerically search for and decode several novel qudit codes compatible with near-term hardware. Our results highlight the potential of qudit LDPC codes as a versatile and hardware-compatible pathway toward scalable quantum error correction.", "arxiv_id": "2510.06495", "arxiv_version": "v1", "authors": ["Daniel J. Spencer", "Andrew Tanggara", "Tobias Haug", "Derek Khu", "Kishor Bharti"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f2b30547ea99b8855b4bd890b2a53a929bdf37844bb020796a425a94774a34fc", "last_processed_at": "2026-02-21T13:37:25.704759+00:00", "links": {"abs_url": "https://arxiv.org/abs/2510.06495v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2510.06495v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "239940ea1e46ea41accba6a15d468af1169e5b0ef7554dd4125f001e7ec94cb1", "submitted_date": "2025-10-07", "tags": ["hypergraph product", "quant-ph", "relevance:maybe"], "title": "Qudit low-density parity-check codes", "updated_date": "2025-10-07"}, {"abstract": "Fast and accurate quantum error correction (QEC) decoding is crucial for scalable fault-tolerant quantum computation. Most-Likely-Error (MLE) decoding, while being near-optimal, is intractable on general quantum Low-Density Parity-Check (qLDPC) codes and typically relies on approximation and heuristics. We propose HyperBlossom, a unified framework that formulates MLE decoding as a Minimum-Weight Parity Factor (MWPF) problem and generalizes the blossom algorithm to hypergraphs via a similar primal-dual linear programming model with certifiable proximity bounds. HyperBlossom unifies all the existing graph-based decoders like (Hypergraph) Union-Find decoders and Minimum-Weight Perfect Matching (MWPM) decoder, thus bridging the gap between heuristic and certifying decoders. We implement HyperBlossom in software, namely Hyperion. Hyperion achieves a 4.8x lower logical error rate compared to the MWPM decoder on the distance-11 surface code and 1.6x lower logical error rate compared to a fine-tuned BPOSD decoder on the $[[90, 8, 10]]$ bivariate bicycle code under code-capacity noise. It also achieves an almost-linear average runtime scaling on both the surface code and the color code, with numerical results up to sufficiently large code distances of 99 and 31 for code-capacity noise and circuit-level noise, respectively.", "arxiv_id": "2508.04969", "arxiv_version": "v2", "authors": ["Yue Wu", "Binghong Li", "Kathleen Chang", "Shruti Puri", "Lin Zhong"], "categories": ["quant-ph", "cs.DS"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "35251ad7346ab30749ee9bb5aa45d2f87228ab86f18d024139f2a3c382398d35", "last_processed_at": "2026-02-21T13:37:33.376611+00:00", "links": {"abs_url": "https://arxiv.org/abs/2508.04969v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2508.04969v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "union-find", "mwpm"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "e2d0fa9f28efa40527a8020d0fde8d2ae5a45160320beb0f99ac65e4a76d43e0", "submitted_date": "2025-08-07", "tags": ["cs.DS", "decoder", "decoding", "mwpm", "quant-ph", "relevance:maybe", "union-find"], "title": "Minimum-Weight Parity Factor Decoder for Quantum Error Correction", "updated_date": "2025-10-02"}, {"abstract": "An efficient decoder is essential for quantum error correction, and data-driven neural decoders have emerged as promising, flexible solutions. Here, we introduce a diffusion model framework to infer logical errors from syndrome measurements in quantum low-density parity-check codes. Using the bivariate bicycle code with realistic circuit-level noise, we show that masked diffusion decoders are more accurate, often faster on average, and always faster in the worst case than other state-of-the-art decoders, including belief propagation with ordered statistics decoding (BP-OSD) and autoregressive neural decoders. We show that by using fewer diffusion steps during inference one can gain significant speed at minimal cost in accuracy. By examining the factored attention from our trained neural network we find that, despite being trained solely on paired samples of syndrome-logical errors, this diffusion decoder learns the structure of the quantum codes. We also compare both masked and continuous diffusion decoders on code-capacity noise models, finding that masked diffusion decoders scale better than continuous diffusion decoders.", "arxiv_id": "2509.22347", "arxiv_version": "v1", "authors": ["Zejun Liu", "Anqi Gong", "Bryan K. Clark"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "09cd0c94b109ff898577fcda3b226f9e692059f3c72cee7746cedbb3e46a9385", "last_processed_at": "2026-02-21T13:37:34.996482+00:00", "links": {"abs_url": "https://arxiv.org/abs/2509.22347v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2509.22347v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "75b5e32fb73225cbf9c83d04283766c71eb89258f8debb12afac2553c9480b00", "submitted_date": "2025-09-26", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Decoding quantum low density parity check codes with diffusion", "updated_date": "2025-09-26"}, {"abstract": "Quantum processors are often affected by biased noise and noisy readout, which reduce reliability and reproducibility. This work combines two complementary strategies to address these challenges. The first is bias tailoring, which aligns stabilizers with the dominant error type. The second is single-shot (SS) decoding, which uses metachecks to identify measurement faults from just one noisy round. We implement these ideas in a four-dimensional lifted hypergraph product (4D-LHP) code constructed from quasi-cyclic protograph seeds. Simulation results show that bias tailoring lowers the word-error rate (WER) by 20-60 percent across realistic Z:X bias ratios (from 1:1 up to 1000:1), with the largest improvements at moderate bias. When measurement noise is present, a single SS round recovers more than one third of the performance lost to readout errors. Moreover, metachecks identify over 99.8 percent of faulty syndromes, providing near-complete fault visibility even with limited correction power. Together, these findings demonstrate that 4D-LHP codes maintain strong resilience under realistic noise, making them promising candidates for integration into orchestrated QPU-CPU workflows.", "arxiv_id": "2509.06316", "arxiv_version": "v1", "authors": ["Devon Campbell"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b77b796605ce2b78dfb4d9d5cca68baa965a8ee5293589d2c6be1f0456313163", "last_processed_at": "2026-02-21T13:37:35.674958+00:00", "links": {"abs_url": "https://arxiv.org/abs/2509.06316v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2509.06316v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "97d98d2a226382fa355bbe107ab9573580b82fba6eceb3f325ca6df0f9647ea0", "submitted_date": "2025-09-08", "tags": ["cs.IT", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Single-Shot Decoding of Biased-Tailored Quantum LDPC Codes", "updated_date": "2025-09-08"}, {"abstract": "Recent progress in quantum computing has enabled systems with tens of reliable logical qubits, built from thousands of noisy physical qubits. However, many impactful applications demand quantum computations with millions of logical qubits, necessitating highly scalable quantum error correction. In classical information theory, low-density parity-check (LDPC) codes can approach channel capacity efficiently. Yet, no quantum error-correcting codes with efficient decoding have been shown to approach the hashing bound - a fundamental limit on quantum capacity - despite decades of research. Here, we present quantum LDPC codes that not only approach the hashing bound but also allow decoding with computational cost linear in the number of physical qubits. This breakthrough paves the way for large-scale, fault-tolerant quantum computation. Combined with emerging hardware that manages many qubits, our approach brings quantum solutions to important real-world problems significantly closer to reality.", "arxiv_id": "2412.21171", "arxiv_version": "v4", "authors": ["Daiki Komoto", "Kenta Kasai"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "8a9de958007bb714ad5503b24d934e6e62f39c47de218edfbc5a3b6153a8185d", "last_processed_at": "2026-02-21T13:37:36.255360+00:00", "links": {"abs_url": "https://arxiv.org/abs/2412.21171v4", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2412.21171v4"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "43e7ac214bbbdcc4735cc1455992a0210fde06622150e1ed174f97b0ae6d6c74", "submitted_date": "2024-12-30", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Quantum Error Correction near the Coding Theoretical Bound", "updated_date": "2025-09-08"}, {"abstract": "Quantum low-density parity-check codes are a promising candidate for fault-tolerant quantum computing with considerably reduced overhead compared to the surface code. However, the lack of a practical decoding algorithm remains a barrier to their implementation. In this work, we introduce localized statistics decoding, a reliability-guided inversion decoder that is highly parallelizable and applicable to arbitrary quantum low-density parity-check codes. Our approach employs a parallel matrix factorization strategy, which we call on-the-fly elimination, to identify, validate, and solve local decoding regions on the decoding graph. Through numerical simulations, we show that localized statistics decoding matches the performance of state-of-the-art decoders while reducing the runtime complexity for operation in the sub-threshold regime. Importantly, our decoder is more amenable to implementation on specialized hardware, positioning it as a promising candidate for decoding real-time syndromes from experiments.", "arxiv_id": "2406.18655", "arxiv_version": "v2", "authors": ["Timo Hillmann", "Lucas Berent", "Armanda O. Quintavalle", "Jens Eisert", "Robert Wille", "Joschka Roffe"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5b81bfb858ab026aad08c6a4ae551f1b98ceacbb2373c2bad78edab22aef9d41", "last_processed_at": "2026-02-21T13:37:39.400632+00:00", "links": {"abs_url": "https://arxiv.org/abs/2406.18655v2", "code_repo_urls": [], "doi": "10.1038/s41467-025-63214-7", "pdf_url": "https://arxiv.org/pdf/2406.18655v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "34caf31416242f9ee6b8b6c5e5db0ffe992813a799bb6dd59977ebd222e1fb93", "submitted_date": "2024-06-26", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Localized statistics decoding for quantum low-density parity-check codes", "updated_date": "2025-09-05"}, {"abstract": "Due to the high error rate of qubits, detecting and correcting errors is essential for achieving fault-tolerant quantum computing (FTQC). Quantum low-density parity-check (QLDPC) codes are one of the most promising quantum error correction (QEC) methods due to their high encoding rates. Belief Propagation-Ordered Statistics Decoding (BP-OSD) is the state-of-the-art decoder for QLDPC codes, but it suffers from high decoding latency. We find from experiments that a large portion of this latency originates from the iterative BP stage, making BP runtime reduction a key optimization target. In this paper, we propose a lightweight preprocessing step that utilizes local syndrome patterns to detect likely trivial error events and feed them as hints into BP-OSD. These hints reduce the number of BP iterations and the overall decoding time. On Bivariate Bicycle codes, the proposed method achieves more than an 80% reduction in BP iterations and total decoding time for the $[[144,12,12]]$ code at a physical error rate of 0.05%, while maintaining the original logical error rate of BP-OSD.", "arxiv_id": "2509.01892", "arxiv_version": "v1", "authors": ["Wenxuan Fan", "Yasunari Suzuki", "Gokul Subramanian Ravi", "Yosuke Ueno", "Koji Inoue", "Teruo Tanimoto"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "2a796eb5f973d42014e18b182e4526b7d688f262f9e9853b4f018a046a02be43", "last_processed_at": "2026-02-21T13:37:40.738028+00:00", "links": {"abs_url": "https://arxiv.org/abs/2509.01892v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2509.01892v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "acd693fdc03bc97028643b393d027770ea136faad83d9c7318b429fa475234b7", "submitted_date": "2025-09-02", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Accelerating BP-OSD Decoder for QLDPC Codes with Local Syndrome-Based Preprocessing", "updated_date": "2025-09-02"}, {"abstract": "We construct a family of quantum low-density parity-check codes locally equivalent to higher-dimensional quantum hypergraph-product (QHP) codes. Similarly to QHP codes, the proposed codes have highly redundant sets of low-weight stabilizer generators, which improves decoding accuracy in a fault-tolerant regime and gives them single-shot properties. The advantage of the new construction is that it gives shorter codes. We derive simple expressions for the dimension of the proposed codes in two important special cases, give bounds on the distances, and explicitly construct some relatively short codes. Circuit simulations for codes locally equivalent to 4-dimensional toric codes show a (pseudo)threshold close to 1.1%, better than for toric or surface codes with a similar noise model.", "arxiv_id": "2506.16910", "arxiv_version": "v2", "authors": ["Hsiang-Ku Lin", "Pak Kau Lim", "Alexey A. Kovalev", "Leonid P. Pryadko"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "1dd3eac6b15cf45e5b9d07fd894eee9013c94743ca59cbf14a0f151c1926be08", "last_processed_at": "2026-02-21T13:37:41.564699+00:00", "links": {"abs_url": "https://arxiv.org/abs/2506.16910v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2506.16910v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "13fbb8fb21047699e5bab550e7d00bc116033161484d8b13285336797d783261", "submitted_date": "2025-06-20", "tags": ["decoding", "quant-ph", "relevance:maybe"], "title": "Abelian multi-cycle codes for single-shot error correction", "updated_date": "2025-08-26"}, {"abstract": "This paper presents a GPU-accelerated decoder for quantum low-density parity-check (QLDPC) codes that achieves sub-$63$ $μ$s latency, below the surface code decoder&#x27;s real-time threshold demonstrated on Google&#x27;s Willow quantum processor. While surface codes have demonstrated below-threshold performance, the encoding rates approach zero as code distances increase, posing challenges for scalability. Recently proposed QLDPC codes, such as those by Panteleev and Kalachev, offer constant-rate encoding and asymptotic goodness but introduce higher decoding complexity. To address such limitation, this work presents a parallelized belief propagation decoder leveraging syndrome information on commodity GPU hardware. Parallelism was exploited to maximize performance within the limits of target latency, allowing decoding latencies under $50$ $μ$s for [[$784$, $24$, $24$]] codes and as low as $23.3$ $μ$s for smaller codes, meeting the tight timing constraints of superconducting qubit cycles. These results show that real-time, scalable decoding of asymptotically good quantum codes is achievable using widely available commodity hardware, advancing the feasibility of fault-tolerant quantum computation beyond surface codes.", "arxiv_id": "2508.07879", "arxiv_version": "v1", "authors": ["Oscar Ferraz", "Bruno Coutinho", "Gabriel Falcao", "Marco Gomes", "Francisco A. Monteiro", "Vitor Silva"], "categories": ["quant-ph", "cs.DC"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "27d3c109b783e0e65e2d5b4576d831f114bb6c4dfedba8f38bde51d0fcb61374", "last_processed_at": "2026-02-21T13:37:42.077102+00:00", "links": {"abs_url": "https://arxiv.org/abs/2508.07879v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2508.07879v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5705ca461b4e416b87c883895471e3aa2d407173953a35f32eb52b3aba5fbd0a", "submitted_date": "2025-08-11", "tags": ["belief propagation", "cs.DC", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "GPU-Accelerated Syndrome Decoding for Quantum LDPC Codes below the 63 $μ$s Latency Threshold", "updated_date": "2025-08-11"}, {"abstract": "Decoding quantum error-correcting codes is a key challenge in enabling fault-tolerant quantum computation. In the classical setting, linear programming (LP) decoders offer provable performance guarantees and can leverage fast practical optimization algorithms. Although LP decoders have been proposed for quantum codes, their performance and limitations remain relatively underexplored. In this work, we uncover a key limitation of LP decoding for quantum low-density parity-check (LDPC) codes: certain constant-weight error patterns lead to ambiguous fractional solutions that cannot be resolved through independent rounding. To address this issue, we incorporate a post-processing technique known as ordered statistics decoding (OSD), which significantly enhances LP decoding performance in practice. Our results show that LP decoding, when augmented with OSD, can outperform belief propagation with the same post-processing for intermediate code sizes of up to hundreds of qubits. These findings suggest that LP-based decoders, equipped with effective post-processing, offer a promising approach for decoding near-term quantum LDPC codes.", "arxiv_id": "2508.04769", "arxiv_version": "v1", "authors": ["Shouzhen Gu", "Mehdi Soleimanifar"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b882a39a22cf42aa782f3b09f8b223f81026026784b431fac61997de1f085601", "last_processed_at": "2026-02-21T13:37:42.984752+00:00", "links": {"abs_url": "https://arxiv.org/abs/2508.04769v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2508.04769v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "017e36a7e561c33cd45e74f23e240b2185281523c75f2a187d0e4c8f650c2d61", "submitted_date": "2025-08-06", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Power and Limitations of Linear Programming Decoder for Quantum LDPC Codes", "updated_date": "2025-08-06"}, {"abstract": "Fault-tolerant quantum computers must be designed in conjunction with classical co-processors that decode quantum error correction measurement information in real-time. In this work, we introduce the belief propagation plus ordered Tanner forest (BP+OTF) algorithm as an almost-linear time decoder for quantum low-density parity-check codes. The OTF post-processing stage removes qubits from the decoding graph until it has a tree-like structure. Provided that the resultant loop-free OTF graph supports a subset of qubits that can generate the syndrome, BP decoding is then guaranteed to converge. To enhance performance under circuit-level noise, we introduce a technique for sparsifying detector error models. This method uses a transfer matrix to map soft information from the full detector graph to the sparsified graph, preserving critical error propagation information from the syndrome extraction circuit. Our BP+OTF implementation first applies standard BP to the full detector graph, followed by BP+OTF post-processing on the sparsified graph. Numerical simulations show that the BP+OTF decoder achieves similar logical error suppression compared to state-of-the-art inversion-based and matching decoders for bivariate bicycle and surface codes, respectively, while maintaining almost-linear runtime complexity across all stages.", "arxiv_id": "2409.01440", "arxiv_version": "v2", "authors": ["Antonio deMarti iOlius", "Imanol Etxezarreta Martinez", "Joschka Roffe", "Josu Etxezarreta Martinez"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5bda739bef85692001bb15011e5b336c89f567cf0e7d441389c0fccf6b6597b2", "last_processed_at": "2026-02-21T13:37:43.576670+00:00", "links": {"abs_url": "https://arxiv.org/abs/2409.01440v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2409.01440v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "b0d114d53a78435a615037f9daa3bc5f4e2e601a60d948f0fde1b21c7608e14e", "submitted_date": "2024-09-02", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "An almost-linear time decoding algorithm for quantum LDPC codes under circuit-level noise", "updated_date": "2025-08-05"}, {"abstract": "In this study, we report that quantum quasi-cyclic low-density parity-check codes decoded via joint belief propagation (BP) exhibit steep error-rate curves, despite the presence of error floors. To the best of our knowledge, this is the first observation of such threshold-like behavior for quantum LDPC codes with non-vanishing coding rate, excluding those decoded with non-binary BP decoders. Moreover, we find that dominant error events contributing to the error floor typically involve only a small number of bits. These findings suggest that the error floor is caused by trapping sets--specific subgraph structures in the Tanner graph--and indicate that identifying and avoiding such structures may lead to further reduction of the error floor.", "arxiv_id": "2507.11534", "arxiv_version": "v2", "authors": ["Daiki Komoto", "Kenta Kasai"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "1ec9b1045242f8929cae9e68473321a83adb995055980cc57a8a352316eafa85", "last_processed_at": "2026-02-21T13:37:44.241809+00:00", "links": {"abs_url": "https://arxiv.org/abs/2507.11534v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2507.11534v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "489012a433463eb90d9410d8e8e300f17b744273c3157b4322d06a551160ea32", "submitted_date": "2025-07-15", "tags": ["belief propagation", "cs.IT", "decoder", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Sharp Error-Rate Transitions in Quantum QC-LDPC Codes under Joint BP Decoding", "updated_date": "2025-07-16"}, {"abstract": "Fault tolerance of quantum protocols require on-par contributions from error-correcting codes and its suitable decoders. One of the most explored error-correcting codes is the family of Quantum Low-Density Parity Check (QLDPC) codes. Although faster than many of the reported decoders for QLDPC codes, iterative decoders fails to produce suitable success rates due to the colossal degeneracy and short cycles intrinsic to these codes. We present a strategy to improve the performance of the iterative decoders based on a collaborative way to use the message passing of the iterative decoders and stabilizer check node removal from the quantum code&#x27;s Tanner graph. We particularly introduce a notion of qubit separation, which gives us a metric to analyze and improve the min-sum Belief Propagation (BP) based iterative decoder&#x27;s performance towards harmful configurations of QLDPC codes. We further show that an integration of information measurements (IM) for qubits and it&#x27;s adjacent stabilizer checks, can be exploited to extract far better performing results from the collaborative decoding architecture compared to its classical predecessor. We analyze the performance of the proposed collaborative decoding architecture, in the context of Generalized Hypergraph Product (GHP) codes. We discuss that the collaborative decoding architecture overcomes iterative decoding failures regarding the harmful trapping set configurations by increasing the separation of trapped qubits without incurring any significant overhead.", "arxiv_id": "2501.08036", "arxiv_version": "v2", "authors": ["Mainak Bhattacharyya", "Ankur Raina"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "ec1d9b4adf5a61da3983b6a523f49b37aa41624a47579ba6307db643878d6fe5", "last_processed_at": "2026-02-21T13:37:45.887326+00:00", "links": {"abs_url": "https://arxiv.org/abs/2501.08036v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2501.08036v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "ceac6465242ada71c557d608bb756f337d34560545c2e214610b75bb1e81c7ba", "submitted_date": "2025-01-14", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Decoding Quantum LDPC Codes using Collaborative Check Node Removal", "updated_date": "2025-06-30"}, {"abstract": "We propose and analyze a hierarchical quantum error correction (QEC) scheme that concatenates hypergraph product (HGP) codes with rotated surface codes, which is compatible with quantum computers with only nearest-neighbor interactions. The upper layer employs (3,4)-random HGP codes, known for their constant encoding rate and favorable distance scaling, while the lower layer consists of a rotated surface code with distance 5, allowing hardware compatibility through lattice surgery. To address the decoding bottleneck, we utilize a soft-decision decoding strategy that combines belief propagation with ordered statistics (BP-OS) decoding, enhanced by a syndrome-conditioned logical error probability computed via a tailored lookup table for the lower layer. Numerical simulations under a code capacity noise model demonstrate that our hierarchical codes achieve logical error suppression below the threshold. Furthermore, we derive explicit conditions under which the proposed codes surpass surface codes in both qubit efficiency and error rate. In particular, for the size parameter $s \\geq 4$ (which corresponds to 16 logical qubits) and the distance $d\\geq 25$, our construction outperforms the rotated surface code in practical regimes with physical error rates around or less than $10^{-2}$. These results suggest that concatenated qLDPC-surface architectures offer a scalable and resource-efficient path toward near-term fault-tolerant quantum computation.", "arxiv_id": "2505.18592", "arxiv_version": "v2", "authors": ["Junichi Haruna", "Keisuke Fujii"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "2352675d035d37901be522ce8ae11ec8ab5fa7bd4eb653055ff8385e526bd403", "last_processed_at": "2026-02-21T13:37:47.266063+00:00", "links": {"abs_url": "https://arxiv.org/abs/2505.18592v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2505.18592v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "belief propagation", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "aa9fb99cbd61d7bbe224664c041eff3cb2d202a492076ebda90efd56bbadbbda", "submitted_date": "2025-05-24", "tags": ["belief propagation", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Hierarchical Quantum Error Correction with Hypergraph Product Code and Rotated Surface Code", "updated_date": "2025-06-24"}, {"abstract": "Hypergraph products are quantum low-density parity-check (LDPC) codes constructed from two classical LDPC codes. Although their dimension and distance depend only on the parameters of the underlying classical codes, optimizing their performance against various noise channels remains challenging. This difficulty partly stems from the complexity of decoding in the quantum setting. The standard, ad hoc approach typically involves selecting classical LDPC codes with large girth. In this work, we focus on optimizing performance against the quantum erasure channel. A key advantage of this channel is the existence of an efficient maximum-likelihood decoder, which enables us to employ optimization techniques based on sampling random codes, such as Reinforcement Learning (RL) and Simulated Annealing (SA). Our results indicate that these techniques improve performance relative to the state-of-the-art.", "arxiv_id": "2501.09622", "arxiv_version": "v3", "authors": ["Bruno C. A. Freire", "Nicolas Delfosse", "Anthony Leverrier"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "20c926f288951e4370f9c659a1f7b6b0b79ec3aeed153b08723f461745990c5a", "last_processed_at": "2026-02-21T13:37:47.802679+00:00", "links": {"abs_url": "https://arxiv.org/abs/2501.09622v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2501.09622v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "cdb3d7415a4d2478c4ef6a4cf5d0891a239f7dca6732bcb1f57235628b31a634", "submitted_date": "2025-01-16", "tags": ["cs.IT", "decoder", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Optimizing hypergraph product codes with random walks, simulated annealing and reinforcement learning", "updated_date": "2025-06-05"}, {"abstract": "Scaling quantum computing to practical applications necessitates reliable quantum error correction. Although numerous correction codes have been proposed, the overall correction efficiency critically limited by the decode algorithms. We introduce GraphQEC, a code-agnostic decoder leveraging machine-learning on the graph structure of stabilizer codes with linear time complexity. GraphQEC demonstrates unprecedented accuracy and efficiency across all tested code families, including surface codes, color codes, and quantum low-density parity-check (QLDPC) codes. For instance, on a distance-12 QLDPC code, GraphQEC achieves a logical error rate of $9.55 \\times 10^{-5}$, an 18-fold improvement over the previous best specialized decoder&#x27;s $1.74 \\times 10^{-3}$ under $p=0.005$ physical error rates, while maintaining $157μ$s/cycle decoding speed. Our approach represents the first universal solution for real-time quantum error correction across arbitrary stabilizer codes.", "arxiv_id": "2502.19971", "arxiv_version": "v2", "authors": ["Gengyuan Hu", "Wanli Ouyang", "Chao-Yang Lu", "Chen Lin", "Han-Sen Zhong"], "categories": ["quant-ph", "cs.AI"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "cc12f4d589102b92aa4df0f0d7db8c8a84d856f36ee58f7cf921bae2166855e5", "last_processed_at": "2026-02-21T13:37:48.394952+00:00", "links": {"abs_url": "https://arxiv.org/abs/2502.19971v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2502.19971v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "17becbf031b92f369b74eeef36421d71d34a9010ab3d5451ccde90e8090822a5", "submitted_date": "2025-02-27", "tags": ["cs.AI", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Efficient and Universal Neural-Network Decoder for Stabilizer-Based Quantum Error Correction", "updated_date": "2025-06-03"}, {"abstract": "The problem of recovering from qubit erasures has recently gained attention as erasures occur in many physical systems such as photonic systems, trapped ions, superconducting qubits and circuit quantum electrodynamics. While several linear-time decoders for error correction are known, their error-correcting capability is limited to half the minimum distance of the code, whereas erasure correction allows one to go beyond this limit. As in the classical case, stopping sets pose a major challenge in designing efficient erasure decoders for quantum LDPC codes. In this paper, we show through simulation, that an attractive alternative here, is the use of quantum expander codes in conjunction with the peeling decoder that has linear complexity. We also discuss additional techniques including small-set-flip decoding, that can be applied following the peeling operation, to improve decoding performance and their associated complexity.", "arxiv_id": "2504.21845", "arxiv_version": "v2", "authors": ["Jefrin Sharmitha Prabhu", "Abhinav Vaishya", "Shobhit Bhatnagar", "Aryaman Manish Kolhe", "V. Lalitha", "P. Vijay Kumar"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "8a331ff10bb3fd972c2221d0e7ff79b14e82ed58d6810bb6b2af847e45f26a1b", "last_processed_at": "2026-02-21T13:37:49.071533+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.21845v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2504.21845v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "small-set-flip"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "7b9c700722a30a575cac578858d2b7cc3fe18947ba2d34f9526867d1acb09442", "submitted_date": "2025-04-30", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant", "small-set-flip"], "title": "On the Efficacy of the Peeling Decoder for the Quantum Expander Code", "updated_date": "2025-05-29"}, {"abstract": "Concatenated bosonic-stabilizer codes have recently gained prominence as promising candidates for achieving low-overhead fault-tolerant quantum computing in the long term. In such systems, analog information obtained from the syndrome measurements of an inner bosonic code is used to inform decoding for an outer code layer consisting of a discrete-variable stabilizer code such as a surface code. The use of Quantum Low-Density Parity Check (QLDPC) codes as an outer code is of particular interest due to the significantly higher encoding rates offered by these code families, leading to a further reduction in overhead for large-scale quantum computing. Recent works have investigated the performance of QLDPC-GKP codes in detail, and the use of analog information from the inner code significantly boosts decoder performance. However, the noise models assumed in these works are typically limited to depolarizing or phenomenological noise. In this paper, we investigate the performance of QLDPC-GKP concatenated codes under circuit-level noise, based on a model introduced by Noh et al. in the context of the surface-GKP code. To demonstrate the performance boost from analog information, we investigate three scenarios: (a) decoding without soft information, (b) decoding with precomputed error probabilities but without real-time soft information, and (c) decoding with real-time soft information obtained from round-to-round decoding of the inner GKP code. Results show minimal improvement between (a) and (b), but a significant boost in (c), indicating that real-time soft information is critical for concatenated decoding under circuit-level noise. We also study the effect of measurement schedules with varying depths and show that using a schedule with minimum depth is essential for obtaining reliable soft information from the inner code.", "arxiv_id": "2505.06385", "arxiv_version": "v1", "authors": ["Shantom K. Borah", "Asit K. Pradhan", "Nithin Raveendran", "Michele Pacenti", "Bane Vasic"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "2ac64cc34c040b1a148a81f9f5329ebea95dfce1743f79a0e02ae63123624d9f", "last_processed_at": "2026-02-21T13:37:49.566633+00:00", "links": {"abs_url": "https://arxiv.org/abs/2505.06385v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2505.06385v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "8c74225567f7198e6451754dc6bd36b59604c73e9251ce87b074add27ac46dc1", "submitted_date": "2025-05-09", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Fault Tolerant Decoding of QLDPC-GKP Codes with Circuit Level Soft Information", "updated_date": "2025-05-09"}, {"abstract": "Generalized bicycle (GB) codes have emerged as a promising class of quantum error-correcting codes with practical decoding capabilities. While numerous asymptotically good quantum codes and quantum low-density parity-check code constructions have been proposed, their finite block-length performance often remains unquantified. In this work, we demonstrate that GB codes exhibit comparable or superior error correction performance in finite-length settings, particularly when designed with higher or unrestricted row weights. Leveraging their flexible construction, GB codes can be tailored to achieve high rates while maintaining efficient decoding. We evaluate GB codes against other leading quantum code families, such as quantum Tanner codes and single-parity-check product codes, highlighting their versatility in practical finite-length applications.", "arxiv_id": "2505.06157", "arxiv_version": "v1", "authors": ["Olai Å. Mostad", "Hsuan-Yin Lin", "Eirik Rosnes", "De-Shih Lee", "Ching-Yi Lai"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "a310267c70c8853647989459a630a755c455133a4146d315841b6ddac7a4bf11", "last_processed_at": "2026-02-21T13:37:50.081998+00:00", "links": {"abs_url": "https://arxiv.org/abs/2505.06157v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2505.06157v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "98b4cede1648879e7ba7e5a4a0a54d82e3e0018d818d59ef96231920628cdf89", "submitted_date": "2025-05-09", "tags": ["cs.IT", "decoding", "quant-ph", "relevance:maybe"], "title": "Advancing Finite-Length Quantum Error Correction Using Generalized Bicycle Codes", "updated_date": "2025-05-09"}, {"abstract": "We propose a scalable decoding framework for correcting correlated hook errors in stabilizer measurement circuits. Traditional circuit-level decoding attempts to estimate the precise location of faults by constructing an extended Tanner graph that includes every possible source of noise. However, this results in a highly irregular graph with many short cycles, leading to poor performance of message-passing algorithms. To compensate, ordered statistics decoding is typically employed, but its cubic complexity renders it impractical for large codes or repeated stabilizer measurements. Our approach instead focuses on estimating the effective data errors caused by hook faults, modeling them as memory channels. We integrate trellis-based soft-input soft-output equalizers into the Tanner graph of the code, and show that the resulting decoding graph preserves the structural properties of the original Tanner graph such as node degree and girth, enabling efficient message passing. Applied to bivariate bicycle quantum LDPC codes, our decoder outperforms standard belief propagation on the circuit-level graph and closely approaches OSD0 performance, all while maintaining linear complexity and scalability.", "arxiv_id": "2504.21200", "arxiv_version": "v1", "authors": ["Michele Pacenti", "Asit K. Pradhan", "Shantom K. Borah", "Bane Vasic"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "03c51e4f9dc72b389d1e73befbafe21d9d3e449a82397bdb1770d26ef7e4e27f", "last_processed_at": "2026-02-21T13:37:50.376446+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.21200v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2504.21200v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "7be88164c0bb10dcf9466a8e922158d175b45692aca76e1cf2957161c4c56e35", "submitted_date": "2025-04-29", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Turbo-Annihilation of Hook Errors in Stabilizer Measurement Circuits", "updated_date": "2025-04-29"}, {"abstract": "We give the first construction of explicit constant-degree lossless vertex expanders. Specifically, for any $\\varepsilon &gt; 0$ and sufficiently large $d$, we give an explicit construction of an infinite family of $d$-regular graphs where every small set $S$ of vertices has $(1-\\varepsilon)d|S|$ neighbors (which implies $(1-2\\varepsilon)d|S|$ unique-neighbors). Our results also extend naturally to construct biregular bipartite graphs of any constant imbalance, where small sets on each side have strong expansion guarantees. The graphs we construct admit a free group action, and hence realize new families of quantum LDPC codes of Lin and M. Hsieh with a linear time decoding algorithm. Our construction is based on taking an appropriate product of a constant-sized lossless expander with a base graph constructed from Ramanujan Cayley cubical complexes.", "arxiv_id": "2504.15087", "arxiv_version": "v1", "authors": ["Jun-Ting Hsieh", "Alexander Lubotzky", "Sidhanth Mohanty", "Assaf Reiner", "Rachel Yun Zhang"], "categories": ["math.CO", "cs.CC", "cs.DM", "cs.DS", "math.GR"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "bae58bc6aae61f44212830afe0dde19a8ec3c497e46ac310d49a0ce7ae67eecf", "last_processed_at": "2026-02-21T13:37:51.663131+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.15087v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2504.15087v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "math.CO", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0adfd4cffdb16b86d8171b753198806244767f2e74116927b4b9d0362d4bd2b1", "submitted_date": "2025-04-21", "tags": ["cs.CC", "cs.DM", "cs.DS", "decoding", "math.CO", "math.GR", "quantum ldpc", "relevance:relevant"], "title": "Explicit Lossless Vertex Expanders", "updated_date": "2025-04-21"}, {"abstract": "Fault-tolerant quantum computers will depend crucially on the performance of the classical decoding algorithm which takes in the results of measurements and outputs corrections to the errors inferred to have occurred. Machine learning models have shown great promise as decoders for the surface code; however, this promise has not yet been substantiated for the more challenging task of decoding quantum low-density parity-check (QLDPC) codes. In this paper, we present a recurrent, transformer-based neural network designed to decode circuit-level noise on Bivariate Bicycle (BB) codes, introduced recently by Bravyi et al (Nature 627, 778-782, 2024). For the $[[72,12,6]]$ BB code, at a physical error rate of $p=0.1\\%$, our model achieves a logical error rate almost $5$ times lower than belief propagation with ordered statistics decoding (BP-OSD). Moreover, while BP-OSD has a wide distribution of runtimes with significant outliers, our model has a consistent runtime and is an order-of-magnitude faster than the worst-case times from a benchmark BP-OSD implementation. On the $[[144,12,12]]$ BB code, our model obtains worse logical error rates but maintains the speed advantage. These results demonstrate that machine learning decoders can out-perform conventional decoders on QLDPC codes, in regimes of current interest.", "arxiv_id": "2504.13043", "arxiv_version": "v1", "authors": ["John Blue", "Harshil Avlani", "Zhiyang He", "Liu Ziyin", "Isaac L. Chuang"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "208ea6c924ad931728273d7587603e94cb9770580675ce2cccd4dc2bdbab5f74", "last_processed_at": "2026-02-21T13:37:52.727360+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.13043v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2504.13043v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0c362758ea2c08ef78c448b21faa9f5ccb6d818f1981dab0f27e689b68eda77e", "submitted_date": "2025-04-17", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Machine Learning Decoding of Circuit-Level Noise for Bivariate Bicycle Codes", "updated_date": "2025-04-17"}, {"abstract": "Quantum low density parity check (qLDPC) codes are an attractive alternative to the surface code due to their relatively high code rate and distance. However, unlike the surface code which has simple, geometrically local, stabilizer checks, high performing qLDPC codes have non-local stabilizers that are challenging to measure. Recent advancements have shown how to deterministically perform high-fidelity, cavity mediated many-body gates, enabling the encoding and decoding of non-local GHZ states. We integrate this non-local resource into the DiVincenzo-Aliferis method of fault-tolerant stabilizer measurement for quantum hypergraph product and lifted product codes. Using circuit-level noise simulations, including the noise optimized cavity mediated gate, we find promising thresholds of $0.84 \\%-0.60 \\%$ for the hypergraph product code and psuedo-threshold of $0.3\\%-0.4\\%$ for the lifted product codes, with cavity cooperativities in the range $C\\sim 10^4-10^6$. We propose a compatible tri-layer architectural layout for scheduling stabilizer measurements, enhancing circuit parallelizability.", "arxiv_id": "2409.05818", "arxiv_version": "v2", "authors": ["Omprakash Chandra", "Gopikrishnan Muraleedharan", "Gavin K. Brennen"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "75baaaf88b54bfa41df228340602238cc3f96028e092a7476a5f9a6cb1cfa724", "last_processed_at": "2026-02-21T13:38:05.996812+00:00", "links": {"abs_url": "https://arxiv.org/abs/2409.05818v2", "code_repo_urls": [], "doi": "10.1103/x1rk-yg29", "pdf_url": "https://arxiv.org/pdf/2409.05818v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "hypergraph product", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "1fe38d51db0c987486968044650981a7631da7da20b9b51076314937d7a613b6", "submitted_date": "2024-09-09", "tags": ["decoding", "hypergraph product", "lifted product", "quant-ph", "relevance:maybe"], "title": "Non-local resources for error correction in quantum LDPC codes", "updated_date": "2025-04-11"}, {"abstract": "Decoders for quantum LDPC codes generally rely on solving a parity-check equation with Gaussian elimination, with the generalised union-find decoder performing this repeatedly on growing clusters. We present an online variant of the Gaussian elimination algorithm which maintains an LUP decomposition in order to process only new rows and columns as they are added to a system of equations. This is equivalent to performing Gaussian elimination once on the final system of equations, in contrast to the multiple rounds of Gaussian elimination employed by the generalised union-find decoder. It thus significantly reduces the number of operations performed by the decoder. We consider the generalised union-find decoder as an example use case and present a complexity
