 analysis demonstrating that both variants take time cubic in the number of qubits in the general case, but that the number of operations performed by the online variant is lower by an amount which itself scales cubically. This analysis is also extended to the regime of &#x27;well-behaved&#x27; codes in which the number of growth iterations required is bounded logarithmically in error weight. Finally, we show empirically that our online variant outperforms the original offline decoder in average-case time complexity on codes with sparser parity-check matrices or greater covering radius.", "arxiv_id": "2504.05080", "arxiv_version": "v2", "authors": ["Sam J. Griffiths", "Asmae Benhemou", "Dan E. Browne"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "1a2f558f4cc4bf6bbf8ff8cbf72f030e520c46411df69867975557940ddc0240", "last_processed_at": "2026-02-21T13:38:06.574523+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.05080v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2504.05080v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "union-find"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "3b756643e0a763f1453c2ba8c8a19097412f1e7fd2ab6d9c5407802cdcbf788f", "submitted_date": "2025-04-07", "tags": ["decoder", "quant-ph", "quantum ldpc", "relevance:relevant", "union-find"], "title": "Online Gaussian elimination for quantum LDPC decoding", "updated_date": "2025-04-09"}, {"abstract": "Quantum low-density parity-check (QLDPC) codes with asymptotically non-zero rates are prominent candidates for achieving fault-tolerant quantum computation, primarily due to their syndrome-measurement circuit&#x27;s low operational depth. Numerous studies advocate for the necessity of fast decoders to fully harness the capabilities of QLDPC codes, thus driving the focus towards designing low-complexity iterative decoders. However, empirical investigations indicate that such iterative decoders are susceptible to having a high error floor while decoding QLDPC codes. The main objective of this paper is to analyze the decoding failures of the \\emph{hypergraph-product} and \\emph{lifted-product} codes and to design decoders that mitigate these failures, thus achieving a reduced error floor. The suboptimal performance of these codes can predominantly be ascribed to two structural phenomena: (1) stabilizer-induced trapping sets, which are subgraphs formed by stabilizers, and (2) classical trapping sets, which originate from the classical codes utilized in the construction of hypergraph-product and lifted-product codes. The dynamics of stabilizer-induced trapping sets is examined and a straightforward modification of iterative decoders is proposed to circumvent these trapping sets. Moreover, this work proposes a systematic methodology for designing decoders that can circumvent classical trapping sets in both hypergraph product and lifted product codes, from decoders capable of avoiding their trapping set in the parent classical LDPC code. When decoders that can avoid stabilizer-induced trapping sets are run in parallel with those that can mitigate the effect of classical TS, the logical error rate improves significantly in the error-floor region.", "arxiv_id": "2504.01728", "arxiv_version": "v1", "authors": ["Asit Kumar Pradhan", "Nithin Raveendran", "Narayanan Rengaswamy", "Bane Vasić"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f183fb413d23a68652aa7d1e7217dbe46293b36d55def1a7e5c66cde22adbda6", "last_processed_at": "2026-02-21T13:38:07.567538+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.01728v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2504.01728v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "89300f6f789e99a27aa4e794024904796997a08c6cd59884c4f6ff87dd2db718", "submitted_date": "2025-04-02", "tags": ["cs.IT", "decoder", "decoding", "hypergraph product", "lifted product", "quant-ph", "relevance:maybe"], "title": "Linear Time Iterative Decoders for Hypergraph-Product and Lifted-Product Codes", "updated_date": "2025-04-02"}, {"abstract": "Spatially-coupled (SC) codes is a class of convolutional LDPC codes that has been well investigated in classical coding theory thanks to their high performance and compatibility with low-latency decoders. We describe toric codes as quantum counterparts of classical two-dimensional spatially-coupled (2D-SC) codes, and introduce spatially-coupled quantum LDPC (SC-QLDPC) codes as a generalization. We use the convolutional structure to represent the parity check matrix of a 2D-SC code as a polynomial in two indeterminates, and derive an algebraic condition that is both necessary and sufficient for a 2D-SC code to be a stabilizer code. This algebraic framework facilitates the construction of new code families. While not the focus of this paper, we note that small memory facilitates physical connectivity of qubits, and it enables local encoding and low-latency windowed decoding. In this paper, we use the algebraic framework to optimize short cycles in the Tanner graph of 2D-SC hypergraph product (HGP) codes that arise from short cycles in either component code. While prior work focuses on QLDPC codes with rate less than 1/10, we construct 2D-SC HGP codes with small memories, higher rates (about 1/3), and superior thresholds.", "arxiv_id": "2305.00137", "arxiv_version": "v6", "authors": ["Siyi Yang", "Robert Calderbank"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "2b1434935f33dc5ff40b202248ff814cbb7629b8b4cdaca8f74c5494468a25ef", "last_processed_at": "2026-02-21T13:38:09.219636+00:00", "links": {"abs_url": "https://arxiv.org/abs/2305.00137v6", "code_repo_urls": [], "doi": "10.22331/q-2025-04-07-1693", "pdf_url": "https://arxiv.org/pdf/2305.00137v6"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "e0dd1e37e18eae62f3519667cc9ffabf8893cd40528a4fd0dc3350f092acb2a9", "submitted_date": "2023-04-29", "tags": ["cs.IT", "decoder", "decoding", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Spatially-Coupled QLDPC Codes", "updated_date": "2025-04-02"}, {"abstract": "Understanding the impact of accuracy and speed when quantum error correction (QEC) decoders transition from floating-point software implementations to finite-precision hardware architectures is crucial for resource estimation on both classical and quantum sides. The final performance of the hardware implementation influences the code distance, affecting the number of physical qubits needed, and defines connectivity between quantum and classical control units, among other factors like refrigeration systems. This paper introduces a hardware emulator to evaluate QEC decoders using real hardware instead of software models. The emulator can explore $10^{13}$ different error patterns in 20 days with a single FPGA device running at 150 MHz, guaranteeing the decoder&#x27;s performance at logical rates of $10^{-12}$, the requirement for most quantum algorithms. In contrast, an optimized C++ software on an Intel Core i9 with 128 GB RAM would take over a year to achieve similar results. The emulator also enables storing patterns that generate logical errors for offline analysis and to design new decoders. Using results from the emulator, we propose a diversity-based method combining several belief propagation (BP) decoders with different quantization levels. Individually, these decoders may show subpar error correction, but together they outperform the floating-point version of BP for quantum low-density parity-check (QLDPC) codes like hypergraph or lifted product. Preliminary results with circuit-level noise and bivariate bicycle codes suggest hardware insights can also improve software. Our diversity-based proposal achieves a similar logical error rate as BP with ordered statistics decoding, with average speed improvements ranging from 30% to 80%, and 10% to 120% in worst-case scenarios, while reducing post-processing algorithm activation by 47% to 96.93%, maintaining the same accuracy.", "arxiv_id": "2504.01164", "arxiv_version": "v1", "authors": ["Francisco Garcia-Herrero", "Javier Valls", "Llanos Vergara-Picazo", "Vicente Torres"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "7eb414f3abb0231f012b9bb86aa4c30a9ccdd95770eb0fc44c3047d1304814be", "last_processed_at": "2026-02-21T13:38:09.924134+00:00", "links": {"abs_url": "https://arxiv.org/abs/2504.01164v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2504.01164v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "876296c1d94205b6b779a2172ebb58569b5069aa1510e215c285b1ead1561162", "submitted_date": "2025-04-01", "tags": ["belief propagation", "decoder", "decoding", "lifted product", "quant-ph", "relevance:maybe"], "title": "Diversity Methods for Improving Convergence and Accuracy of Quantum Error Correction Decoders Through Hardware Emulation", "updated_date": "2025-04-01"}, {"abstract": "Efficient and accurate decoding of quantum error-correcting codes is essential for fault-tolerant quantum computation, however, it is challenging due to the degeneracy of errors, the complex code topology, and the large space for logical operators in high-rate codes. In this work, we propose a decoding algorithm utilizing generative modeling in machine learning. We employ autoregressive neural networks to learn the joint probability of logical operators and syndromes in an unsupervised manner, eliminating the need for labeled training data. The learned model can approximately perform maximum likelihood decoding by directly generating the most likely logical operators for $k$ logical qubits with $\\mathcal O(2k)$ computational complexity. Thus, it is particularly efficient for decoding high-rate codes with many logical qubits. The proposed approach is general and applies to a wide spectrum of quantum error-correcting codes including surface codes and quantum low-density parity-check codes (qLDPC), under noise models ranging from code capacity noise to circuit level noise. We conducted extensive numerical experiments to demonstrate that our approach achieves significantly higher decoding accuracy compared to the minimum weight perfect matching and belief propagation with ordered statistics on the surface codes and high-rate quantum low-density parity-check codes. Our approach highlights generative artificial intelligence as a potential solution for the real-time decoding of realistic and high-rate quantum error correction codes.", "arxiv_id": "2503.21374", "arxiv_version": "v1", "authors": ["Hanyan Cao", "Feng Pan", "Dongyang Feng", "Yijia Wang", "Pan Zhang"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "30cc912a05828891af9ed2e47271c789078979921eae9dbfaa151c71b4f90fc1", "last_processed_at": "2026-02-21T13:38:10.883724+00:00", "links": {"abs_url": "https://arxiv.org/abs/2503.21374v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2503.21374v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "85259f58f53445930164f97eab38b6b90f70c96178f4aafc1e387de8036901fc", "submitted_date": "2025-03-27", "tags": ["belief propagation", "decoding", "quant-ph", "relevance:maybe"], "title": "Generative Decoding for Quantum Error-correcting Codes", "updated_date": "2025-03-27"}, {"abstract": "Entanglement is essential for quantum information processing, but is limited by noise. We address this by developing high-yield entanglement distillation protocols with several advancements. (1) We extend the 2-to-1 recurrence entanglement distillation protocol to higher-rate n-to-(n-1) protocols that can correct any single-qubit errors. These protocols are evaluated through numerical simulations focusing on fidelity and yield. We also outline a method to adapt any classical error-correcting code for entanglement distillation, where the code can correct both bit-flip and phase-flip errors by incorporating Hadamard gates. (2) We propose a constant-depth decoder for stabilizer codes that transforms logical states into physical ones using single-qubit measurements. This decoder is applied to entanglement distillation protocols, reducing circuit depth and enabling protocols derived from high-performance quantum error-correcting codes. We demonstrate this by evaluating the circuit complexity for entanglement distillation protocols based on surface codes and quantum convolutional codes. (3) Our stabilizer entanglement distillation techniques advance quantum computing. We propose a fault-tolerant protocol for constant-depth encoding and decoding of arbitrary states in surface codes, with potential extensions to more general quantum low-density parity-check codes. This protocol is feasible with state-of-the-art reconfigurable atom arrays and surpasses the limits of conventional logarithmic depth encoders. Overall, our study integrates stabilizer formalism, measurement-based quantum computing, and entanglement distillation, advancing both quantum communication and computing.", "arxiv_id": "2408.06299", "arxiv_version": "v2", "authors": ["Yu Shi", "Ashlesha Patil", "Saikat Guha"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "7c1bc7593222f1c3f825d20dcfe84f5ee3a4b3caa561fba3e40dec300a095c8b", "last_processed_at": "2026-02-21T13:38:12.247944+00:00", "links": {"abs_url": "https://arxiv.org/abs/2408.06299v2", "code_repo_urls": [], "doi": "10.1103/PRXQuantum.6.010339", "pdf_url": "https://arxiv.org/pdf/2408.06299v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "85a3cc191d0a06d5558b24e48ca3f317d99f71f5d509d15a16f108a782b91aa3", "submitted_date": "2024-08-12", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Stabilizer Entanglement Distillation and Efficient Fault-Tolerant Encoders", "updated_date": "2025-03-07"}, {"abstract": "Quantum low-density parity-check codes are a promising approach to fault-tolerant quantum computation, offering potential advantages in rate and decoding efficiency. In this work, we introduce quantum Margulis codes, a new class of QLDPC codes derived from Margulis&#x27; classical LDPC construction via the two-block group algebra framework. We show that quantum Margulis codes, unlike bivariate bicycle codes which require ordered statistics decoding for effective error correction, can be efficiently decoded using a standard min-sum decoder with linear complexity, when decoded under depolarizing noise. This is attributed to their Tanner graph structure, which does not exhibit group symmetry, thereby mitigating the well-known problem of error degeneracy in QLDPC decoding. To further enhance performance, we propose an algorithm for constructing 2BGA codes with controlled girth, ensuring a minimum girth of 6 or 8, and use it to generate several quantum Margulis codes of length 240 and 642. We validate our approach through numerical simulations, demonstrating that quantum Margulis codes behave significantly better than BB codes in the error floor region, under min-sum decoding.", "arxiv_id": "2503.03936", "arxiv_version": "v1", "authors": ["Michele Pacenti", "Dimitris Chytas", "Bane Vasic"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "9141599f12d15c4834b7fdbbc2d6d058ee1b69d6690d1ed682f9d5f27d0a2447", "last_processed_at": "2026-02-21T13:38:12.762535+00:00", "links": {"abs_url": "https://arxiv.org/abs/2503.03936v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2503.03936v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0049079832b7cfb65a71ceb76f7b9a86263180261d3028b60f3152870182b627", "submitted_date": "2025-03-05", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Construction and Decoding of Quantum Margulis Codes", "updated_date": "2025-03-05"}, {"abstract": "We introduce Decision Tree Decoders (DTDs), which rely only on the sparsity of the binary check matrix, making them broadly applicable for decoding any quantum low-density parity-check (qLDPC) code and fault-tolerant quantum circuits. DTDs construct corrections incrementally by adding faults one-by-one, forming a path through a Decision Tree (DT). Each DTD algorithm is defined by its strategy for exploring the tree, with well-designed algorithms typically needing to explore only a small portion before finding a correction. We propose two explicit DTD algorithms that can be applied to any qLDPC code: (1) A provable decoder: Guaranteed to find a minimum-weight correction. While it can be slow in the worst case, numerical results show surprisingly fast median-case runtime, exploring only $w$ DT nodes to find a correction for weight-$w$ errors in notable qLDPC codes, such as bivariate bicycle and color codes. This decoder may be useful for ensemble decoding and determining provable code distances, and can be adapted to compute all minimum-weight logical operators of a code. (2) A heuristic decoder: Achieves higher accuracy and faster performance than BP-OSD on the gross code with circuit noise in realistic parameter regimes.", "arxiv_id": "2502.16408", "arxiv_version": "v1", "authors": ["Kai R. Ott", "Bence Hetényi", "Michael E. Beverland"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0542a863e7aab657dcd4bd54e91c9585eec1f225fd6d95555e03b162243d2644", "last_processed_at": "2026-02-21T13:38:14.476583+00:00", "links": {"abs_url": "https://arxiv.org/abs/2502.16408v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2502.16408v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "08ec4aad3afc7aa95c009c479a318a91cbe06130d9bd2b6524053bb5ce005a52", "submitted_date": "2025-02-23", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Decision-tree decoders for general quantum LDPC codes", "updated_date": "2025-02-23"}, {"abstract": "Quantum low-density parity-check (QLDPC) codes are promising candidates for error correction in quantum computers. One of the major challenges in implementing QLDPC codes in quantum computers is the lack of a universal decoder. In this work, we first propose to decode QLDPC codes with a belief propagation (BP) decoder operating on overcomplete check matrices. Then, we extend the neural BP (NBP) decoder, which was originally studied for suboptimal binary BP decoding of QLPDC codes, to quaternary BP decoders. Numerical simulation results demonstrate that both approaches as well as their combination yield a low-latency, high-performance decoder for several short to moderate length QLDPC codes.", "arxiv_id": "2308.08208", "arxiv_version": "v2", "authors": ["Sisi Miao", "Alexander Schnerring", "Haizheng Li", "Laurent Schmalen"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "05ce22d9a8feee70975f3403755f670e9cacc567ff3c02cce5c7a859e448e214", "last_processed_at": "2026-02-21T13:38:23.071339+00:00", "links": {"abs_url": "https://arxiv.org/abs/2308.08208v2", "code_repo_urls": [], "doi": "10.1109/ACCESS.2025.3539475", "pdf_url": "https://arxiv.org/pdf/2308.08208v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "89825431c1e61dc38b7da44d1c52c4581ce01f389325a8ef6938360b6859646a", "submitted_date": "2023-08-16", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Quaternary Neural Belief Propagation Decoding of Quantum LDPC Codes with Overcomplete Check Matrices", "updated_date": "2025-02-15"}, {"abstract": "Scaling up quantum computers to attain substantial speedups over classical computing requires fault tolerance. Conventionally, protocols for fault-tolerant quantum computation demand excessive space overheads by using many physical qubits for each logical qubit. A more recent protocol using quantum analogues of low-density parity-check codes needs only a constant space overhead that does not grow with the number of logical qubits. However, the overhead in the processing time required to implement this protocol grows polynomially with the number of computational steps. To address these problems, here we introduce an alternative approach to constant-space-overhead fault-tolerant quantum computing using a concatenation of multiple small-size quantum codes rather than a single large-size quantum low-density parity-check code. We develop techniques for concatenating different quantum Hamming codes with growing sizes. As a result, we construct a low-overhead protocol to achieve constant space overhead and only quasi-polylogarithmic time overhead simultaneously. Our protocol is fault tolerant even if a decoder has a non-constant runtime, unlike the existing constant-space-overhead protocol. This code concatenation approach will make possible a large class of quantum speedups within feasibly bounded space overhead yet negligibly short time overhead.", "arxiv_id": "2207.08826", "arxiv_version": "v3", "authors": ["Hayata Yamasaki", "Masato Koashi"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0509cd3e25829dffa34880b386e4a287e40f493799cbc69c56cc6c04e105f0c2", "last_processed_at": "2026-02-21T13:38:24.102987+00:00", "links": {"abs_url": "https://arxiv.org/abs/2207.08826v3", "code_repo_urls": [], "doi": "10.1038/s41567-023-02325-8", "pdf_url": "https://arxiv.org/pdf/2207.08826v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "3b710e66f70dc33a92dff6502d899bcd41d44fe3fa8d1a263dfaff9ffc01190e", "submitted_date": "2022-07-18", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Time-Efficient Constant-Space-Overhead Fault-Tolerant Quantum Computation", "updated_date": "2025-01-28"}, {"abstract": "In this paper, we propose a novel message-passing decoding approach that leverages the degeneracy of quantum low-density parity-check codes to enhance decoding performance, eliminating the need for serial scheduling or post-processing. Our focus is on two-block Calderbank-Shor-Steane (CSS) codes, which are composed of symmetric stabilizers that hinder the performance of conventional iterative decoders with uniform update rules. Specifically, our analysis shows that, under the isolation assumption, the min-sum decoder fails to converge when constant-weight errors are applied to symmetric stabilizers, as variable-to-check messages oscillate in every iteration. To address this, we introduce a decoding technique that exploits this oscillatory property by applying distinct update rules: variable nodes in one block utilize messages from previous iterations, while those in the other block are updated conventionally. Logical error-rate results demonstrate that the proposed decoder significantly outperforms the normalized min-sum decoder and achieves competitive performance with belief propagation enhanced by order-zero ordered statistics decoding, all while maintaining linear complexity in the code&#x27;s block length.", "arxiv_id": "2501.05021", "arxiv_version": "v1", "authors": ["Dimitris Chytas", "Nithin Raveendran", "Bane Vasic"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "9c035c49ee32cc7279ac59b1e928376b674b0de99c4229bc131b3b4dfcf04847", "last_processed_at": "2026-02-21T13:38:24.717373+00:00", "links": {"abs_url": "https://arxiv.org/abs/2501.05021v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2501.05021v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "051ba547b0f4aa75127116df0284a190cc73be3c760b6505261e903fd6903a50", "submitted_date": "2025-01-09", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Enhanced Min-Sum Decoding of Quantum Codes Using Previous Iteration Dynamics", "updated_date": "2025-01-09"}, {"abstract": "Error correction allows a quantum computer to preserve states long beyond the decoherence time of its physical qubits. Key to any scheme of error correction is the decoding algorithm, which estimates the error state of qubits from the results of syndrome measurements. The leading proposal for quantum error correction, the surface code, has fast and accurate decoders, but several recently proposed quantum low-density parity check (qLDPC) codes allow more logical information to be encoded in significantly fewer physical qubits. The state-of-the-art decoder for general qLDPC codes, BP-OSD, has a cheap Belief Propagation stage, followed by linear algebra and search stages which can each be slow in practice. We introduce the Ambiguity Clustering decoder (AC) which, after the Belief Propagation stage, divides the measurement data into clusters that can be decoded independently. We benchmark AC on the recently proposed bivariate bicycle qLDPC codes and find that, with 0.3% circuit-level depolarising noise, AC is up to 27x faster than BP-OSD with matched accuracy. Our implementation of AC decodes the 144-qubit Gross code in 135us per round of syndrome extraction on an M2 CPU, already fast enough to keep up with neutral atom and trapped ion systems.", "arxiv_id": "2406.14527", "arxiv_version": "v2", "authors": ["Stasiu Wolanski", "Ben Barber"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5e5b44bd6cd824c782d142256d13a4325cbee7f42c3558b4f2bf7a5eb93cdae4", "last_processed_at": "2026-02-21T13:38:25.532310+00:00", "links": {"abs_url": "https://arxiv.org/abs/2406.14527v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2406.14527v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "6374e1ac683a7719902ec0b7cb98fa6bc222890dbe63255d0078542c6e673caf", "submitted_date": "2024-06-20", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Ambiguity Clustering: an accurate and efficient decoder for qLDPC codes", "updated_date": "2025-01-03"}, {"abstract": "We introduce a new erasure decoder that applies to arbitrary quantum LDPC codes. Dubbed the cluster decoder, it generalizes the decomposition idea of Vertical-Horizontal (VH) decoding introduced by Connelly et al. in 2022. Like the VH decoder, the idea is to first run the peeling decoder and then post-process the resulting stopping set. The cluster decoder breaks the stopping set into a tree of clusters which can be solved sequentially via Gaussian Elimination (GE). By allowing clusters of unconstrained size, this decoder achieves maximum-likelihood (ML) performance with reduced complexity compared with full GE. When GE is applied only to clusters whose sizes are less than a constant, the performance is degraded but the complexity becomes linear in the block length. Our simulation results show that, for hypergraph product codes, the cluster decoder with constant cluster size achieves near-ML performance similar to VH decoding in the low-erasure-rate regime. For the general quantum LDPC codes we studied, the cluster decoder can be used to estimate the ML performance curve with reduced complexity over a wide range of erasure rates.", "arxiv_id": "2412.08817", "arxiv_version": "v1", "authors": ["Hanwen Yao", "Mert Gökduman", "Henry D. Pfister"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f0fb42587e4299546a58b863ebf520e137b565f47422fda2a1997d3a6ba11bde", "last_processed_at": "2026-02-21T13:38:26.323201+00:00", "links": {"abs_url": "https://arxiv.org/abs/2412.08817v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2412.08817v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "bb75470f22c18f45883409a55f2bbb00d2393991053deb0511d8c7d0ecc6c096", "submitted_date": "2024-12-11", "tags": ["cs.IT", "decoder", "decoding", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Cluster Decomposition for Improved Erasure Decoding of Quantum LDPC Codes", "updated_date": "2024-12-11"}, {"abstract": "Quantum error correction (QEC) is critical for scalable and reliable quantum computing, but existing solutions, such as surface codes, incur significant qubit overhead. Quantum low-density parity check (qLDPC) codes have recently emerged as a promising alternative, requiring fewer qubits. However, the lack of efficient decoders remains a major barrier to their practical implementation. In this work, we introduce SymBreak, a novel decoder for qLDPC codes that adaptively modifies the decoding graph to improve the performance of state-of-the-art belief propagation (BP) decoders. Our key contribution is identifying quantum degeneracy as a root cause of the convergence issues often encountered in BP decoding of quantum LDPC codes. We propose a solution that mitigates this issue at the decoding graph level, achieving both fast and accurate decoding. Our results demonstrate that SymBreak outperforms BP and BP+OSD-a more complex variant of BP-with a $16.17\\times$ reduction in logical error rate compared to BP and $3.23\\times$ compared to BP+OSD across various qLDPC code families. With only an $18.97$% time overhead compared to BP, SymBreak provides significantly faster decoding times than BP+OSD, representing a major advancement in efficient and accurate decoding for qLDPC-based QEC architectures.", "arxiv_id": "2412.02885", "arxiv_version": "v1", "authors": ["Keyi Yin", "Xiang Fang", "Jixuan Ruan", "Hezi Zhang", "Dean Tullsen", "Andrew Sornborger", "Chenxu Liu", "Ang Li", "Travis Humble", "Yufei Ding"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "9d593064c4aa9b2760d8ea5fcb9a95d840925d9f77f8ef5fe6b2fdb7bf84f396", "last_processed_at": "2026-02-21T13:38:28.469759+00:00", "links": {"abs_url": "https://arxiv.org/abs/2412.02885v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2412.02885v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "72bda2ee737026a2d20c685a7d001d2ece6d9a81b0c82b20c00ed30f5529b615", "submitted_date": "2024-12-03", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "SymBreak: Mitigating Quantum Degeneracy Issues in QLDPC Code Decoders by Breaking Symmetry", "updated_date": "2024-12-03"}, {"abstract": "Quantum low-density parity-check (LDPC) codes are a promising family of quantum error-correcting codes for fault tolerant quantum computing with low overhead. Decoding quantum LDPC codes on quantum erasure channels has received more attention recently due to advances in erasure conversion for various types of qubits including neutral atoms, trapped ions, and superconducting qubits. Belief propagation with guided decimation (BPGD) decoding of quantum LDPC codes has demonstrated good performance in bit-flip and depolarizing noise. In this work, we apply BPGD decoding to quantum erasure channels. Using a natural modification, we show that BPGD offers competitive performance on quantum erasure channels for multiple families of quantum LDPC codes. Furthermore, we show that the performance of BPGD decoding on erasure channels can sometimes be improved significantly by either adding damping or adjusting the initial channel log-likelihood ratio for bits that are not erased. More generally, our results demonstrate BPGD is an effective general-purpose solution for erasure decoding across the quantum LDPC landscape.", "arxiv_id": "2411.08177", "arxiv_version": "v2", "authors": ["Mert Gökduman", "Hanwen Yao", "Henry D. Pfister"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "36955f8462fb15e04ffcfd7e9a695256ec6f499777ddb1d95cbf0a86728e6f55", "last_processed_at": "2026-02-21T13:38:28.769166+00:00", "links": {"abs_url": "https://arxiv.org/abs/2411.08177v2", "code_repo_urls": [], "doi": "10.1109/Allerton63246.2024.10735275", "pdf_url": "https://arxiv.org/pdf/2411.08177v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5191e4486e9f8378904dda0eb11027624f7c8f8bbf0ebcedd4ae21f1a97d099a", "submitted_date": "2024-11-12", "tags": ["belief propagation", "cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Erasure Decoding for Quantum LDPC Codes via Belief Propagation with Guided Decimation", "updated_date": "2024-11-15"}, {"abstract": "Quantum low-density parity-check (qLDPC) codes are an important component in the quest for quantum fault tolerance. Dramatic recent progress on qLDPC codes has led to constructions which are asymptotically good, and which admit linear-time decoders to correct errors affecting a constant fraction of codeword qubits. These constructions, while theoretically explicit, rely on inner codes with strong properties only shown to exist by probabilistic arguments, resulting in lengths that are too large to be practically relevant. In practice, the surface/toric codes, which are the product of two repetition codes, are still often the qLDPC codes of choice. A previous construction based on the lifted product of an expander-based classical LDPC code with a repetition code (Panteleev &amp; Kalachev, 2020) achieved a near-linear distance (of $Ω(N/\\log N)$ where $N$ is the number of codeword qubits), and avoids the need for such intractable inner codes. Our main result is an efficient decoding algorithm for these codes that corrects $Θ(N/\\log N)$ adversarial errors. En route, we give such an algorithm for the hypergraph product version these codes, which have weaker $Θ(\\sqrt{N})$ distance (but are simpler). Our decoding algorithms leverage the fact that the codes we consider are quasi-cyclic, meaning that they respect a cyclic group symmetry. Since the repetition code is not based on expanders, previous approaches to decoding expander-based qLDPC codes, which typically worked by greedily flipping code bits to reduce some potential function, do not apply in our setting. Instead, we reduce our decoding problem (in a black-box manner) to that of decoding classical expander-based LDPC codes under noisy parity-check syndromes. For completeness, we also include a treatment of such classical noisy-syndrome decoding that is sufficient for our application to the quantum setting.", "arxiv_id": "2411.04464", "arxiv_version": "v1", "authors": ["Louis Golowich", "Venkatesan Guruswami"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "e094faf8f5e9b93365e9693225b499e6de1e88a053ec65df210cd8bfddfa7627", "last_processed_at": "2026-02-21T13:38:30.204388+00:00", "links": {"abs_url": "https://arxiv.org/abs/2411.04464v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2411.04464v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "eb9fe87ef8dad8e379b7d458aafbb867af7f908d6e2b2b2c0657c3c8222e3b8f", "submitted_date": "2024-11-07", "tags": ["cs.IT", "decoder", "decoding", "hypergraph product", "lifted product", "quant-ph", "relevance:maybe"], "title": "Decoding Quasi-Cyclic Quantum LDPC Codes", "updated_date": "2024-11-07"}, {"abstract": "Preparing encoded logical states is the first step in a fault-tolerant quantum computation. Standard approaches based on concatenation or repeated measurement incur a significant time overhead. The Raussendorf-Bravyi-Harrington cluster state offers an alternative: a single-shot preparation of encoded states of the surface code, by means of a constant depth quantum circuit, followed by a single round of measurement and classical feedforward. In this work we generalize this approach and prove that single-shot logical state preparation can be achieved for arbitrary quantum LDPC codes. Our proof relies on a minimum-weight decoder and is based on a generalization of Gottesman&#x27;s clustering-of-errors argument. As an application, we also prove single-shot preparation of the encoded GHZ state in arbitrary quantum LDPC codes. This shows that adaptive noisy constant depth quantum circuits are capable of generating generic robust long-range entanglement.", "arxiv_id": "2411.04405", "arxiv_version": "v1", "authors": ["Thiago Bergamaschi", "Yunchao Liu"], "categories": ["quant-ph", "cond-mat.str-el"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "46c90bce2b90d04ff5c452f5ee10a2bcdaaeb05a23e9dfadb4ec4eb296aadb17", "last_processed_at": "2026-02-21T13:38:31.039802+00:00", "links": {"abs_url": "https://arxiv.org/abs/2411.04405v1", "code_repo_urls": [], "doi": "10.4230/LIPIcs.ITCS.2025.16", "pdf_url": "https://arxiv.org/pdf/2411.04405v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5c45252e571298f9639e87b9f691f7fd35a1ca4dc38988de8a47fe9347fc5af3", "submitted_date": "2024-11-07", "tags": ["cond-mat.str-el", "decoder", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "On fault tolerant single-shot logical state preparation and robust long-range entanglement", "updated_date": "2024-11-07"}, {"abstract": "We give a construction of Quantum Low-Density Parity Check (QLDPC) codes with near-optimal rate-distance tradeoff and efficient list decoding up to the Johnson bound in polynomial time. Previous constructions of list decodable good distance quantum codes either required access to a classical side channel or were based on algebraic constructions that preclude the LDPC property. Our construction relies on new algorithmic results for codes obtained via the quantum analog of the distance amplification scheme of Alon, Edmonds, and Luby [FOCS 1995]. These results are based on convex relaxations obtained using the Sum-of-Squares hierarchy, which reduce the problem of list decoding the distance amplified codes to unique decoding the starting base codes. Choosing these base codes to be the recent breakthrough constructions of good QLDPC codes with efficient unique decoders, we get efficiently list decodable QLDPC codes.", "arxiv_id": "2411.04306", "arxiv_version": "v1", "authors": ["Thiago Bergamaschi", "Fernando Granha Jeronimo", "Tushant Mittal", "Shashank Srivastava", "Madhur Tulsiani"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "a77dbf423ea1c4cafa484ed4759754d254cd9989356d145a5f3b036c8e0e1663", "last_processed_at": "2026-02-21T13:38:31.580702+00:00", "links": {"abs_url": "https://arxiv.org/abs/2411.04306v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2411.04306v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "f417db78c512d72d009a2e37541c2bc5359daca2dcaaad33f5dc8fa0f1afb46b", "submitted_date": "2024-11-06", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "List Decodable Quantum LDPC Codes", "updated_date": "2024-11-06"}, {"abstract": "Quantum error correction (QEC) is essential for operating quantum computers in the presence of noise. Here, we accurately decode arbitrary Calderbank-Shor-Steane (CSS) codes via the maximum satisfiability (MaxSAT) problem. We show how to map quantum maximum likelihood problem of CSS codes of arbitrary geometry and parity check weight into MaxSAT problems. We incorporate the syndrome measurements as hard clauses, while qubit and measurement error probabilities, including biased and non-uniform, are encoded as soft MaxSAT clauses. For the code capacity of color codes on a hexagonal lattice, our decoder has a higher threshold and superior scaling in noise suppression compared to belief propagation with ordered statistics post-processing (BP-OSD), while showing similar scaling in computational cost. Further, we decode surface codes and recently proposed bivariate quantum low-density parity check (QLDPC) codes where we find lower error rates than BP-OSD. Finally, we connect the complexity of MaxSAT decoding to a computational phase transition controlled by the clause density of the MaxSAT problem, where we show that our mapping is always in the computationally &#x27;&#x27;easy`` phase. Our MaxSAT decoder can be further parallelised or implemented on ASICs and FPGAs, promising potential further speedups of several orders of magnitude. Our work provides a flexible platform towards practical applications on quantum computers.", "arxiv_id": "2410.01673", "arxiv_version": "v1", "authors": ["Mohammadreza Noormandipour", "Tobias Haug"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "45633c86765432296d74a7efe9ddab36ae02e6bcec475c50d56919c89453d188", "last_processed_at": "2026-02-21T13:38:32.378957+00:00", "links": {"abs_url": "https://arxiv.org/abs/2410.01673v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2410.01673v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "25e0c1f20f4179e3ff207934fcf919e0512940badaed0555eb3c63210c4b8b93", "submitted_date": "2024-10-02", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "MaxSAT decoders for arbitrary CSS codes", "updated_date": "2024-10-02"}, {"abstract": "A fault-tolerant approach to reliable quantum memory is essential for scalable quantum computing, as physical qubits are susceptible to noise. Quantum error correction (QEC) must be continuously performed to prolong the memory lifetime. In QEC, error syndromes are generated rapidly, often within the execution time of a few quantum gates, requiring decoders to process this error data with equal speed. A typical QEC cycle involves multiple rounds of syndrome measurements, causing potential error locations to scale rapidly with the code size and the number of measurement rounds. However, no such decoders currently exist for general quantum low-density parity-check codes. In this paper, we propose a fault-tolerant belief propagation (FTBP) decoder that utilizes a space-time Tanner graph across multiple rounds of syndrome extraction with mixed-alphabet error variables. To enhance FTBP, we introduce a technique of probabilistic error consolidation to mitigate degeneracy effects and short cycles. Additionally, we propose an adaptive sliding window procedure that captures long error events across window boundaries and adjusts the decoding in real time. Our simulations demonstrate high error thresholds of 0.4%-0.87% and strong error-floor performance for topological code families, including rotated toric, toric color, and twisted XZZX toric codes.", "arxiv_id": "2409.18689", "arxiv_version": "v1", "authors": ["Kao-Yueh Kuo", "Ching-Yi Lai"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "3ae9625912c09fa5508ae21c515825638ed250d09798a181be64acc731519d3c", "last_processed_at": "2026-02-21T13:38:35.541832+00:00", "links": {"abs_url": "https://arxiv.org/abs/2409.18689v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2409.18689v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "3944590d1eecb41b875981a22b0a0abaa7aa166da5914e55a767a2cd6fbf311d", "submitted_date": "2024-09-27", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Fault-Tolerant Belief Propagation for Practical Quantum Memory", "updated_date": "2024-09-27"}, {"abstract": "Quantum error correction is necessary for achieving exponential speedups on important applications. The planar surface code has remained the most studied error-correcting code for the last two decades because of its relative simplicity. However, encoding a singular logical qubit with the planar surface code requires physical qubits quadratic in the code distance~($d$), making it space-inefficient for the large-distance codes necessary for promising applications. Thus, {\\em Quantum Low-Density Parity-Check (QLDPC)} have emerged as an alternative to the planar surface code but require a higher degree of connectivity. Furthermore, the problems of fault-tolerant syndrome extraction and decoding are understudied for these codes and also remain obstacles to their usage. In this paper, we consider two under-studied families of QLDPC codes: hyperbolic surface codes and hyperbolic color codes. We tackle the three challenges mentioned above as follows. {\\em First}, we propose {\\em Flag-Proxy Networks (FPNs)}, a generalizable architecture for quantum codes that achieves low connectivity through flag and proxy qubits. {\\em Second}, we propose a {\\em greedy syndrome extraction scheduling} algorithm for general quantum codes and further use this algorithm for fault-tolerant syndrome extraction on FPNs. {\\em Third}, we present two decoders that leverage flag measurements to decode the hyperbolic codes accurately. Our work finds that degree-4 FPNs of the hyperbolic surface and color codes are respectively $2.9\\times$ and $5.5\\times$ more space-efficient than the $d = 5$ planar surface code, and become even more space-efficient when considering higher distances. The hyperbolic codes also have error rates comparable to their planar counterparts.", "arxiv_id": "2409.14283", "arxiv_version": "v1", "authors": ["Suhas Vittal", "Ali Javadi-Abhari", "Andrew W. Cross", "Lev S. Bishop", "Moinuddin Qureshi"], "categories": ["quant-ph", "cs.AR"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5a786de468140db027a5b5207d8eab3342ab70ff9053e9e71aa87dc4cbe9c1ac", "last_processed_at": "2026-02-21T13:38:36.186237+00:00", "links": {"abs_url": "https://arxiv.org/abs/2409.14283v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2409.14283v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "6bb6bcfb616f4f7a17c3e4aad2966636a8394150b300096d9e71592b94252578", "submitted_date": "2024-09-22", "tags": ["cs.AR", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Flag Proxy Networks: Tackling the Architectural, Scheduling, and Decoding Obstacles of Quantum LDPC codes", "updated_date": "2024-09-22"}, {"abstract": "Color codes are promising quantum error correction (QEC) codes because they have an advantage over surface codes in that all Clifford gates can be implemented transversally. However, thresholds of color codes under circuit-level noise are relatively low mainly because measurements of their high-weight stabilizer generators cause an increase in a circuit depth, and thus, substantial errors are introduced. This makes color codes not the best candidate for fault-tolerant quantum computing. Here, we propose a method to suppress the impact of such errors by optimizing weights of decoders using conditional error probabilities conditioned on the measurement outcomes of flag qubits. In numerical simulations, we improve the threshold of the (4.8.8) color code under circuit-level noise from 0.14% to around 0.27%, which is calculated by using an integer programming decoder. Furthermore, in the (6.6.6) color code, we achieve a circuit-level threshold of around 0.36%, which is almost the same value as the highest value in the previous studies employing the same noise model. In both cases, an effective code distance is also improved compared to a conventional method that uses a single ancilla qubit for each stabilizer measurement. Thereby, the achieved logical error rates at low physical error rates are almost one order of magnitude lower than those of the conventional method with the same code distance. Even when compared to the single ancilla method with higher code distance, considering the increased number of qubits used in our method, we achieve lower logical error rates in most cases. This method can also be applied to other weight-based decoders, making the color codes more promising for the candidate of experimental implementation of QEC. Furthermore, one can utilize this approach to improve a threshold of wider classes of QEC codes, such as high-rate quantum low-density parity check codes.", "arxiv_id": "2402.13958", "arxiv_version": "v2", "authors": ["Yugo Takada", "Keisuke Fujii"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "72b96f367aac889bbe4d18170b4c788b529eade791eb806ff9b52dd2d81d4149", "last_processed_at": "2026-02-21T13:38:38.847053+00:00", "links": {"abs_url": "https://arxiv.org/abs/2402.13958v2", "code_repo_urls": [], "doi": "10.1103/PRXQuantum.5.030352", "pdf_url": "https://arxiv.org/pdf/2402.13958v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "6c1cbc3472893d57cbfd9acb87bccb5e8a948eb0e5bb6fd01600d3ff90409c8f", "submitted_date": "2024-02-21", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Improving threshold for fault-tolerant color code quantum computing by flagged weight optimization", "updated_date": "2024-09-17"}, {"abstract": "Standard approaches to quantum error correction for fault-tolerant quantum computing are based on encoding a single logical qubit into many physical ones, resulting in asymptotically zero encoding rates and therefore huge resource overheads. To overcome this issue, high-rate quantum codes, such as quantum low-density parity-check codes, have been studied over the past decade. In this case, however, it is difficult to perform logical gates in parallel while maintaining low overheads. Here we propose concatenated high-rate small-size quantum error-detecting codes as a new family of high-rate quantum codes. Their simple structure allows for a geometrical interpretation using hypercubes corresponding to logical qubits. We thus call them many-hypercube codes. They can realize both high rates, e.g., 30% (64 logical qubits are encoded into 216 physical ones), and parallelizability of logical gates. Developing dedicated decoder and encoders, we achieve high error thresholds even in a circuit-level noise model. Thus, the many-hypercube codes will pave the way to high-performance fault-tolerant quantum computing.", "arxiv_id": "2403.16054", "arxiv_version": "v3", "authors": ["Hayato Goto"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "ef4272389b00c2b986fd13552cc481aa7d50604108e4b30ef440650669b8520e", "last_processed_at": "2026-02-21T13:38:40.001303+00:00", "links": {"abs_url": "https://arxiv.org/abs/2403.16054v3", "code_repo_urls": [], "doi": "10.1126/sciadv.adp6388", "pdf_url": "https://arxiv.org/pdf/2403.16054v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "677c84b73ccef712130882aa0bf4576e299cb7162a9b0361206fd18d8c433fa8", "submitted_date": "2024-03-24", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Many-hypercube codes: High-rate quantum error-correcting codes for high-performance fault-tolerant quantum computing", "updated_date": "2024-08-28"}, {"abstract": "Error-correcting codes are one of the most fundamental objects in pseudorandomness, with applications in communication, complexity theory, and beyond. Codes are useful because of their ability to support decoding, which is the task of recovering a codeword from its noisy copy. List decoding is a relaxation where the decoder is allowed to output a list of codewords, and has seen tremendous progress over the last 25 years. In this thesis, we prove new algorithmic and combinatorial results about list decoding. We describe a list decoding framework that reduces the task of efficient decoding to proving distance in certain restricted proof systems. We then instantiate this framework for Tanner codes of Sipser and Spielman [IEEE Trans. Inf. Theory 1996] and Alon-Edmonds-Luby (AEL) distance amplification [FOCS 1995] of unique decodable base codes to get the first polynomial time list decoding algorithms for these codes. We also show extensions to the quantum version of AEL distance amplification to get polynomial-time list decodable quantum LDPC codes. We next give an alternate viewpoint of the above framework based on abstract regularity lemmas. We show how to efficiently implement the regularity lemma for the case of Ta-Shma&#x27;s explicit codes near the Gilbert-Varshamov bound [STOC 2017]. This leads to a near-linear time algorithm for unique decoding of Ta-Shma&#x27;s code. We also give new combinatorial results that improve known list sizes beyond the Johnson bound. Firstly, we adapt the AEL amplification to construct a new family of explicit codes that can be combinatorially list decoded to the optimal error correction radius. This is the first example of such a code that does not use significant algebraic ingredients. Secondly, we present list size improvements for Folded Reed-Solomon codes, improving the state of the art list size for explicit list decoding capacity achieving codes.", "arxiv_id": "2408.14652", "arxiv_version": "v1", "authors": ["Shashank Srivastava"], "categories": ["cs.IT", "cs.DS"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "3a5c72285b94ffc1dace8418940fca53b8252817d5d3f148c070c6e04cc053d6", "last_processed_at": "2026-02-21T13:38:41.927653+00:00", "links": {"abs_url": "https://arxiv.org/abs/2408.14652v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2408.14652v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "cc1143b2c30ed6a44bd787f2e07cada3b6eb783eb9832871481e2d3e80fba41f", "submitted_date": "2024-08-26", "tags": ["cs.DS", "cs.IT", "decoder", "decoding", "quantum ldpc", "relevance:relevant"], "title": "Continuous Optimization for Decoding Errors", "updated_date": "2024-08-26"}, {"abstract": "We present Astra, a novel and scalable decoder using graph neural networks. Our decoder works similarly to solving a Sudoku puzzle of constraints represented by the Tanner graph. In general, Quantum Low Density Parity Check (QLDPC) decoding is based on Belief Propagation (BP, a variant of message-passing) and requires time intensive post-processing methods such as Ordered Statistics Decoding (OSD). Without using any post-processing, Astra achieves higher thresholds and better logical error rates when compared to BP+OSD, both for surface codes trained up to distance 11 and Bivariate Bicycle (BB) codes trained up to distance 18. Moreover, we can successfully extrapolate the decoding functionality: we decode high distances (surface code up to distance 25 and BB code up to distance 34) by using decoders trained on lower distances. Astra+OSD is faster than BP+OSD. We show that with decreasing physical error rates, Astra+OSD makes progressively fewer calls to OSD when compared to BP+OSD, even in the context of extrapolated decoding. Astra(+OSD) achieves orders of magnitude lower logical error rates for BB codes compared to BP(+OSD). The source code is open-sourced at \\url{https://github.com/arshpreetmaan/astra}.", "arxiv_id": "2408.07038", "arxiv_version": "v2", "authors": ["Arshpreet Singh Maan", "Alexandru Paler"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "e2ffe32e99c28b321a885adc00d520a2bc9a0ed47744ec519c719f365dfddcc9", "last_processed_at": "2026-02-21T13:38:43.514679+00:00", "links": {"abs_url": "https://arxiv.org/abs/2408.07038v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2408.07038v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0a7550db2cd793c3d6eac3bc5f61dd37733c8361b06563a8d9386e6483f0f476", "submitted_date": "2024-08-13", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Machine Learning Message-Passing for the Scalable Decoding of QLDPC Codes", "updated_date": "2024-08-26"}, {"abstract": "We propose a decoder for the correction of erasures with hypergraph product codes, which form one of the most popular families of quantum LDPC codes. Our numerical simulations show that this decoder provides a close approximation of the maximum likelihood decoder that can be implemented in O(N^2) bit operations where N is the length of the quantum code. A probabilistic version of this decoder can be implemented in O(N^1.5) bit operations.", "arxiv_id": "2208.01002", "arxiv_version": "v3", "authors": ["Nicholas Connolly", "Vivien Londe", "Anthony Leverrier", "Nicolas Delfosse"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "e2ca759d704efa51c100cdcec7aed4a877f05131c4d7aba2cdc2374ec034572c", "last_processed_at": "2026-02-21T13:38:44.391196+00:00", "links": {"abs_url": "https://arxiv.org/abs/2208.01002v3", "code_repo_urls": [], "doi": "10.22331/q-2024-08-27-1450", "pdf_url": "https://arxiv.org/pdf/2208.01002v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "8a066891929a457b4b5698f5d1d591678c49e3f124d40578345ffabc70073e4f", "submitted_date": "2022-08-01", "tags": ["cs.IT", "decoder", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Fast erasure decoder for hypergraph product codes", "updated_date": "2024-08-21"}, {"abstract": "In this paper, we propose a novel decoding method for Quantum Low-Density Parity-Check (QLDPC) codes based on Graph Neural Networks (GNNs). Similar to the Belief Propagation (BP)-based QLDPC decoders, the proposed GNN-based QLDPC decoder exploits the sparse graph structure of QLDPC codes and can be implemented as a message-passing decoding algorithm. We compare the proposed GNN-based decoding algorithm against selected classes of both conventional and neural-enhanced QLDPC decoding algorithms across several QLDPC code designs. The simulation results demonstrate excellent performance of GNN-based decoders along with their low complexity compared to competing methods.", "arxiv_id": "2408.05170", "arxiv_version": "v1", "authors": ["Vukan Ninkovic", "Ognjen Kundacina", "Dejan Vukobratovic", "Christian Häger", "Alexandre Graell i Amat"], "categories": ["quant-ph", "cs.IT", "cs.LG"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "d79407f938a8728a7a288e4924ed0745f47d97d76fa7db616597fb9e30531e33", "last_processed_at": "2026-02-21T13:38:44.985236+00:00", "links": {"abs_url": "https://arxiv.org/abs/2408.05170v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2408.05170v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "c3d80613a10f0830b668061d125769c3bb7ad929e387bd5a6eacca15ae2c2e50", "submitted_date": "2024-08-09", "tags": ["belief propagation", "cs.IT", "cs.LG", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Decoding Quantum LDPC Codes Using Graph Neural Networks", "updated_date": "2024-08-09"}, {"abstract": "Fast decoding algorithms are decisive for real-time quantum error correction and for analyzing properties of error correction codes. Here, we develop variants of the union-find decoder that simplify its implementation and provide potential decoding speed advantages. Furthermore, we show how these methods can be adapted to decode non-topological quantum low-density-parity-check (qLDPC) codes. All the developed decoders can directly include both qubit erasures and Pauli errors in the decoding step, thus addressing the dominant noise mechanisms for photonic quantum computing. We investigate the strengths and weaknesses of the different decoder variants, benchmark their speed and threshold error rates on several codes, and provide the used source code.", "arxiv_id": "2407.15988", "arxiv_version": "v1", "authors": ["Matthias C. Löbl", "Susan X. Chen", "Stefano Paesani", "Anders S. Sørensen"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "baee298457623ef9248c75c8972c84a795ad163b3b8490a00b8ed649464b6e54", "last_processed_at": "2026-02-21T13:38:46.004560+00:00", "links": {"abs_url": "https://arxiv.org/abs/2407.15988v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2407.15988v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "union-find"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "b06c6b4762f630bbecd016a3c5e220042aafe99b7c4c3a8b5305094bfa7058a0", "submitted_date": "2024-07-22", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe", "union-find"], "title": "Breadth-first graph traversal union-find decoder", "updated_date": "2024-07-22"}, {"abstract": "Several notions of code products are known in quantum error correction, such as hyper-graph products, homological products, lifted products, balanced products, to name a few. In this paper we introduce a new product code construction which is a natural generalisation of classical product codes to quantum codes: starting from a set of component Calderbank-Shor-Steane (CSS) codes, a larger CSS code is obtained where both $X$ parity checks and $Z$ parity checks are associated to classical product codes. We deduce several properties of product CSS codes from the properties of the component codes, including bounds to the code distance, and show that built-in redundancies in the parity checks result in so-called meta-checks which can be exploited to correct syndrome read-out errors. We then specialise to the case of single-parity-check (SPC) product codes which in the classical domain are a common choice for constructing product codes. Logical error rate simulations of a SPC $3$-fold product CSS code having parameters $[[512,174,8]]$ are shown under both a maximum likelihood decoder for the erasure channel and belief propagation decoding for depolarising noise. We compare the results with other codes of comparable length and dimension, including a code from the family of asymptotically good Tanner codes. We observe that our reference product CSS code outperforms all the other examined codes.", "arxiv_id": "2209.13474", "arxiv_version": "v2", "authors": ["Dimiter Ostrev", "Davide Orsucci", "Francisco Lázaro", "Balazs Matuz"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "6af089db5c2f155271c5f9bfebb5e90cb7333a686eae677796059e307f6ff873", "last_processed_at": "2026-02-21T13:38:47.373445+00:00", "links": {"abs_url": "https://arxiv.org/abs/2209.13474v2", "code_repo_urls": [], "doi": "10.22331/q-2024-07-22-1420", "pdf_url": "https://arxiv.org/pdf/2209.13474v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation", "balanced product", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "e7c2992ab04fc711fce5ea9667d752c3f97ae126977902b7a7dfe4bdd113f32a", "submitted_date": "2022-09-27", "tags": ["balanced product", "belief propagation", "cs.IT", "decoder", "decoding", "lifted product", "quant-ph", "relevance:maybe"], "title": "Classical product code constructions for quantum Calderbank-Shor-Steane codes", "updated_date": "2024-07-18"}, {"abstract": "Quantum low-density parity-check (QLDPC) codes have been proven to achieve higher minimum distances at higher code rates than surface codes. However, this family of codes imposes stringent latency requirements and poor performance under iterative decoding, especially when the variable degree is low. In this work, we improve both the error correction performance and decoding latency of variable degree-3 (dv-3) QLDPC codes under iterative decoding. Firstly, we perform a detailed analysis of the structure of a well-known family of QLDPC codes, i.e., hypergraph product-based codes. Then, we propose a decoding approach that stems from the knowledge of harmful configurations apparent in these codes. Our decoding scheme is based on applying a modified version of bit flipping (BF) decoding, namely two-bit bit flipping (TBF) decoding, which adds more degrees of freedom to BF decoding. The granularity offered by TBF decoding helps us design sets of decoders
