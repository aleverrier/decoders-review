propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "9b95ce740395af962474ceddcbfdc7168e92f795d929dd713bd0a6d528593626", "submitted_date": "2012-02-02", "tags": ["belief propagation", "cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Channel Identification and its Impact on Quantum LDPC Code Performance", "updated_date": "2012-02-02"}, {"abstract": "This paper develops a general method for constructing entanglement-assisted quantum low-density parity-check (LDPC) codes, which is based on combinatorial design theory. Explicit constructions are given for entanglement-assisted quantum error-correcting codes (EAQECCs) with many desirable properties. These properties include the requirement of only one initial entanglement bit, high error correction performance, high rates, and low decoding complexity. The proposed method produces infinitely many new codes with a wide variety of parameters and entanglement requirements. Our framework encompasses various codes including the previously known entanglement-assisted quantum LDPC codes having the best error correction performance and many new codes with better block error rates in simulations over the depolarizing channel. We also determine important parameters of several well-known classes of quantum and classical LDPC codes for previously unsettled cases.", "arxiv_id": "1008.4747", "arxiv_version": "v4", "authors": ["Yuichiro Fujiwara", "David Clark", "Peter Vandendriessche", "Maarten De Boeck", "Vladimir D. Tonchev"], "categories": ["cs.IT", "math.CO", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0741ef8de47742ff870f2375924e58dd39a899d20375939a091adef6da60a19f", "last_processed_at": "2026-02-21T13:39:54.917577+00:00", "links": {"abs_url": "https://arxiv.org/abs/1008.4747v4", "code_repo_urls": [], "doi": "10.1103/PhysRevA.82.042338", "pdf_url": "https://arxiv.org/pdf/1008.4747v4"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "9730661db31f80d8adee3551c73a487c7cb56e935f3efec619d9171335042b8f", "submitted_date": "2010-08-27", "tags": ["cs.IT", "decoding", "math.CO", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Entanglement-assisted quantum low-density parity-check codes", "updated_date": "2010-11-01"}, {"abstract": "Low-density parity check (LDPC) codes are a significant class of classical codes with many applications. Several good LDPC codes have been constructed using random, algebraic, and finite geometries approaches, with containing cycles of length at least six in their Tanner graphs. However, it is impossible to design a self-orthogonal parity check matrix of an LDPC code without introducing cycles of length four. In this paper, a new class of quantum LDPC codes based on lines and points of finite geometries is constructed. The parity check matrices of these codes are adapted to be self-orthogonal with containing only one cycle of length four. Also, the column and row weights, and bounds on the minimum distance of these codes are given. As a consequence, the encoding and decoding algorithms of these codes as well as their performance over various quantum depolarizing channels will be investigated.", "arxiv_id": "0712.4115", "arxiv_version": "v3", "authors": ["Salah A. Aly"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "069c0c5d0fc3e4349b5f0e82429e7b8c2823cc9e3ef16c5ce9d34a1f1cc4418d", "last_processed_at": "2026-02-21T13:39:55.460974+00:00", "links": {"abs_url": "https://arxiv.org/abs/0712.4115v3", "code_repo_urls": [], "doi": "10.1109/GLOCOM.2008.ECP.217", "pdf_url": "https://arxiv.org/pdf/0712.4115v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "7bd9b9d5a41205cf5ab5f35e30b83cb011aab3f8f7fa72a8b961d660acfe7018", "submitted_date": "2007-12-26", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "A Class of Quantum LDPC Codes Constructed From Finite Geometries", "updated_date": "2009-11-11"}, {"abstract": "We present a theory of quantum serial turbo-codes, describe their iterative decoding algorithm, and study their performances numerically on a depolarization channel. Our construction offers several advantages over quantum LDPC codes. First, the Tanner graph used for decoding is free of 4-cycles that deteriorate the performances of iterative decoding. Secondly, the iterative decoder makes explicit use of the code&#x27;s degeneracy. Finally, there is complete freedom in the code design in terms of length, rate, memory size, and interleaver choice. We define a quantum analogue of a state diagram that provides an efficient way to verify the properties of a quantum convolutional code, and in particular its recursiveness and the presence of catastrophic error propagation. We prove that all recursive quantum convolutional encoder have catastrophic error propagation. In our constructions, the convolutional codes have thus been chosen to be non-catastrophic and non-recursive. While the resulting families of turbo-codes have bounded minimum distance, from a pragmatic point of view the effective minimum distances of the codes that we have simulated are large enough not to degrade the iterative decoding performance up to reasonable word error rates and block sizes. With well chosen constituent convolutional codes, we observe an important reduction of the word error rate as the code length increases.", "arxiv_id": "0712.2888", "arxiv_version": "v2", "authors": ["David Poulin", "Jean-Pierre Tillich", "Harold Ollivier"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "592550eb22062e5cfba76c4adaf45da23bf63cdd34ad76c12f08bbbbfaf36311", "last_processed_at": "2026-02-21T13:39:58.110392+00:00", "links": {"abs_url": "https://arxiv.org/abs/0712.2888v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/0712.2888v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5172503d4d3699a119050548c64f2d5efaa1ede57b8d3ab7cff9f03d02712c00", "submitted_date": "2007-12-18", "tags": ["decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Quantum serial turbo-codes", "updated_date": "2009-06-10"}];
    const el = document.getElementById('results');
    const q = document.getElementById('q');

    function render(items) {
      el.innerHTML = items.map(p => `
        <div class="item">
          <div><a href="${p.links.abs_url}" target="_blank" rel="noreferrer">${p.title}</a></div>
          <div class="meta">${p.arxiv_id}${p.arxiv_version} | ${p.primary_category} | relevance=${p.relevance?.label ?? 'unknown'}</div>
          <div class="meta">decoder=${p.decoder?.decoder_family ?? 'unknown'} | updated=${p.updated_date}</div>
        </div>
      `).join('');
    }

    function filter() {
      const needle = q.value.trim().toLowerCase();
      if (!needle) return render(data);
      const items = data.filter(p => {
        const text = [
          p.title,
          p.abstract,
          p.primary_category,
          (p.categories || []).join(' '),
          p.relevance?.label,
          p.decoder?.decoder_family,
          p.decoder?.name
        ].join(' ').toLowerCase();
        return text.includes(needle);
      });
      render(items);
    }

    q.addEventListener('input', filter);
    render(data);
  </script>
