that operate in parallel and can collectively decode error patterns appearing in harmful configurations of the code, thus addressing both the latency and performance requirements. Finally, simulation results demonstrate that the proposed decoding scheme surpasses other iterative decoding approaches for various dv-3 QLDPC codes.", "arxiv_id": "2406.17070", "arxiv_version": "v1", "authors": ["Dimitris Chytas", "Nithin Raveendran", "Bane Vasić"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5f5fa0a076dcaf6276fa684a5333e92ec46f1d44751e54148e8c989135e00eab", "last_processed_at": "2026-02-21T13:38:48.129890+00:00", "links": {"abs_url": "https://arxiv.org/abs/2406.17070v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2406.17070v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5c3bde32fee05785e2d26e793be5db872c86adc55fbe493a8ffb0b4c5b5a59df", "submitted_date": "2024-06-24", "tags": ["cs.IT", "decoder", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Collective Bit Flipping-Based Decoding of Quantum LDPC Codes", "updated_date": "2024-06-24"}, {"abstract": "Quantum low-density parity-check (QLDPC) codes have emerged as a promising technique for quantum error correction. A variety of decoders have been proposed for QLDPC codes and many of them utilize belief propagation (BP) decoding in some fashion. However, the use of BP decoding for degenerate QLDPC codes is known to have issues with convergence. These issues are typically attributed to short cycles in the Tanner graph and code degeneracy (i.e. multiple error patterns with the same syndrome). Although various methods have been proposed to mitigate the non-convergence issue, such as BP with ordered statistics decoding (BP-OSD) and BP with stabilizer inactivation (BP-SI), achieving better performance with lower complexity remains an active area of research. In this work, we propose a decoder for QLDPC codes based on BP guided decimation (BPGD), which has been previously studied for constraint satisfaction and lossy compression problems. The decimation process is applicable to both binary and quaternary BP and it involves sequentially fixing the value of the most reliable qubits to encourage BP convergence. Despite its simplicity, We find that BPGD significantly reduces the BP failure rate due to non-convergence, achieving performance on par with BP with ordered statistics decoding and BP with stabilizer inactivation, without the need to solve systems of linear equations.", "arxiv_id": "2312.10950", "arxiv_version": "v2", "authors": ["Hanwen Yao", "Waleed Abu Laban", "Christian Häger", "Alexandre Graell i Amat", "Henry D. Pfister"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "6720054622cb88e6b148743a3f2057c7bdce6697702f0814892a3c3afdb8fc0e", "last_processed_at": "2026-02-21T13:38:48.751925+00:00", "links": {"abs_url": "https://arxiv.org/abs/2312.10950v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2312.10950v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "2614757446a14a8de14e7adbb246734390f9bae193aa3e4c94676facd756034e", "submitted_date": "2023-12-18", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Belief Propagation Decoding of Quantum LDPC Codes with Guided Decimation", "updated_date": "2024-06-21"}, {"abstract": "We present a new family of quantum low-density parity-check codes, which we call radial codes, obtained from the lifted product of a specific subset of classical quasi-cyclic codes. The codes are defined using a pair of integers $(r,s)$ and have parameters $[\\![2r^2s,2(r-1)^2,\\leq2s]\\!]$, with numerical studies suggesting average-case distance linear in $s$. In simulations of circuit-level noise, we observe comparable error suppression to surface codes of similar distance while using approximately five times fewer physical qubits. This is true even when radial codes are decoded using a single-shot approach, which can allow for faster logical clock speeds and reduced decoding complexity. We describe an intuitive visual representation, canonical basis of logical operators and optimal-length stabiliser measurement circuits for these codes, and argue that their error correction capabilities, tunable parameters and small size make them promising candidates for implementation on near-term quantum devices.", "arxiv_id": "2406.14445", "arxiv_version": "v1", "authors": ["Thomas R. Scruby", "Timo Hillmann", "Joschka Roffe"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "1ceb6e481af2b7fafcc367b14756f7e4b65d93b062b1ba81c028dd9a25208ef5", "last_processed_at": "2026-02-21T13:38:50.056818+00:00", "links": {"abs_url": "https://arxiv.org/abs/2406.14445v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2406.14445v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "503d299d210ec6b6d138b68fd6af92c024f2ee55f24c0dff0a1d204c95615da7", "submitted_date": "2024-06-20", "tags": ["decoding", "lifted product", "quant-ph", "relevance:maybe"], "title": "High-threshold, low-overhead and single-shot decodable fault-tolerant quantum memory", "updated_date": "2024-06-20"}, {"abstract": "Quantum error correction is crucial for scalable quantum information processing applications. Traditional discrete-variable quantum codes that use multiple two-level systems to encode logical information can be hardware-intensive. An alternative approach is provided by bosonic codes, which use the infinite-dimensional Hilbert space of harmonic oscillators to encode quantum information. Two promising features of bosonic codes are that syndrome measurements are natively analog and that they can be concatenated with discrete-variable codes. In this work, we propose novel decoding methods that explicitly exploit the analog syndrome information obtained from the bosonic qubit readout in a concatenated architecture. Our methods are versatile and can be generally applied to any bosonic code concatenated with a quantum low-density parity-check (QLDPC) code. Furthermore, we introduce the concept of quasi-single-shot protocols as a novel approach that significantly reduces the number of repeated syndrome measurements required when decoding under phenomenological noise. To realize the protocol, we present a first implementation of time-domain decoding with the overlapping window method for general QLDPC codes, and a novel analog single-shot decoding method. Our results lay the foundation for general decoding algorithms using analog information and demonstrate promising results in the direction of fault-tolerant quantum computation with concatenated bosonic-QLDPC codes.", "arxiv_id": "2311.01328", "arxiv_version": "v2", "authors": ["Lucas Berent", "Timo Hillmann", "Jens Eisert", "Robert Wille", "Joschka Roffe"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "20be5090719659dc48bc633153d5d2dc79511b391069c0d1f25acb0470301c26", "last_processed_at": "2026-02-21T13:39:00.501472+00:00", "links": {"abs_url": "https://arxiv.org/abs/2311.01328v2", "code_repo_urls": [], "doi": "10.1103/PRXQuantum.5.020349", "pdf_url": "https://arxiv.org/pdf/2311.01328v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "daaabd3e03f01d7893da5ddbf7551cdb027bc7a3899649c641163a29e97657c8", "submitted_date": "2023-11-02", "tags": ["cs.IT", "decoding", "quant-ph", "relevance:maybe"], "title": "Analog information decoding of bosonic quantum LDPC codes", "updated_date": "2024-06-10"}, {"abstract": "Decoders that provide an estimate of the probability of a logical failure conditioned on the error syndrome (\"soft-output decoders\") can reduce the overhead cost of fault-tolerant quantum memory and computation. In this work, we construct efficient soft-output decoders for the surface code derived from the Minimum-Weight Perfect Matching and Union-Find decoders. We show that soft-output decoding can improve the performance of a \"hierarchical code,\" a concatenated scheme in which the inner code is the surface code, and the outer code is a high-rate quantum low-density parity-check code. Alternatively, the soft-output decoding can improve the reliability of fault-tolerant circuit sampling by flagging those runs that should be discarded because the probability of a logical error is intolerably large.", "arxiv_id": "2405.07433", "arxiv_version": "v2", "authors": ["Nadine Meister", "Christopher A. Pattison", "John Preskill"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "ebbbda60deba4adbd6f24c5c041925627cbf4e065a9e5eacb070bd2dd26f7ee7", "last_processed_at": "2026-02-21T13:39:01.389697+00:00", "links": {"abs_url": "https://arxiv.org/abs/2405.07433v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2405.07433v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "union-find"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "c2776d9396b8d23785405ce272108512d304723430da41b679f7ee2bb166a9d8", "submitted_date": "2024-05-13", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe", "union-find"], "title": "Efficient soft-output decoders for the surface code", "updated_date": "2024-06-01"}, {"abstract": "Iterative decoder failures of quantum low density parity check (QLDPC) codes are attributed to substructures in the code&#x27;s graph, known as trapping sets, as well as degenerate errors that can arise in quantum codes. Failure inducing sets are subsets of codeword coordinates that, when initially in error, lead to decoding failure in a trapping set. The purpose of this paper is to examine failure inducing sets of QLDPC codes under syndrome-based iterative decoding. As for classical LDPC codes, we show that absorbing sets play a central role in understanding decoder failures. Raveendran and Vasic initiated the study of quantum trapping sets, where beyond the classical-type trapping sets, they identified rigid symmetric structures (a.k.a symmetric stabilizers) responsible for degenerate errors. In this paper, we show that this behavior is part of a much more general phenomenon that can be described by the absorbing set framework.", "arxiv_id": "2307.14532", "arxiv_version": "v2", "authors": ["Kirsten D. Morris", "Tefjol Pllaha", "Christine A. Kelley"], "categories": ["cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "302a473437bad2b5c25e7d6ab9c31d39d488fc71802f1ff833509a20123792b4", "last_processed_at": "2026-02-21T13:39:01.798138+00:00", "links": {"abs_url": "https://arxiv.org/abs/2307.14532v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2307.14532v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "20c76fb7c2227207cb676b21d39359d492379c6a5c60d140e7368dfd8325241d", "submitted_date": "2023-07-26", "tags": ["cs.IT", "decoder", "decoding", "relevance:maybe"], "title": "Absorbing Sets in Quantum LDPC Codes", "updated_date": "2024-05-10"}, {"abstract": "The development and use of large-scale quantum computers relies on integrating quantum error-correcting (QEC) schemes into the quantum computing pipeline. A fundamental part of the QEC protocol is the decoding of the syndrome to identify a recovery operation with a high success rate. In this work, we implement a decoder that finds the recovery operation with the highest success probability by mapping the decoding problem to a spin system and using Population Annealing to estimate the free energy of the different error classes. We study the decoder performance on a 4.8.8 color code lattice under different noise models, including code capacity with bit-flip and depolarizing noise, and phenomenological noise, which considers noisy measurements, with performance reaching near-optimal thresholds. This decoding algorithm can be applied to a wide variety of stabilizer codes, including surface codes and quantum low-density parity-check (qLDPC) codes.", "arxiv_id": "2405.03776", "arxiv_version": "v1", "authors": ["Fernando Martínez-García", "Francisco Revson F. Pereira", "Pedro Parrado-Rodríguez"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "fed5a4415c49918e5e5c6449f3267e89a845d2e5f087da5e06ed14ff0546b74a", "last_processed_at": "2026-02-21T13:39:03.025276+00:00", "links": {"abs_url": "https://arxiv.org/abs/2405.03776v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2405.03776v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "9c1416244036f62ae746a82f06535af29fa0b83870f12e57e75082a4b78162c7", "submitted_date": "2024-05-06", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Near-optimal decoding algorithm for color codes using Population Annealing", "updated_date": "2024-05-06"}, {"abstract": "Quantum low-density parity-check (QLDPC) codes are among the most promising candidates for future quantum error correction schemes. However, a limited number of short to moderate-length QLDPC codes have been designed and their decoding performance is sub-optimal with a quaternary belief propagation (BP) decoder due to unavoidable short cycles in their Tanner graphs. In this paper, we propose a novel joint code and decoder design for QLDPC codes. The constructed codes have a minimum distance of about the square root of the block length. In addition, it is, to the best of our knowledge, the first QLDPC code family where BP decoding is not impaired by short cycles of length 4. This is achieved by using an ensemble BP decoder mitigating the influence of assembled short cycles. We outline two code construction methods based on classical quasi-cyclic codes and finite geometry codes. Numerical results demonstrate outstanding decoding performance over depolarizing channels.", "arxiv_id": "2401.06874", "arxiv_version": "v3", "authors": ["Sisi Miao", "Jonathan Mandelbaum", "Holger Jäkel", "Laurent Schmalen"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "db551987e7f5709ebb96c22dc02e4f46432ce0dc4e3ab40b89cb3dcbf35c6094", "last_processed_at": "2026-02-21T13:39:03.504232+00:00", "links": {"abs_url": "https://arxiv.org/abs/2401.06874v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2401.06874v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "c7b878d081ff8286b8608de0f1b9042f012d09aa4e865287c3135f1694d27d11", "submitted_date": "2024-01-12", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "A Joint Code and Belief Propagation Decoder Design for Quantum LDPC Codes", "updated_date": "2024-05-05"}, {"abstract": "Hypergraph product codes are a promising avenue to achieving fault-tolerant quantum computation with constant overhead. When embedding these and other constant-rate qLDPC codes into 2D, a significant number of nonlocal connections are required, posing difficulties for some quantum computing architectures. In this work, we introduce a fault-tolerance scheme that aims to alleviate the effects of implementing this nonlocality by measuring generators acting on spatially distant qubits less frequently than those which do not. We investigate the performance of a simplified version of this scheme, where the measured generators are randomly selected. When applied to hypergraph product codes and a modified small-set-flip decoding algorithm, we prove that for a sufficiently high percentage of generators being measured, a threshold still exists. We also find numerical evidence that the logical error rate is exponentially suppressed even when a large constant fraction of generators are not measured.", "arxiv_id": "2306.17122", "arxiv_version": "v3", "authors": ["Noah Berthusen", "Daniel Gottesman"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f77a49c4ea01c182fb8834f315bede2ad2967d9e2d641f91b3d7b360b4d58959", "last_processed_at": "2026-02-21T13:39:04.737354+00:00", "links": {"abs_url": "https://arxiv.org/abs/2306.17122v3", "code_repo_urls": [], "doi": "10.22331/q-2024-05-14-1345", "pdf_url": "https://arxiv.org/pdf/2306.17122v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "small-set-flip", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "78a57d32e47d2680442ef4dece30b18dbd4966095c3784b675f6a9036bc30d30", "submitted_date": "2023-06-29", "tags": ["decoding", "hypergraph product", "quant-ph", "relevance:maybe", "small-set-flip"], "title": "Partial Syndrome Measurement for Hypergraph Product Codes", "updated_date": "2024-05-01"}, {"abstract": "The inherent degeneracy of quantum low-density parity-check codes poses a challenge to their decoding, as it significantly degrades the error-correction performance of classical message-passing decoders. To improve their performance, a post-processing algorithm is usually employed. To narrow the gap between algorithmic solutions and hardware limitations, we introduce a new post-processing algorithm with a hardware-friendly orientation, providing error correction performance competitive to the state-of-the-art techniques. The proposed post-processing, referred to as check-agnosia, is inspired by stabilizer-inactivation, while considerably reducing the required hardware resources, and providing enough flexibility to allow different message-passing schedules and hardware architectures. We carry out a detailed analysis for a set of Pareto architectures with different tradeoffs between latency and power consumption, derived from the results of implemented designs on an FPGA board. We show that latency values close to one microsecond can be obtained on the FPGA board, and provide evidence that much lower latency values can be obtained for ASIC implementations. In the process, we also demonstrate the practical implications of the recently introduced t-covering layers and random-order layered scheduling.", "arxiv_id": "2310.15000", "arxiv_version": "v3", "authors": ["Julien du Crest", "Francisco Garcia-Herrero", "Mehdi Mhalla", "Valentin Savin", "Javier Valls"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "4dde2d04b062e720dbc5afcf9f18ffbbfab818bf1f56de36649840a5bef2b5d2", "last_processed_at": "2026-02-21T13:39:05.539397+00:00", "links": {"abs_url": "https://arxiv.org/abs/2310.15000v3", "code_repo_urls": [], "doi": "10.22331/q-2024-05-02-1334", "pdf_url": "https://arxiv.org/pdf/2310.15000v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "e4a1898333f6170f06b735c5bc7f627eb25f9d8b2185aa9ef619ad8d34adc280", "submitted_date": "2023-10-23", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Check-Agnosia based Post-Processor for Message-Passing Decoding of Quantum LDPC Codes", "updated_date": "2024-04-29"}, {"abstract": "Quantum Tanner codes constitute a family of quantum low-density parity-check (LDPC) codes with good parameters, i.e., constant encoding rate and relative distance. In this article, we prove that quantum Tanner codes also facilitate single-shot quantum error correction (QEC) of adversarial noise, where one measurement round (consisting of constant-weight parity checks) suffices to perform reliable QEC even in the presence of measurement errors. We establish this result for both the sequential and parallel decoding algorithms introduced by Leverrier and Zémor. Furthermore, we show that in order to suppress errors over multiple repeated rounds of QEC, it suffices to run the parallel decoding algorithm for constant time in each round. Combined with good code parameters, the resulting constant-time overhead of QEC and robustness to (possibly time-correlated) adversarial noise make quantum Tanner codes alluring from the perspective of quantum fault-tolerant protocols.", "arxiv_id": "2306.12470", "arxiv_version": "v2", "authors": ["Shouzhen Gu", "Eugene Tang", "Libor Caha", "Shin Ho Choe", "Zhiyang He", "Aleksander Kubica"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "15c0be0284077ac91859392842067204c9dc8e782c8eb1b0fe8392a2349fa39c", "last_processed_at": "2026-02-21T13:39:06.036102+00:00", "links": {"abs_url": "https://arxiv.org/abs/2306.12470v2", "code_repo_urls": [], "doi": "10.1007/s00220-024-04951-6", "pdf_url": "https://arxiv.org/pdf/2306.12470v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "84d5d22faafd3ad20a7cee8563fd4990aa07d6c61d97808a3549feec3a313a8d", "submitted_date": "2023-06-21", "tags": ["cs.IT", "decoding", "quant-ph", "relevance:maybe"], "title": "Single-shot decoding of good quantum LDPC codes", "updated_date": "2024-04-11"}, {"abstract": "We introduce a sliding window decoder based on belief propagation (BP) with guided decimation for the purposes of decoding quantum low-density parity-check codes in the presence of circuit-level noise. Windowed decoding keeps the decoding complexity reasonable when, as is typically the case, repeated rounds of syndrome extraction are required to decode. Within each window, we employ several rounds of BP with decimation of the variable node that we expect to be the most likely to flip in each round, Furthermore, we employ ensemble decoding to keep both decimation options (guesses) open in a small number of chosen rounds. We term the resulting decoder BP with guided decimation guessing (GDG). Applied to bivariate bicycle codes, GDG achieves a similar logical error rate as BP with an additional OSD post-processing stage (BP+OSD) and combination-sweep of order 10. For a window size of three syndrome cycles, a multi-threaded CPU implementation of GDG achieves a worst-case decoding latency of 3ms per window for the [[144,12,12]] code.", "arxiv_id": "2403.18901", "arxiv_version": "v1", "authors": ["Anqi Gong", "Sebastian Cammerer", "Joseph M. Renes"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "754063ccc937090302681790b6ee90fe69decc97b9df5f1a9fb734e47e6578db", "last_processed_at": "2026-02-21T13:39:06.598589+00:00", "links": {"abs_url": "https://arxiv.org/abs/2403.18901v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2403.18901v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "045b904395c2cfe78422351ea5661382de8078b251d348617d7f074146f1ba25", "submitted_date": "2024-03-27", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Toward Low-latency Iterative Decoding of QLDPC Codes Under Circuit-Level Noise", "updated_date": "2024-03-27"}, {"abstract": "Decoding algorithms are essential to fault-tolerant quantum-computing architectures. In this perspective we explore decoding algorithms for the surface code; a prototypical quantum low-density parity-check code that underlies many of the leading efforts to demonstrate scalable quantum computing. Central to our discussion is the minimum-weight perfect-matching decoder. The decoder works by exploiting underlying structure that arises due to materialised symmetries among surface-code stabilizer elements. By concentrating on these symmetries, we begin to address the question of how a minimum-weight perfect-matching decoder might be generalised for other families of codes. We approach this question first by investigating examples of matching decoders for other codes. These include decoding algorithms that have been specialised to correct for noise models that demonstrate a particular structure or bias with respect to certain codes. In addition to this, we propose a systematic way of constructing a minimum-weight perfect-matching decoder for codes with certain characteristic properties. The properties we make use of are common among topological codes. We discuss the broader applicability of the proposal, and we suggest some questions we can address that may show us how to design a generalised matching decoder for arbitrary stabilizer codes.", "arxiv_id": "2207.06428", "arxiv_version": "v2", "authors": ["Benjamin J. Brown"], "categories": ["quant-ph", "cond-mat.stat-mech", "cond-mat.str-el"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "c6e41e9bf25768ba1fb51d617ffc8c3b074aae57bc7dea2ba2a92c0aab19bb1d", "last_processed_at": "2026-02-21T13:39:07.183803+00:00", "links": {"abs_url": "https://arxiv.org/abs/2207.06428v2", "code_repo_urls": [], "doi": "10.1109/MBITS.2023.3246025", "pdf_url": "https://arxiv.org/pdf/2207.06428v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "371f4158cd924827ff9c9e2d7bb7921741c81697490b531cc384c01b5059fd2c", "submitted_date": "2022-07-13", "tags": ["cond-mat.stat-mech", "cond-mat.str-el", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Conservation laws and quantum error correction: towards a generalised matching decoder", "updated_date": "2024-02-28"}, {"abstract": "Quantum error correction is the building block for constructing fault-tolerant quantum processors that can operate reliably even if its constituting elements are corrupted by decoherence. In this context, real-time decoding is a necessity for implementing arbitrary quantum computations on the logical level. In this work, we present a new decoder for Quantum Low Density Parity Check (QLDPC) codes, named the closed-branch decoder, with a worst-case complexity loosely upper bounded by $\\mathcal{O}(n\\text{max}_{\\text{gr}}\\text{max}_{\\text{br}})$, where $\\text{max}_{\\text{gr}}$ and $\\text{max}_{\\text{br}}$ are tunable parameters that pose the accuracy versus speed trade-off of decoding algorithms. For the best precision, the $\\text{max}_{\\text{gr}}\\text{max}_{\\text{br}}$ product increases exponentially as $\\propto dj^d$, where $d$ indicates the distance of the code and $j$ indicates the average row weight of its parity check matrix. Nevertheless, we numerically show that considering small values that are polynomials of the code distance are enough for good error correction performance. The decoder is described to great extent and compared with the Belief Propagation Ordered Statistics Decoder (BPOSD) operating over data qubit, phenomenological and circuit-level noise models for the class of Bivariate Bicycle (BB) codes. The results showcase a promising performance of the decoder, obtaining similar results with much lower complexity than BPOSD when considering the smallest distance codes, but experiencing some logical error probability degradation for the larger ones. Ultimately, the performance and complexity of the decoder depends on the product $\\text{max}_{\\text{gr}}\\text{max}_{\\text{br}}$, which can be considered taking into account benefiting one of the two aspects at the expense of the other.", "arxiv_id": "2402.01532", "arxiv_version": "v2", "authors": ["Antonio deMarti iOlius", "Josu Etxezarreta Martinez"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "8625bedb047b651c28a9d9817d3b568bc638cc87ea37d6a413904e46ad527acf", "last_processed_at": "2026-02-21T13:39:07.731718+00:00", "links": {"abs_url": "https://arxiv.org/abs/2402.01532v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2402.01532v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "04c55131f00cb4d5a89fad2de1ec5289fb74e8741f7ea352de8625ac4c6c65c7", "submitted_date": "2024-02-02", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "The closed-branch decoder for quantum LDPC codes", "updated_date": "2024-02-14"}, {"abstract": "This paper proposes two approaches for reducing the impact of the error floor phenomenon when decoding quantum low-density parity-check codes with belief propagation based algorithms. First, a low-complexity syndrome-based linear programming (SB-LP) decoding algorithm is proposed, and second, the proposed SB-LP is applied as a post-processing step after syndrome-based min-sum (SB-MS) decoding. For the latter case, a new early stopping criterion is introduced to decide when to activate the SB-LP algorithm, avoiding executing a predefined maximum number of iterations for the SB-MS decoder. Simulation results show, for a sample hypergraph code, that the proposed decoder can lower the error floor by two to three orders of magnitude compared to SB-MS for the same total number of decoding iterations.", "arxiv_id": "2311.18488", "arxiv_version": "v2", "authors": ["Sana Javed", "Francisco Garcia-Herrero", "Bane Vasic", "Mark F. Flanagan"], "categories": ["cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "572874f25d98ddb07c426b020300dc0fbc0c6e968c1572848be05aa43000c36e", "last_processed_at": "2026-02-21T13:39:08.916530+00:00", "links": {"abs_url": "https://arxiv.org/abs/2311.18488v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2311.18488v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "93755c719372e7cc32e83ca5767eaad5561de8dabfb73ecf715b5b28a3cd6baf", "submitted_date": "2023-11-30", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "relevance:maybe"], "title": "Low-Complexity Linear Programming Based Decoding of Quantum LDPC codes", "updated_date": "2024-01-19"}, {"abstract": "Recent constructions of quantum low-density parity-check (QLDPC) codes provide optimal scaling of the number of logical qubits and the minimum distance in terms of the code length, thereby opening the door to fault-tolerant quantum systems with minimal resource overhead. However, the hardware path from nearest-neighbor-connection-based topological codes to long-range-interaction-demanding QLDPC codes is a challenging one. Given the practical difficulty in building a monolithic architecture for quantum computers based on optimal QLDPC codes, it is worth considering a distributed implementation of such codes over a network of interconnected quantum processors. In such a setting, all syndrome measurements and logical operations must be performed using high-fidelity shared entangled states between the processing nodes. Since probabilistic many-to-1 distillation schemes for purifying entanglement are inefficient, we investigate quantum error correction based entanglement purification in this work. Specifically, we employ QLDPC codes to distill GHZ states, as the resulting high-fidelity logical GHZ states can interact directly with the code used to perform distributed quantum computing (DQC), e.g. for fault-tolerant Steane syndrome extraction. This protocol is applicable beyond DQC since entanglement purification is a quintessential task of any quantum network. We use the min-sum algorithm (MSA) based iterative decoder for distilling $3$-qubit GHZ states using a rate $0.118$ family of lifted product QLDPC codes and obtain an input threshold of $\\approx 0.7974$ under i.i.d. single-qubit depolarizing noise. This represents the best threshold for a yield of $0.118$ for any GHZ purification protocol. Our results apply to larger size GHZ states as well, where we extend our technical result about a measurement property of $3$-qubit GHZ states to construct a scalable GHZ purification protocol.", "arxiv_id": "2210.14143", "arxiv_version": "v2", "authors": ["Narayanan Rengaswamy", "Nithin Raveendran", "Ankur Raina", "Bane Vasić"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "85cfe738d6b7910f259fb36881b5c66fbd3e9d16491bfd3aa362f8839db8a958", "last_processed_at": "2026-02-21T13:39:10.554892+00:00", "links": {"abs_url": "https://arxiv.org/abs/2210.14143v2", "code_repo_urls": [], "doi": "10.22331/q-2024-01-24-1233", "pdf_url": "https://arxiv.org/pdf/2210.14143v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "7781e46b61a9dac23bffa14938b1f07fa8f3984b47bb02062b7ec0e484ff8b7a", "submitted_date": "2022-10-25", "tags": ["cs.IT", "decoder", "lifted product", "quant-ph", "relevance:maybe"], "title": "Entanglement Purification with Quantum LDPC Codes and Iterative Decoding", "updated_date": "2024-01-16"}, {"abstract": "We propose a new method called decoupling representation to represent Pauli operators as vectors over $GF(2)$, based on which we propose partially decoupled belief propagation and fully decoupled belief propagation decoding algorithm for quantum low density parity-check codes. These two algorithms have the capability to deal with the correlations between the $X$ part and the $Z$ part of the vectors in symplectic representation, which are introduced by Pauli $Y$ errors. Hence, they can not only apply to CSS codes, but also to non-CSS codes. Under the assumption that there is no measurement error, compared with traditional belief propagation algorithm in symplectic representation over $GF(2)$, within the same number of iterations, the decoding accuracy of partially decoupled belief propagation and fully decoupled belief propagation algorithm is significantly improved in pure $Y$ noise and depolarizing noise, which supports that decoding algorithms of quantum error correcting codes might have better performance in decoupling representation than in symplectic representation. The impressive performance of fully decoupled belief propagation algorithm might promote the realization of quantum error correcting codes in engineering.", "arxiv_id": "2305.17505", "arxiv_version": "v4", "authors": ["Zhengzhong Yi", "Zhipeng Liang", "Kaixin Zhong", "Yulin Wu", "Zhou Fang", "Xuan Wang"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "18adbb239438f819a3adff2320edb7fe7008f92835bad26b5ac1255b0d5713cf", "last_processed_at": "2026-02-21T13:39:13.765519+00:00", "links": {"abs_url": "https://arxiv.org/abs/2305.17505v4", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2305.17505v4"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "f5aa632acdb2faf8d45b1a57daad9712c08839250ba6990407245e8ba91d8cf7", "submitted_date": "2023-05-27", "tags": ["belief propagation", "decoding", "quant-ph", "relevance:maybe"], "title": "Improved belief propagation decoding algorithm based on decoupling representation of Pauli operators for quantum LDPC codes", "updated_date": "2023-12-04"}, {"abstract": "Classical locally recoverable codes, which permit highly efficient recovery from localized errors as well as global recovery from larger errors, provide some of the most useful codes for distributed data storage in practice. In this paper, we initiate the study of quantum locally recoverable codes (qLRCs). In the long term, like their classical counterparts, such qLRCs may be used for large-scale quantum data storage. Our results also have concrete implications for quantum LDPC codes, which are applicable to near-term quantum error-correction. After defining quantum local recoverability, we provide an explicit construction of qLRCs based on the classical LRCs of Tamo and Barg (2014), which we show have (1) a close-to-optimal rate-distance tradeoff (i.e. near the Singleton bound), (2) an efficient decoder, and (3) permit good spatial locality in a physical implementation. Although the analysis is significantly more involved than in the classical case, we obtain close-to-optimal parameters by introducing a \"folded\" version of our quantum Tamo-Barg (qTB) codes, which we then analyze using a combination of algebraic techniques. We furthermore present and analyze two additional constructions using more basic techniques, namely random qLRCs, and qLRCs from AEL distance amplification. Each of these constructions has some advantages, but neither achieves all 3 properties of our folded qTB codes described above. We complement these constructions with Singleton-like bounds that show our qLRC constructions achieve close-to-optimal parameters. We also apply these results to obtain Singleton-like bounds for qLDPC codes, which to the best of our knowledge are novel. We then show that even the weakest form of a stronger locality property called local correctability, which permits more robust local recovery and is achieved by certain classical codes, is impossible quantumly.", "arxiv_id": "2311.08653", "arxiv_version": "v1", "authors": ["Louis Golowich", "Venkatesan Guruswami"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "cbcf8ce8b6ba3bdd3f1ccc556c1fac29f47efab03611da32838e0c747149986b", "last_processed_at": "2026-02-21T13:39:14.378716+00:00", "links": {"abs_url": "https://arxiv.org/abs/2311.08653v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2311.08653v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "cb7166dc7b38ffdd38272f2e1f4d7af33ceb819f8bc0bd71908768a24d8957e0", "submitted_date": "2023-11-15", "tags": ["cs.IT", "decoder", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Quantum Locally Recoverable Codes", "updated_date": "2023-11-15"}, {"abstract": "Quantum error correction (QEC) with single-shot decoding enables reduction of errors after every single round of noisy stabilizer measurement, easing the time-overhead requirements for fault tolerance. Notably, several classes of quantum low-density-parity-check (qLDPC) codes are known which facilitate single-shot decoding, potentially giving them an additional overhead advantage. However, the perceived advantage of single-shot decoding is limited because it can significantly degrade the effective code distance. This degradation may be compensated for by using a much larger code size to achieve the desired target logical error rate, at the cost of increasing the amount of syndrome information to be processed, as well as, increasing complexity of logical operations. Alternatively, in this work we study sliding-window decoding, which corrects errors from previous syndrome measurement rounds while leaving the most recent errors for future correction. We observe that sliding-window decoding significantly improves the logical memory lifetime and hence the effective distance compared to single-shot decoding on hypergraph-product codes and lifted-product codes. Remarkably, we find that this improvement may not cost a larger decoding complexity. Thus, the sliding-window strategy can be more desirable for fast and accurate decoding for fault-tolerant quantum computing with qLDPC codes.", "arxiv_id": "2311.03307", "arxiv_version": "v1", "authors": ["Shilin Huang", "Shruti Puri"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "d93daa77623faf4d4aa51db5734186b35fc55282146cf7bc363e163cc26eae36", "last_processed_at": "2026-02-21T13:39:15.251101+00:00", "links": {"abs_url": "https://arxiv.org/abs/2311.03307v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2311.03307v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "49759b07102cae60a784a0c542c0c99e8846da4a61e50f9c44d1cbe08adb425b", "submitted_date": "2023-11-06", "tags": ["decoding", "quant-ph", "relevance:maybe"], "title": "Improved Noisy Syndrome Decoding of Quantum LDPC Codes with Sliding Window", "updated_date": "2023-11-06"}, {"abstract": "In this work, we propose a fully differentiable iterative decoder for quantum low-density parity-check (LDPC) codes. The proposed algorithm is composed of classical belief propagation (BP) decoding stages and intermediate graph neural network (GNN) layers. Both component decoders are defined over the same sparse decoding graph enabling a seamless integration and scalability to large codes. The core idea is to use the GNN component between consecutive BP runs, so that the knowledge from the previous BP run, if stuck in a local minima caused by trapping sets or short cycles in the decoding graph, can be leveraged to better initialize the next BP run. By doing so, the proposed decoder can learn to compensate for sub-optimal BP decoding graphs that result from the design constraints of quantum LDPC codes. Since the entire decoder remains differentiable, gradient descent-based training is possible. We compare the error rate performance of the proposed decoder against various post-processing methods such as random perturbation, enhanced feedback, augmentation, and ordered-statistics decoding (OSD) and show that a carefully designed training process lowers the error-floor significantly. As a result, our proposed decoder outperforms the former three methods using significantly fewer post-processing attempts. The source code of our experiments is available online.", "arxiv_id": "2310.17758", "arxiv_version": "v2", "authors": ["Anqi Gong", "Sebastian Cammerer", "Joseph M. Renes"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "88d6ce3489adc7af5bd3437decb0df1b5417c5ee78e7bf6218b8d15e7c07dda2", "last_processed_at": "2026-02-21T13:39:15.510735+00:00", "links": {"abs_url": "https://arxiv.org/abs/2310.17758v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2310.17758v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "39374f3e25917cbab6065adaf312d769317f7ef6e46172f250ef2886de940c04", "submitted_date": "2023-10-26", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Graph Neural Networks for Enhanced Decoding of Quantum LDPC Codes", "updated_date": "2023-11-06"}, {"abstract": "For a quantum error correcting code to be used in practice, it needs to be equipped with an efficient decoding algorithm, which identifies corrections given the observed syndrome of errors.Hypergraph product codes are a promising family of constant-rate quantum LDPC codes that have a linear-time decoding algorithm called Small-Set-Flip ($\\texttt{SSF}$) (Leverrier, Tillich, Zémor FOCS 2015). The algorithm proceeds by iteratively applying small corrections which reduce the syndrome weight. Together, these small corrections can provably correct large errors for sufficiently large codes with sufficiently large (but constant) stabilizer weight. However, this guarantee does not hold for small codes with low stabilizer weight. In this case, $\\texttt{SSF}$ can terminate with stopping failures, meaning it encounters an error for which it is unable to identify a small correction. We find that the structure of errors that cause stopping failures have a simple form for sufficiently small qubit failure rates. We propose a new decoding algorithm called the Projection-Along-a-Line ($\\texttt{PAL}$) decoder to supplement $\\texttt{SSF}$ after stopping failures. Using $\\texttt{SSF}+\\texttt{PAL}$ as a combined decoder, we find an order-of-magnitude improvement in the logical error rate.", "arxiv_id": "2311.00877", "arxiv_version": "v1", "authors": ["Lev Stambler", "Anirudh Krishna", "Michael E. Beverland"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b9e609bfea57627dc6a9998737084268f3511198a71532331e9c8b8636003e25", "last_processed_at": "2026-02-21T13:39:16.772969+00:00", "links": {"abs_url": "https://arxiv.org/abs/2311.00877v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2311.00877v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "small-set-flip", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "e4c68c37a1569284a885c42c69e3aa62a10f5eeac0a4e12643f6f91558f07da4", "submitted_date": "2023-11-01", "tags": ["decoder", "decoding", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant", "small-set-flip"], "title": "Addressing Stopping Failures for Small Set Flip Decoding of Hypergraph Product Codes", "updated_date": "2023-11-01"}, {"abstract": "Quantum low-density parity-check (LDPC) codes, a class of quantum error correcting codes, are considered a blueprint for scalable quantum circuits. To use these codes, one needs efficient decoding algorithms. In the classical setting, there are multiple efficient decoding algorithms available, including Viderman&#x27;s algorithm (Viderman, TOCT 2013). Viderman&#x27;s algorithm for classical LDPC codes essentially reduces the error-correction problem to that of erasure-correction, by identifying a small envelope $L$ that is guaranteed to contain the error set. Our main result is a generalization of Viderman&#x27;s algorithm to quantum LDPC codes, namely hypergraph product codes (Tillich, Zémor, IEEE T-IT, 2013). This is the first erasure-conversion algorithm that can correct up to $Ω(D)$ errors for constant-rate quantum LDPC codes, where $D$ is the distance of the code. In that sense, it is also fundamentally different from existing decoding algorithms, in particular from the small-set-flip algorithm (Leverrier, Tillich, Zémor, FOCS, 2015). Moreover, in some parameter regimes, our decoding algorithm improves on the decoding radius of existing algorithms. We note that we do not yet have linear-time erasure-decoding algorithms for quantum LDPC codes, and thus the final running time of the whole decoding algorithm is not linear; however, we view our linear-time envelope-finding algorithm as an important first step.", "arxiv_id": "2310.07868", "arxiv_version": "v1", "authors": ["Anirudh Krishna", "Inbal Livni Navon", "Mary Wootters"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "c6425d90a9ea122e42785b618cd3338cc4ac8c25afc7624935a74cd85a1e393e", "last_processed_at": "2026-02-21T13:39:17.305965+00:00", "links": {"abs_url": "https://arxiv.org/abs/2310.07868v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2310.07868v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding", "small-set-flip", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "9cc4221dae04e33e6622319727ea55a390be709eaf8f2e9d6bd8d55112cb0dc3", "submitted_date": "2023-10-11", "tags": ["decoding", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant", "small-set-flip"], "title": "Viderman&#x27;s algorithm for quantum LDPC codes", "updated_date": "2023-10-11"}, {"abstract": "We address the problem of performing message-passing-based decoding of quantum LDPC codes under hardware latency limitations. We propose a novel way to do layered decoding that suits quantum constraints and outperforms flooded scheduling, the usual scheduling on parallel architectures. A generic construction is given to construct layers of hypergraph product codes. In the process, we introduce two new notions, t-covering layers which is a generalization of the usual layer decomposition, and a new scheduling called random order scheduling. Numerical simulations show that the random ordering is of independent interest as it helps relieve the high error floor typical of message-passing decoders on quantum codes for both layered and serial decoding without the need for post-processing.", "arxiv_id": "2308.13377", "arxiv_version": "v1", "authors": ["Julien Du Crest", "Francisco Garcia-Herrero", "Mehdi Mhalla", "Valentin Savin", "Javier Valls"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "cd2f23df4cbb8f862003416d4d26e9721874593eee6116acc4fb84f4b39b48c2", "last_processed_at": "2026-02-21T13:39:17.789952+00:00", "links": {"abs_url": "https://arxiv.org/abs/2308.13377v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2308.13377v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "634a644d80389fa6bb80e7c9c315d12be6ec27f8cd7528d5813128840b551225", "submitted_date": "2023-08-25", "tags": ["decoder", "decoding", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Layered Decoding of Quantum LDPC Codes", "updated_date": "2023-08-25"}, {"abstract": "We propose a general framework for decoding quantum error-correcting codes with generative modeling. The model utilizes autoregressive neural networks, specifically Transformers, to learn the joint probability of logical operators and syndromes. This training is in an unsupervised way, without the need for labeled training data, and is thus referred to as pre-training. After the pre-training, the model can efficiently compute the likelihood of logical operators for any given syndrome, using maximum likelihood decoding. It can directly generate the most-likely logical operators with computational complexity $\\mathcal O(2k)$ in the number of logical qubits $k$, which is significantly better than the conventional maximum likelihood decoding algorithms that require $\\mathcal O(4^k)$ computation. Based on the pre-trained model, we further propose refinement to achieve more accurately the likelihood of logical operators for a given syndrome by directly sampling the stabilizer operators. We perform numerical experiments on stabilizer codes with small code distances, using both depolarizing error models and error models with correlated noise. The results show that our approach provides significantly better decoding accuracy than the minimum weight perfect matching and belief-propagation-based algorithms. Our framework is general and can be applied to any error model and quantum codes with different topologies such as surface codes and quantum LDPC codes. Furthermore, it leverages the parallelization capabilities of GPUs, enabling simultaneous decoding of a large number of syndromes. Our approach sheds light on the efficient and accurate decoding of quantum error-correcting codes using generative artificial intelligence and modern computational power.", "arxiv_id": "2307.09025", "arxiv_version": "v1", "authors": ["Hanyan Cao", "Feng Pan", "Yijia Wang", "Pan Zhang"], "categories": ["quant-ph", "cond-mat.stat-mech", "cs.LG", "stat.ML"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b66aa313793dcf5b7c817d25d0ae0bea56fd54d4f461550f5647d7fdb05c68b7", "last_processed_at": "2026-02-21T13:39:18.279717+00:00", "links": {"abs_url": "https://arxiv.org/abs/2307.09025v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2307.09025v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "d60de6790772ab87f5aa7e32adc7ff0319fa4cbb9692bab72b2612ba669aec98", "submitted_date": "2023-07-18", "tags": ["cond-mat.stat-mech", "cs.LG", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant", "stat.ML"], "title": "qecGPT: decoding Quantum Error-correcting Codes with Generative Pre-trained Transformers", "updated_date": "2023-07-18"}, {"abstract": "In this work we study the single-shot performance of higher dimensional hypergraph product codes decoded using belief-propagation and ordered-statistics decoding [Panteleev and Kalachev, 2021]. We find that decoding data qubit and syndrome measurement errors together in a single stage leads to single-shot thresholds that greatly exceed all previously observed single-shot thresholds for these codes. For the 3D toric code and a phenomenological noise model, our results are consistent with a sustainable threshold of 7.1% for $Z$ errors, compared to the threshold of 2.90% previously found using a two-stage decoder~[Quintavalle et al., 2021]. For the 4D toric code, for which both $X$ and $Z$ error correction is single-shot, our results are consistent with a sustainable single-shot threshold of 4.3% which is even higher than the threshold of 2.93% for the 2D toric code for the same noise model but using $L$ rounds of stabiliser measurement. We also explore the performance of balanced product and 4D hypergraph product codes which we show lead to a reduction in qubit overhead compared the surface code for phenomenological error rates as high as 1%.", "arxiv_id": "2206.03122", "arxiv_version": "v2", "authors": ["Oscar Higgott", "Nikolas P. Breuckmann"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "664a9bf5eeb6d6285bc00ff1e090ef75d9c8bfd7105f29f69db4eac612deba16", "last_processed_at": "2026-02-21T13:39:18.957100+00:00", "links": {"abs_url": "https://arxiv.org/abs/2206.03122v2", "code_repo_urls": [], "doi": "10.1103/PRXQuantum.4.020332", "pdf_url": "https://arxiv.org/pdf/2206.03122v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product", "balanced product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "9f1b27ee5216ad2ea912ddacfd04b2e7a5942585ec7f395ef84825505b83e102", "submitted_date": "2022-06-07", "tags": ["balanced product", "decoder", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Improved single-shot decoding of higher dimensional hypergraph product codes", "updated_date": "2023-06-27"}, {"abstract": "Belief propagation (BP) is well-known as a low complexity decoding algorithm with a strong performance for important classes of quantum error correcting codes, e.g. notably for the quantum low-density parity check (LDPC) code class of random expander codes. However, it is also well-known that the performance of BP breaks down when facing topological codes such as the surface code, where naive BP fails entirely to reach a below-threshold regime, i.e. the regime where error correction becomes useful. Previous works have shown, that this can be remedied by resorting to post-processing decoders outside the framework of BP. In this work, we present a generalized belief propagation method with an outer re-initialization loop that successfully decodes surface codes, i.e. opposed to naive BP it recovers the sub-threshold regime known from decoders tailored to the surface code and from statistical-mechanical mappings. We report a threshold of 17% under independent bit-and phase-flip data noise (to be compared to the ideal threshold of 20.6%) and a threshold value of 14%$under depolarizing data noise (compared to the ideal threshold of 18.9%), which are on par with thresholds achieved by non-BP post-processing methods.", "arxiv_id": "2212.03214", "arxiv_version": "v2", "authors": ["Josias Old", "Manuel Rispler"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "6a396410290fb292bd43f2a64b1db30295b7327e9a0e7877b80a6a557a78c757", "last_processed_at": "2026-02-21T13:39:20.483333+00:00", "links": {"abs_url": "https://arxiv.org/abs/2212.03214v2", "code_repo_urls": [], "doi": "10.22331/q-2023-06-07-1037", "pdf_url": "https://arxiv.org/pdf/2212.03214v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "d2dfff9092c673f5ef7c90e1435a1ad58710afcbc5d6479bf40c8c017badd98e", "submitted_date": "2022-12-06", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Generalized Belief Propagation Algorithms for Decoding of Surface Codes", "updated_date": "2023-06-06"}, {"abstract": "Bias-tailoring allows quantum error correction codes to exploit qubit noise asymmetry. Recently, it was shown that a modified form of the surface code, the XZZX code, exhibits considerably improved performance under biased noise. In this work, we demonstrate that quantum low density parity check codes can be similarly bias-tailored. We introduce a bias-tailored lifted product code construction that provides the framework to expand bias-tailoring methods beyond the family of 2D topological codes. We present examples of bias-tailored lifted product codes based on classical quasi-cyclic codes and numerically assess their performance using a belief propagation plus ordered statistics decoder. Our Monte Carlo simulations, performed under asymmetric noise, show that bias-tailored codes achieve several orders of magnitude improvement in their error suppression relative to depolarising noise.", "arxiv_id": "2202.01702", "arxiv_version": "v3", "authors": ["Joschka Roffe", "Lawrence Z. Cohen", "Armanda O. Quintavalle", "Daryus Chandra", "Earl T. Campbell"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "4b9d1fe048935ab49f404eca93879fd52bbbde3aad6ad564689b14fc12e359e3", "last_processed_at": "2026-02-21T13:39:21.201617+00:00", "links": {"abs_url": "https://arxiv.org/abs/2202.01702v3", "code_repo_urls": [], "doi": "10.22331/q-2023-05-15-1005", "pdf_url": "https://arxiv.org/pdf/2202.01702v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "belief propagation", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "5a50e9345468303477d064ec5591941979866848ae65bbd1f1f4dc2d5bc453eb", "submitted_date": "2022-02-03", "tags": ["belief propagation", "decoder", "lifted product", "quant-ph", "relevance:maybe"], "title": "Bias-tailored quantum LDPC codes", "updated_date": "2023-05-05"}, {"abstract": "Quantum information needs to be protected by quantum error-correcting codes due to imperfect physical devices and operations. One would like to have an efficient and high-performance decoding procedure for the class of quantum stabilizer codes. A potential candidate is Pearl&#x27;s belief propagation (BP), but its performance suffers from the many short cycles inherent in a quantum stabilizer code, especially highly-degenerate codes. A general impression exists that BP is not effective for topological codes. In this paper, we propose a decoding algorithm for quantum codes based on quaternary BP with additional memory effects (called MBP). This MBP is like a recursive neural network with inhibitions between neurons (edges with negative weights), which enhance the perception capability of a network. Moreover, MBP exploits the degeneracy of a quantum code so that the most probable error or its degenerate errors can be found with high probability. The decoding performance is significantly improved over the conventional BP for various quantum codes, including quantum bicycle, hypergraph-product, surface and toric codes. For MBP on the surface and toric codes over depolarizing errors, we observe error thresholds of 16% and 17.5%, respectively.", "arxiv_id": "2104.13659", "arxiv_version": "v2", "authors": ["Kao-Yueh Kuo", "Ching-Yi Lai"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b7018ab7fbf161941010408b73662ea17df1d096879561fafbbb2f05eb637c3c", "last_processed_at": "2026-02-21T13:39:24.377186+00:00", "links": {"abs_url": "https://arxiv.org/abs/2104.13659v2", "code_repo_urls": [], "doi": "10.1038/s41534-022-00623-2", "pdf_url": "https://arxiv.org/pdf/2104.13659v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "b1f67d66d6ca4e730fa071cf253e6b775cd0c3a009fcb843417e56ca0126422c", "submitted_date": "2021-04-28", "tags": ["belief propagation", "cs.IT", "decoding", "quant-ph", "relevance:maybe"], "title": "Exploiting Degeneracy in Belief Propagation Decoding of Quantum Codes", "updated_date": "2023-04-02"}, {"abstract": "The recent success in constructing asymptotically good quantum low-density parity-check (QLDPC) codes makes this family of codes a promising candidate for error-correcting schemes in quantum computing. However, conventional belief propagation (BP) decoding of QLDPC codes does not yield satisfying performance due to the presence of unavoidable short cycles in their Tanner graph and the special degeneracy phenomenon. In this work, we propose to decode QLDPC codes based on a check matrix with redundant rows, generated from linear combinations of the rows in the original check matrix. This approach yields a significant improvement in decoding performance with the additional advantage of very low decoding latency. Furthermore, we propose a novel neural belief propagation decoder based on the quaternary BP decoder of QLDPC codes which leads to further decoding performance improvements.", "arxiv_id": "2212.10245", "arxiv_version": "v2", "authors": ["Sisi Miao", "Alexander Schnerring", "Haizheng Li", "Laurent Schmalen"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "1670d0d40881cff22ceec39945427939ccb8d16f2ff4d4300fb5a3e6968d1fe2", "last_processed_at": "2026-02-21T13:39:24.590983+00:00", "links": {"abs_url": "https://arxiv.org/abs/2212.10245v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2212.10245v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0f7701368d84b917f3e6d641cdd3a7d2e8931d66caccc77858b9e0524022b307", "submitted_date": "2022-12-20", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Neural Belief Propagation Decoding of Quantum LDPC Codes Using Overcomplete Check Matrices", "updated_date": "2023-03-21"}, {"abstract": "We propose a post-processing method for message-passing (MP) decoding of CSS quantum LDPC codes, called stabilizer-inactivation (SI). It relies on inactivating a set of qubits, supporting a check in the dual code, and then running the MP decoding again. This allows MP decoding to converge outside the inactivated set of qubits, while the error on these is determined by solving a small, constant size, linear system. Compared to the state of the art post-processing method based on ordered statistics decoding (OSD), we show through numerical simulations that MP-SI outperforms MP-OSD for different quantum LDPC code constructions, different MP decoding algorithms, and different MP scheduling strategies, while having a significantly reduced complexity.", "arxiv_id": "2205.06125", "arxiv_version": "v3", "authors": ["Julien du Crest", "Mehdi Mhalla", "Valentin Savin"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "38ceb3441614677ba7f7386e1c99c6a166d05ad346fde5141159e9a922a5d2ed", "last_processed_at": "2026-02-21T13:39:25.374050+00:00", "links": {"abs_url": "https://arxiv.org/abs/2205.06125v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2205.06125v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "7c7f4ccb2964c143eec6f9185a477e54ea2d96dbe2b789a5fdc27b3549e4754f", "submitted_date": "2022-05-12", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Stabilizer Inactivation for Message-Passing Decoding of Quantum LDPC Codes", "updated_date": "2023-03-14"}, {"abstract": "We introduce sequential and parallel decoders for quantum Tanner codes. When the Tanner code construction is applied to a sufficiently expanding square complex with robust local codes, we obtain a family of asymptotically good quantum low-density parity-check codes. In this case, our decoders provably correct arbitrary errors of weight linear in the code length, respectively in linear or logarithmic time. The same decoders are easily adapted to the expander lifted product codes of Panteleev and Kalachev. Along the way, we exploit recently established bounds on the robustness of random tensor codes to give a tighter bound on the minimum distance of quantum Tanner codes.", "arxiv_id": "2208.05537", "arxiv_version": "v3", "authors": ["Anthony Leverrier", "Gilles Zémor"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5a40fb23aa19a44f362f6884f58ecb26932237a14e7117c59658d40bcd267ceb", "last_processed_at": "2026-02-
