21T13:39:25.912520+00:00", "links": {"abs_url": "https://arxiv.org/abs/2208.05537v3", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2208.05537v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "1fcfabc90365aaf71edf4af1829362ab423ac825dee58e2180a4301ce9fe846f", "submitted_date": "2022-08-10", "tags": ["cs.IT", "decoder", "lifted product", "quant-ph", "relevance:maybe"], "title": "Decoding quantum Tanner codes", "updated_date": "2022-12-08"}, {"abstract": "Shor and Steane ancilla are two well-known methods for fault-tolerant logical measurements, which are successful on small codes and their concatenations. On large quantum low-density-parity-check (LDPC) codes, however, Shor and Steane measurements have impractical time and space overhead respectively. In this work, we widen the choice of ancilla codes by unifying Shor and Steane measurements into a single framework, called homomorphic measurements. For any Calderbank-Shor-Steane (CSS) code with the appropriate ancilla code, one can avoid repetitive measurements or complicated ancilla state preparation procedures such as distillation, which overcomes the difficulties of both Shor and Steane methods. As an example, we utilize the theory of covering spaces to construct homomorphic measurement protocols for arbitrary $X$- or $Z$-type logical Pauli operators on surface codes in general, including the toric code and hyperbolic surface codes. Conventional surface code decoders, such as minimum-weight perfect matching, can be directly applied to our constructions.", "arxiv_id": "2211.03625", "arxiv_version": "v2", "authors": ["Shilin Huang", "Tomas Jochym-O&#x27;Connor", "Theodore J. Yoder"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f55dec91dea5048060406e606b9303e6898c2c7835606c45b2059f9ee4166ffc", "last_processed_at": "2026-02-21T13:39:28.023976+00:00", "links": {"abs_url": "https://arxiv.org/abs/2211.03625v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2211.03625v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "be97aeaede4bb8840539c21180de881b07c28f22816d5af4d2d9898999934a28", "submitted_date": "2022-11-07", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Homomorphic Logical Measurements", "updated_date": "2022-11-08"}, {"abstract": "We introduce and analyse an efficient decoder for the quantum Tanner codes of that can correct adversarial errors of linear weight. Previous decoders for quantum low-density parity-check codes could only handle adversarial errors of weight $O(\\sqrt{n \\log n})$. We also work on the link between quantum Tanner codes and the Lifted Product codes of Panteleev and Kalachev, and show that our decoder can be adapted to the latter. The decoding algorithm alternates between sequential and parallel procedures and converges in linear time.", "arxiv_id": "2206.07571", "arxiv_version": "v2", "authors": ["Anthony Leverrier", "Gilles Zémor"], "categories": ["quant-ph", "cs.CC", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "4d592133133ee57e12418432e5fd8c12db9cf146ba1d89e92d1b5b5c6c962021", "last_processed_at": "2026-02-21T13:39:29.014701+00:00", "links": {"abs_url": "https://arxiv.org/abs/2206.07571v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2206.07571v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "86c0eb06705696ea2c11203d7c3310cd3d67ba8093f71eb5a297f35db634275d", "submitted_date": "2022-06-15", "tags": ["cs.CC", "cs.IT", "decoder", "decoding", "lifted product", "quant-ph", "relevance:maybe"], "title": "Efficient decoding up to a constant fraction of the code length for asymptotically good quantum codes", "updated_date": "2022-10-25"}, {"abstract": "Quantum repeater is the key technology enabler for long-distance quantum communication. To date, most of the existing quantum repeater protocols are designed based on specific quantum codes or graph states. In this paper, we propose a general framework for all-photonic one-way quantum repeaters based on the measurement-based error correction, which can be adapted to any Calderbank-Shor-Steane codes including the recently discovered quantum low density parity check (QLDPC) codes. We present a novel decoding scheme, where the error correction process is carried out at the destination based on the accumulated data from the measurements made across the network. This procedure not only outperforms the conventional protocols with independent repeaters but also simplifies the local quantum operations at repeaters. As an example, we numerically show that the [[48,6,8]] generalized bicycle code (as a small but efficient QLDPC code) has an equally good performance while reducing the resources by at least an order of magnitude.", "arxiv_id": "2210.10071", "arxiv_version": "v1", "authors": ["Daoheng Niu", "Yuxuan Zhang", "Alireza Shabani", "Hassan Shapourian"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "537a41b7bf715a5a0fc1a51f048eed0bf95a2b7777f2ca24bedfa5213c332be5", "last_processed_at": "2026-02-21T13:39:30.904325+00:00", "links": {"abs_url": "https://arxiv.org/abs/2210.10071v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2210.10071v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "278615ee0890e175f8831f27570d057f1b1e051378d29245c66626cad8b3a010", "submitted_date": "2022-10-18", "tags": ["decoding", "quant-ph", "relevance:maybe"], "title": "All-photonic one-way quantum repeaters", "updated_date": "2022-10-18"}, {"abstract": "Quantum Error Correction (QEC) is an essential field of research towards the realization of large-scale quantum computers. On the theoretical side, a lot of effort is put into designing error-correcting codes that protect quantum data from errors, which inevitably happen due to the noisy nature of quantum hardware and quantum bits (qubits). Protecting data with an error-correcting code necessitates means to recover the original data, given a potentially corrupted data set-a task referred to as decoding. It is vital that decoding algorithms can recover error-free states in an efficient manner. While theoretical properties of recent QEC methods have been extensively studied, good techniques to analyze their performance in practically more relevant settings is still a widely unexplored area. In this work, we propose a set of software tools that allows to numerically experiment with so-called Quantum Low-Density Parity Check codes (QLDPC codes)-a broad class of codes, some of which have recently been shown to be asymptotically good. Based on that, we provide an implementation of a general decoder for QLDPC codes. On top of that, we propose an efficient heuristic decoder that tackles the runtime bottlenecks of the general QLDPC decoder while still maintaining comparable decoding performance. These tools eventually allow to confirm theoretical results around QLDPC codes in a more practical setting and showcase the value of software tools (in addition to theoretical considerations) for investigating codes for practical applications. The resulting tool, which is publicly available at https://github.com/lucasberent/qecc under the MIT license, is meant to provide a playground for the search for \"practically good\" quantum codes.", "arxiv_id": "2209.01180", "arxiv_version": "v1", "authors": ["Lucas Berent", "Lukas Burgholzer", "Robert Wille"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "beb3cc10ed45663df2636bb61be1594e62726d15ff00ba332473daed3f4073fe", "last_processed_at": "2026-02-21T13:39:31.827459+00:00", "links": {"abs_url": "https://arxiv.org/abs/2209.01180v1", "code_repo_urls": [], "doi": "10.1145/3566097.3567934", "pdf_url": "https://arxiv.org/pdf/2209.01180v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "002e1f72d6b3c2e611e9ebeec5c10649ee0762f1821f29ec9d62c2c05141d858", "submitted_date": "2022-09-02", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Software Tools for Decoding Quantum Low-Density Parity Check Codes", "updated_date": "2022-09-02"}, {"abstract": "The design of decoding algorithms is a significant technological component in the development of fault-tolerant quantum computers. Often design of quantum decoders is inspired by classical decoding algorithms, but there are no general principles for building quantum decoders from classical decoders. Given any pair of classical codes, we can build a quantum code using the hypergraph product, yielding a hypergraph product code. Here we show we can also lift the decoders for these classical codes. That is, given oracle access to a minimum weight decoder for the relevant classical codes, the corresponding $[[n,k,d]]$ quantum code can be efficiently decoded for any error of weight smaller than $(d-1)/2$. The quantum decoder requires only $O(k)$ oracle calls to the classical decoder and $O(n^2)$ classical resources. The lift and the correctness proof of the decoder have a purely algebraic nature that draws on the discovery of some novel homological invariants of the hypergraph product codespace. While the decoder works perfectly for adversarial errors, it is not suitable for more realistic stochastic noise models and therefore can not be used to establish an error correcting threshold.", "arxiv_id": "2105.02370", "arxiv_version": "v2", "authors": ["Armanda O. Quintavalle", "Earl T. Campbell"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "6460c8a5595b0c726843ffcc03837c3d6147dfd8937ef23855919555503cc5a9", "last_processed_at": "2026-02-21T13:39:32.992151+00:00", "links": {"abs_url": "https://arxiv.org/abs/2105.02370v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2105.02370v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "8c8c661b5eb3c6e7aa60ab15461c04624b44cfbdfce488e14aa985c5d94d8b99", "submitted_date": "2021-05-05", "tags": ["decoder", "decoding", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "ReShape: a decoder for hypergraph product codes", "updated_date": "2022-07-13"}, {"abstract": "Quantum error correction has recently been shown to benefit greatly from specific physical encodings of the code qubits. In particular, several researchers have considered the individual code qubits being encoded with the continuous variable GottesmanKitaev-Preskill (GKP) code, and then imposed an outer discrete-variable code such as the surface code on these GKP qubits. Under such a concatenation scheme, the analog information from the inner GKP error correction improves the noise threshold of the outer code. However, the surface code has vanishing rate and demands a lot of resources with growing distance. In this work, we concatenate the GKP code with generic quantum low-density parity-check (QLDPC) codes and demonstrate a natural way to exploit the GKP analog information in iterative decoding algorithms. We first show the noise thresholds for two lifted product QLDPC code families, and then show the improvements of noise thresholds when the iterative decoder - a hardware-friendly min-sum algorithm (MSA) - utilizes the GKP analog information. We also show that, when the GKP analog information is combined with a sequential update schedule for MSA, the scheme surpasses the well-known CSS Hamming bound for these code families. Furthermore, we observe that the GKP analog information helps the iterative decoder in escaping harmful trapping sets in the Tanner graph of the QLDPC code, thereby eliminating or significantly lowering the error floor of the logical error rate curves. Finally, we discuss new fundamental and practical questions that arise from this work on channel capacity under GKP analog information, and on improving decoder design and analysis.", "arxiv_id": "2111.07029", "arxiv_version": "v2", "authors": ["Nithin Raveendran", "Narayanan Rengaswamy", "Filip Rozpędek", "Ankur Raina", "Liang Jiang", "Bane Vasić"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5d8898550e9224704ba9411141e358bb1700b9de7647c244d3d060a3816c628c", "last_processed_at": "2026-02-21T13:39:34.391358+00:00", "links": {"abs_url": "https://arxiv.org/abs/2111.07029v2", "code_repo_urls": [], "doi": "10.22331/q-2022-07-20-767", "pdf_url": "https://arxiv.org/pdf/2111.07029v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "lifted product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "fe73eabe209c9eb5d4e35cdcd5fa5754b8c769979c0a985c0f0fb366a71c29e7", "submitted_date": "2021-11-13", "tags": ["cs.IT", "decoder", "decoding", "lifted product", "quant-ph", "relevance:maybe"], "title": "Finite Rate QLDPC-GKP Coding Scheme that Surpasses the CSS Hamming Bound", "updated_date": "2022-07-11"}, {"abstract": "We construct a new explicit family of good quantum low-density parity-check codes which additionally have linear time decoders. Our codes are based on a three-term chain $(\\mathbb{F}_2^{m\\times m})^V \\quad \\xrightarrow{δ^0}\\quad (\\mathbb{F}_2^{m})^{E} \\quad\\xrightarrow{δ^1} \\quad \\mathbb{F}_2^F$ where $V$ ($X$-checks) are the vertices, $E$ (qubits) are the edges, and $F$ ($Z$-checks) are the squares of a left-right Cayley complex, and where the maps are defined based on a pair of constant-size random codes $C_A,C_B:\\mathbb{F}_2^m\\to\\mathbb{F}_2^Δ$ where $Δ$ is the regularity of the underlying Cayley graphs. One of the main ingredients in the analysis is a proof of an essentially-optimal robustness property for the tensor product of two random codes.", "arxiv_id": "2206.07750", "arxiv_version": "v1", "authors": ["Irit Dinur", "Min-Hsiu Hsieh", "Ting-Chun Lin", "Thomas Vidick"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "2016c3bb383484073e514d11a5c56e39c7925e89054c9164a87ee0688819f3ff", "last_processed_at": "2026-02-21T13:39:35.228094+00:00", "links": {"abs_url": "https://arxiv.org/abs/2206.07750v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2206.07750v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "4124d16fc1769fb62b926e64a750a6353d02aa53f8fc4439c13235c4f1c9f0e0", "submitted_date": "2022-06-15", "tags": ["decoder", "quant-ph", "relevance:maybe"], "title": "Good Quantum LDPC Codes with Linear Time Decoders", "updated_date": "2022-06-15"}, {"abstract": "Recent developments have shown the existence of quantum low-density parity check (qLDPC) codes with constant rate and linear distance. A natural question concerns the efficient decodability of these codes. In this paper, we present a linear time decoder for the recent quantum Tanner codes construction of asymptotically good qLDPC codes, which can correct all errors of weight up to a constant fraction of the blocklength. Our decoder is an iterative algorithm which searches for corrections within constant-sized regions. At each step, the corrections are found by reducing a locally defined and efficiently computable cost function which serves as a proxy for the weight of the remaining error.", "arxiv_id": "2206.06557", "arxiv_version": "v1", "authors": ["Shouzhen Gu", "Christopher A. Pattison", "Eugene Tang"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "6c3b2c565973129da3acbbc32767fab02e2c97c13cc1eea94bd207ceb0e10299", "last_processed_at": "2026-02-21T13:39:35.935904+00:00", "links": {"abs_url": "https://arxiv.org/abs/2206.06557v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2206.06557v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "306c3d15fd18a80d8b7ff7c495579dbddbbf66281a3110d6dc6c79c9a8f892fd", "submitted_date": "2022-06-14", "tags": ["cs.IT", "decoder", "quant-ph", "relevance:maybe"], "title": "An efficient decoder for a linear distance quantum LDPC code", "updated_date": "2022-06-14"}, {"abstract": "Quantum errors are primarily detected and corrected using the measurement of syndrome information which itself is an unreliable step in practical error correction implementations. Typically, such faulty or noisy syndrome measurements are modeled as a binary measurement outcome flipped with some probability. However, the measured syndrome is in fact a discretized value of the continuous voltage or current values obtained in the physical implementation of the syndrome extraction. In this paper, we use this \"soft\" or analog information without the conventional discretization step to benefit the iterative decoders for decoding quantum low-density parity-check (QLDPC) codes. Syndrome-based iterative belief propagation decoders are modified to utilize the syndrome-soft information to successfully correct both data and syndrome errors simultaneously, without repeated measurements. We demonstrate the advantages of extracting the soft information from the syndrome in our improved decoders, not only in terms of comparison of thresholds and logical error rates for quasi-cyclic lifted-product QLDPC code families, but also for faster convergence of iterative decoders. In particular, the new BP decoder with noisy syndrome performs as good as the standard BP decoder under ideal syndrome.", "arxiv_id": "2205.02341", "arxiv_version": "v1", "authors": ["Nithin Raveendran", "Narayanan Rengaswamy", "Asit Kumar Pradhan", "Bane Vasić"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "8b3d2d36ec49131763a7a3b0e3bd8e9d9d20583b0e0ad69fdbedc63b65fdb9bc", "last_processed_at": "2026-02-21T13:39:36.434446+00:00", "links": {"abs_url": "https://arxiv.org/abs/2205.02341v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2205.02341v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "2fa7614f52e491b82d0470429bfe478b65543c41270b2d2ee8a078fc7e57897f", "submitted_date": "2022-05-04", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Soft Syndrome Decoding of Quantum LDPC Codes for Joint Correction of Data and Syndrome Errors", "updated_date": "2022-05-04"}, {"abstract": "Quantum low-density parity-check (qLDPC) codes are quantum stabilizer codes where each stabilizer acts on a constant number of qubits and each qubit is acted on by a constant number of stabilizers. We study qLDPC codes constructed from balanced products and lossless expanders. We found that assuming the existence of 2-sided lossless expander graphs with free group action, the resulting qLDPC codes have constant rate, linear distance, and linear time decoders.", "arxiv_id": "2203.03581", "arxiv_version": "v1", "authors": ["Ting-Chun Lin", "Min-Hsiu Hsieh"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "7f51fd3973995e95cc2eef91c4eff31b0b39e835cde69deadd7693d2e84004c3", "last_processed_at": "2026-02-21T13:39:37.027333+00:00", "links": {"abs_url": "https://arxiv.org/abs/2203.03581v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2203.03581v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "balanced product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0662aa9755b45f0994cbfab7fd85fe12fcac81567f041e889c053ed2b7aea93a", "submitted_date": "2022-03-07", "tags": ["balanced product", "decoder", "quant-ph", "relevance:maybe"], "title": "Good quantum LDPC codes with linear time decoder from lossless expanders", "updated_date": "2022-03-07"}, {"abstract": "We study the performance of medium-length quantum LDPC (QLDPC) codes in the depolarizing channel. Only degenerate codes with the maximal stabilizer weight much smaller than their minimum distance are considered. It is shown that with the help of OSD-like post-processing the performance of the standard belief propagation (BP) decoder on many QLDPC codes can be improved by several orders of magnitude. Using this new BP-OSD decoder we study the performance of several known classes of degenerate QLDPC codes including hypergraph product codes, hyperbicycle codes, homological product codes, and Haah&#x27;s cubic codes. We also construct several interesting examples of short generalized bicycle codes. Some of them have an additional property that their syndromes are protected by small BCH codes, which may be useful for the fault-tolerant syndrome measurement. We also propose a new large family of QLDPC codes that contains the class of hypergraph product codes, where one of the used parity-check matrices is square. It is shown that in some cases such codes have better performance than hypergraph product codes. Finally, we demonstrate that the performance of the proposed BP-OSD decoder for some of the constructed codes is better than for a relatively large surface code decoded by a near-optimal decoder.", "arxiv_id": "1904.02703", "arxiv_version": "v3", "authors": ["Pavel Panteleev", "Gleb Kalachev"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "64fc7a37e73cadabb919ca684eba4a0877c9d99eac6be240331e9975c3a859d9", "last_processed_at": "2026-02-21T13:39:37.655252+00:00", "links": {"abs_url": "https://arxiv.org/abs/1904.02703v3", "code_repo_urls": [], "doi": "10.22331/q-2021-11-22-585", "pdf_url": "https://arxiv.org/pdf/1904.02703v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "belief propagation", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "59c6422b172c200f4b5218b73563b1fec74106c5af579829cb504ef0bbb15204", "submitted_date": "2019-04-04", "tags": ["belief propagation", "cs.IT", "decoder", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Degenerate Quantum LDPC Codes With Good Finite Length Performance", "updated_date": "2021-11-12"}, {"abstract": "A quantum stabilizer code over GF$(q)$ corresponds to a classical additive code over GF$(q^2)$ that is self-orthogonal with respect to a symplectic inner product. We study the decoding of quantum low-density parity-check (LDPC) codes over binary finite fields GF$(q=2^l)$ by the sum-product algorithm, also known as belief propagation (BP). Conventionally, a message in a nonbinary BP for quantum codes over GF$(2^l)$ represents a probability vector over GF$(2^{2l})$, inducing high decoding complexity. In this paper, we explore the property of the symplectic inner product and show that scalar messages suffice for BP decoding of nonbinary quantum codes, rather than vector messages necessary for the conventional BP. Consequently, we propose a BP decoding algorithm for quantum codes over GF$(2^l)$ by passing scalar messages so that it has low computation complexity. The algorithm is specified in log domain by using log-likelihood ratios (LLRs) of the channel statistics to have a low implementation cost. Moreover, techniques such as message normalization or offset can be naturally applied in this algorithm to mitigate the effects of short cycles to improve BP performance. This is important for nonbinary quantum codes since they may have more short cycles compared to binary quantum codes. Several computer simulations are provided to demonstrate these advantages. The scalar-based strategy can also be used to improve the BP decoding of classical linear codes over GF$(2^l)$ with many short cycles.", "arxiv_id": "2104.00304", "arxiv_version": "v3", "authors": ["Ching-Yi Lai", "Kao-Yueh Kuo"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "45da554927dba57b94e99db79ba9b72ea7d905e0dbab1e5a35f4e6bd52916389", "last_processed_at": "2026-02-21T13:39:39.456219+00:00", "links": {"abs_url": "https://arxiv.org/abs/2104.00304v3", "code_repo_urls": [], "doi": "10.1109/TQE.2021.3113936", "pdf_url": "https://arxiv.org/pdf/2104.00304v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "38af9d7a0a16d457b2a8e97a2078b551392c85425bd807195909ceedfb8b9702", "submitted_date": "2021-04-01", "tags": ["belief propagation", "cs.IT", "decoding", "quant-ph", "relevance:maybe"], "title": "Log-domain decoding of quantum LDPC codes over binary finite fields", "updated_date": "2021-10-26"}, {"abstract": "Iterative decoders for finite length quantum low-density parity-check (QLDPC) codes are attractive because their hardware complexity scales only linearly with the number of physical qubits. However, they are impacted by short cycles, detrimental graphical configurations known as trapping sets (TSs) present in a code graph as well as symmetric degeneracy of errors. These factors significantly degrade the decoder decoding probability performance and cause so-called error floor. In this paper, we establish a systematic methodology by which one can identify and classify quantum trapping sets (QTSs) according to their topological structure and decoder used. The conventional definition of a TS from classical error correction is generalized to address the syndrome decoding scenario for QLDPC codes. We show that the knowledge of QTSs can be used to design better QLDPC codes and decoders. Frame error rate improvements of two orders of magnitude in the error floor regime are demonstrated for some practical finite-length QLDPC codes without requiring any post-processing.", "arxiv_id": "2012.15297", "arxiv_version": "v2", "authors": ["Nithin Raveendran", "Bane Vasić"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "0b5ba659dd4f8f515d26d79a34b4e0f520b2b2792a60591537bcbbbb5e7f24e5", "last_processed_at": "2026-02-21T13:39:40.970961+00:00", "links": {"abs_url": "https://arxiv.org/abs/2012.15297v2", "code_repo_urls": [], "doi": "10.22331/q-2021-10-14-562", "pdf_url": "https://arxiv.org/pdf/2012.15297v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "2d4a02e8f50e56d65965ce6fe8c25ddd8507d065b002a4f8741ef65f13b93637", "submitted_date": "2020-12-30", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Trapping Sets of Quantum LDPC Codes", "updated_date": "2021-10-07"}, {"abstract": "Hypergraph product codes are a class of constant-rate quantum low-density parity-check (LDPC) codes equipped with a linear-time decoder called small-set-flip (SSF). This decoder displays sub-optimal performance in practice and requires very large error correcting codes to be effective. In this work, we present new hybrid decoders that combine the belief propagation (BP) algorithm with the SSF decoder. We present the results of numerical simulations when codes are subject to independent bit-flip and phase-flip errors. We provide evidence that the threshold of these codes is roughly 7.5% assuming an ideal syndrome extraction, and remains close to 3% in the presence of syndrome noise. This result subsumes and significantly improves upon an earlier work by Grospellier and Krishna (arXiv:1810.03681). The low-complexity high-performance of these heuristic decoders suggests that decoding should not be a substantial difficulty when moving from zero-rate surface codes to constant-rate LDPC codes and gives a further hint that such codes are well-worth investigating in the context of building large universal quantum computers.", "arxiv_id": "2004.11199", "arxiv_version": "v2", "authors": ["Antoine Grospellier", "Lucien Grouès", "Anirudh Krishna", "Anthony Leverrier"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "d62d50ce98dd58217e141c08c24ff5dc1cca4cdd5c2f91347ef29ba484fc9b0a", "last_processed_at": "2026-02-21T13:39:41.828758+00:00", "links": {"abs_url": "https://arxiv.org/abs/2004.11199v2", "code_repo_urls": [], "doi": "10.22331/q-2021-04-15-432", "pdf_url": "https://arxiv.org/pdf/2004.11199v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation", "small-set-flip", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "28fef810b53168e9a51d786b58772aec5559e6dcf0c2c877d66c13ab475b670c", "submitted_date": "2020-04-23", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "hypergraph product", "quant-ph", "relevance:maybe", "small-set-flip"], "title": "Combining hard and soft decoders for hypergraph product codes", "updated_date": "2021-04-08"}, {"abstract": "Quantum LDPC codes are a promising direction for low overhead quantum computing. In this paper, we propose a generalization of the Union-Find decoder as adecoder for quantum LDPC codes. We prove that this decoder corrects all errors with weight up to An^α for some A, α &gt; 0 for different classes of quantum LDPC codes such as toric codes and hyperbolic codes in any dimension D \\geq 3 and quantum expander codes. To prove this result, we introduce a notion of covering radius which measures the spread of an error from its syndrome. We believe this notion could find application beyond the decoding problem. We also perform numerical simulations, which show that our Union-Find decoder outperforms the belief propagation decoder in the low error rate regime in the case of a quantum LDPC code with length 3600.", "arxiv_id": "2103.08049", "arxiv_version": "v1", "authors": ["Nicolas Delfosse", "Vivien Londe", "Michael Beverland"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f7bba94545e913d14d98793a453caec59a69148db1eafdec63a8eea0cd389cf7", "last_processed_at": "2026-02-21T13:39:42.598885+00:00", "links": {"abs_url": "https://arxiv.org/abs/2103.08049v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2103.08049v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding", "belief propagation", "union-find"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "a289a288377206d793a95bf51284f638716ab4a732230f2ffa77d77df1b3ee93", "submitted_date": "2021-03-14", "tags": ["belief propagation", "cs.IT", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant", "union-find"], "title": "Toward a Union-Find decoder for quantum LDPC codes", "updated_date": "2021-03-14"}, {"abstract": "Quantum error correction is necessary to protect logical quantum states and operations. However, no meaningful data protection can be made when the syndrome extraction is erroneous due to faulty measurement gates. Quantum data-syndrome (DS) codes are designed to protect the data qubits and syndrome bits concurrently. In this paper, we propose an efficient decoding algorithm for quantum DS codes with sparse check matrices. Based on a refined belief propagation (BP) decoding for stabilizer codes, we propose a DS-BP algorithm to handle the quaternary quantum data errors and binary syndrome bit errors. Moreover, a sparse quantum code may inherently be able to handle minor syndrome errors so that fewer redundant syndrome measurements are necessary. We demonstrate this with simulations on a quantum hypergraph-product code.", "arxiv_id": "2102.01984", "arxiv_version": "v1", "authors": ["Kao-Yueh Kuo", "I-Chun Chern", "Ching-Yi Lai"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "5e06aaec269590dc31122e00be66ef98301617e8903b9699db44859e20eb2027", "last_processed_at": "2026-02-21T13:39:43.272623+00:00", "links": {"abs_url": "https://arxiv.org/abs/2102.01984v1", "code_repo_urls": [], "doi": "10.1109/ISIT45174.2021.9518018", "pdf_url": "https://arxiv.org/pdf/2102.01984v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "3a7c9e17ec781753ee96e121e6988c33492e842bc022f1f9e0f5c1478b889b5f", "submitted_date": "2021-02-03", "tags": ["belief propagation", "cs.IT", "decoding", "quant-ph", "relevance:maybe"], "title": "Decoding of Quantum Data-Syndrome Codes via Belief Propagation", "updated_date": "2021-02-03"}, {"abstract": "We propose an error correction procedure based on a cellular automaton, the sweep rule, which is applicable to a broad range of codes beyond topological quantum codes. For simplicity, however, we focus on the three-dimensional (3D) toric code on the rhombic dodecahedral lattice with boundaries and prove that the resulting local decoder has a non-zero error threshold. We also numerically benchmark the performance of the decoder in the setting with measurement errors using various noise models. We find that this error correction procedure is remarkably robust against measurement errors and is also essentially insensitive to the details of the lattice and noise model. Our work constitutes a step towards finding simple and high-performance decoding strategies for a wide range of quantum low-density parity-check codes.", "arxiv_id": "2004.07247", "arxiv_version": "v2", "authors": ["Michael Vasmer", "Dan E. Browne", "Aleksander Kubica"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "22ccb08983d421fe11fd675a6976900efbb678d7313fc8ef6655ed934b57e8ed", "last_processed_at": "2026-02-21T13:39:45.803044+00:00", "links": {"abs_url": "https://arxiv.org/abs/2004.07247v2", "code_repo_urls": [], "doi": "10.1038/s41598-021-81138-2", "pdf_url": "https://arxiv.org/pdf/2004.07247v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "66e1ae963d5fbf43b984f8c9638d29533dcda98dfe26578417ceeee8839b4dda", "submitted_date": "2020-04-15", "tags": ["decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Cellular automaton decoders for topological quantum codes with noisy measurements and beyond", "updated_date": "2021-01-25"}, {"abstract": "We show that belief propagation combined with ordered statistics post-processing is a general decoder for quantum low density parity check codes constructed from the hypergraph product. To this end, we run numerical simulations of the decoder applied to three families of hypergraph product code: topological codes, fixed-rate random codes and a new class of codes that we call semi-topological codes. Our new code families share properties of both topological and random hypergraph product codes, with a construction that allows for a finely-controlled trade-off between code threshold and stabilizer locality. Our results indicate thresholds across all three families of hypergraph product code, and provide evidence of exponential suppression in the low error regime. For the Toric code, we observe a threshold in the range $9.9\\pm0.2\\%$. This result improves upon previous quantum decoders based on belief propagation, and approaches the performance of the minimum weight perfect matching algorithm. We expect semi-topological codes to have the same threshold as Toric codes, as they are identical in the bulk, and we present numerical evidence supporting this observation.", "arxiv_id": "2005.07016", "arxiv_version": "v2", "authors": ["Joschka Roffe", "David R. White", "Simon Burton", "Earl T. Campbell"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "dcad0fc7c51f8715e46c042507e0ff2074534159f860dfaa5fb6a64a5dfb28ff", "last_processed_at": "2026-02-21T13:39:46.157527+00:00", "links": {"abs_url": "https://arxiv.org/abs/2005.07016v2", "code_repo_urls": [], "doi": "10.1103/PhysRevResearch.2.043423", "pdf_url": "https://arxiv.org/pdf/2005.07016v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "belief propagation", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "9202d3b475ac3cfef694facdd52941f1afb7c3f2e48f31521ec72799842f2fe9", "submitted_date": "2020-05-14", "tags": ["belief propagation", "decoder", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Decoding Across the Quantum LDPC Code Landscape", "updated_date": "2020-12-29"}, {"abstract": "Constructing quantum LDPC codes with a minimum distance that grows faster than a square root of the length has been a major challenge of the field. With this challenge in mind, we investigate constructions that come from high-dimensional expanders, in particular Ramanujan complexes. These naturally give rise to very unbalanced quantum error correcting codes that have a large $X$-distance but a much smaller $Z$-distance. However, together with a classical expander LDPC code and a tensoring method that generalises a construction of Hastings and also the Tillich-Zemor construction of quantum codes, we obtain quantum LDPC codes whose minimum distance exceeds the square root of the code length and whose dimension comes close to a square root of the code length. When the ingredient is a 3-dimensional Ramanujan complex, we show that its 2-systole behaves like a square of the log of the complex size, which results in an overall quantum code of minimum distance $n^{1/2}\\log n$, and sets a new record for quantum LDPC codes. When we use a 2-dimensional Ramanujan complex, or the 2-skeleton of a 3-dimensional Ramanujan complex, we obtain a quantum LDPC code of minimum distance $n^{1/2}\\log^{1/2}n$. We then exploit the expansion properties of the complex to devise the first polynomial time algorithm that decodes above the square root barrier for quantum LDPC codes.", "arxiv_id": "2004.07935", "arxiv_version": "v1", "authors": ["Shai Evra", "Tali Kaufman", "Gilles Zémor"], "categories": ["quant-ph", "cs.IT", "math.CO"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b3f10f583a49a438d8f441a616f86c92c5ce96141911a7f391ecbc8f6698b168", "last_processed_at": "2026-02-21T13:39:46.736845+00:00", "links": {"abs_url": "https://arxiv.org/abs/2004.07935v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/2004.07935v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "c814dcc0b4a0898c0d7154384e91d2f871e6914dea96443951454f5b6aa97bb8", "submitted_date": "2020-04-16", "tags": ["cs.IT", "math.CO", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Decodable quantum LDPC codes beyond the $\\sqrt{n}$ distance barrier using high dimensional expanders", "updated_date": "2020-04-16"}, {"abstract": "We adapt a construction of Guth and Lubotzky [arXiv:1310.5555] to obtain a family of quantum LDPC codes with non-vanishing rate and minimum distance scaling like $n^{0.1}$ where $n$ is the number of physical qubits. Similarly as in [arXiv:1310.5555], our homological code family stems from hyperbolic 4-manifolds equipped with tessellations. The main novelty of this work is that we consider a regular tessellation consisting of hypercubes. We exploit this strong local structure to design and analyze an efficient decoding algorithm.", "arxiv_id": "1712.08578", "arxiv_version": "v2", "authors": ["Vivien Londe", "Anthony Leverrier"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "a9cdce241f32d1d41936c2e33334891f725dfce4922c3b3f4d2d50411959b31c", "last_processed_at": "2026-02-21T13:39:47.788986+00:00", "links": {"abs_url": "https://arxiv.org/abs/1712.08578v2", "code_repo_urls": [], "doi": "10.26421/QIC19.5-6", "pdf_url": "https://arxiv.org/pdf/1712.08578v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "c484aeff47edb4bbc49c53e3fb79fc8647f463e0119960defb917bfc55b86136", "submitted_date": "2017-12-22", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Golden codes: quantum LDPC codes built from regular tessellations of hyperbolic 4-manifolds", "updated_date": "2019-06-18"}, {"abstract": "Quantum low-density parity-check codes can be decoded using a syndrome based $\\mathrm{GF}(4)$ belief propagation decoder. However, the performance of this decoder is limited both by unavoidable $4$-cycles in the code&#x27;s factor graph and the degenerate nature of quantum errors. For the subclass of CSS codes, the number of $4$-cycles can be reduced by breaking an error into an $X$ and $Z$ component and decoding each with an individual $\\mathrm{GF}(2)$ based decoder. However, this comes at the expense of ignoring potential correlations between these two error components. We present a number of modified belief propagation decoders that address these issues. We propose a $\\mathrm{GF}(2)$ based decoder for CSS codes that reintroduces error correlations by reattempting decoding with adjusted error probabilities. We also propose the use of an augmented decoder, which has previously been suggested for classical binary low-density parity-check codes. This decoder iteratively reattempts decoding on factor graphs that have a subset of their check nodes duplicated. The augmented decoder can be based on a $\\mathrm{GF}(4)$ decoder for any code, a $\\mathrm{GF}(2)$ decoder for CSS code, or even a supernode decoder for a dual-containing CSS code. For CSS codes, we further propose a $\\mathrm{GF}(2)$ based decoder that combines the augmented decoder with error probability adjustment. We demonstrate the performance of these new decoders on a range of different codes, showing that they perform favorably compared to other decoders presented in literature.", "arxiv_id": "1903.07404", "arxiv_version": "v2", "authors": ["Alex Rigby", "JC Olivier", "Peter Jarvis"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "cc1ea628d237d49ab98c92f565aabfdb730776c48af5a4ba7fe3cb28d21e2050", "last_processed_at": "2026-02-21T13:39:48.216177+00:00", "links": {"abs_url": "https://arxiv.org/abs/1903.07404v2", "code_repo_urls": [], "doi": "10.1103/PhysRevA.100.012330", "pdf_url": "https://arxiv.org/pdf/1903.07404v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "decoding", "belief propagation"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "cc0b4dbb4e0c54956740ce077de8b2ba5508762b25da4ad188c949fa14e1f6d9", "submitted_date": "2019-03-18", "tags": ["belief propagation", "decoder", "decoding", "quant-ph", "relevance:maybe"], "title": "Modified belief propagation decoders for quantum low-density parity-check codes", "updated_date": "2019-05-22"}, {"abstract": "Given any two classical codes with parameters $[n_1,k,d_1]$ and $[n_2,k,d_2]$, we show how to construct a quantum subsystem code in 2-dimensions with parameters $[[N,K,D]]$ satisfying $N\\le 2n_1n_2$, $K=k$, and $D=\\min(d_1,d_2)$. These quantum codes are in the class of generalized Bacon-Shor codes introduced by Bravyi. We note that constructions of good classical codes can be used to construct quantum codes that saturate Bravyi&#x27;s bound $KD=O(N)$ on the code parameters of 2-dimensional subsystem codes. One of these good constructions uses classical expander codes. This construction has the additional advantage of a linear time quantum decoder based on the classical Sipser-Spielman flip decoder. Finally, while the subsystem codes we create do not have asymptotic thresholds, we show how they can be gauge-fixed to certain hypergraph product codes that do.", "arxiv_id": "1901.06319", "arxiv_version": "v3", "authors": ["Theodore J. Yoder"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f09b845de34230b34d6f25d5af93d996d7abe4c7e9f091e98bc811e052723768", "last_processed_at": "2026-02-21T13:39:48.691685+00:00", "links": {"abs_url": "https://arxiv.org/abs/1901.06319v3", "code_repo_urls": [], "doi": "10.1103/PhysRevA.99.052333", "pdf_url": "https://arxiv.org/pdf/1901.06319v3"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoder", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "4980efe080c382f41256d236d3526c9a1c2341722d7e8ace9f2ec61aa66266dd", "submitted_date": "2019-01-18", "tags": ["decoder", "hypergraph product", "quant-ph", "relevance:maybe"], "title": "Optimal quantum subsystem codes in 2-dimensions", "updated_date": "2019-05-22"}, {"abstract": "Belief-propagation (BP) decoders play a vital role in modern coding theory, but they are not suitable to decode quantum error-correcting codes because of a unique quantum feature called error degeneracy. Inspired by an exact mapping between BP and deep neural networks, we train neural BP decoders for quantum low-density parity-check (LDPC) codes with a loss function tailored to error degeneracy. Training substantially improves the performance of BP decoders for all families of codes we tested and may solve the degeneracy problem which plagues the decoding of quantum LDPC codes.", "arxiv_id": "1811.07835", "arxiv_version": "v2", "authors": ["Ye-Hua Liu", "David Poulin"], "categories": ["quant-ph", "cond-mat.stat-mech"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "11eeec4db208a8e30cb9df711ec2176bac173033f582525e3b2f11050b47e7ac", "last_processed_at": "2026-02-21T13:39:49.889856+00:00", "links": {"abs_url": "https://arxiv.org/abs/1811.07835v2", "code_repo_urls": [], "doi": "10.1103/PhysRevLett.122.200501", "pdf_url": "https://arxiv.org/pdf/1811.07835v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "4b61ea1428b31391a236b48660ec2de3207c3bc73177fc1f7aa6fb1c2182e0d4", "submitted_date": "2018-11-19", "tags": ["cond-mat.stat-mech", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Neural Belief-Propagation Decoders for Quantum Error-Correcting Codes", "updated_date": "2019-05-07"}, {"abstract": "Hypergraph product codes introduced by Tillich and Zémor are a class of quantum LDPC codes with constant rate and distance scaling with the square-root of the block size. Quantum expander codes, a subclass of these codes, can be decoded using the linear time small-set-flip algorithm of Leverrier, Tillich and Zémor. In this paper, we numerically estimate the performance for the hypergraph product codes under independent bit and phase flip noise. We focus on two families of hypergraph product codes. The first family has rate $1/61 \\sim 1.6\\%$, has qubits of weight $10$ or $12$ and stabilizers of weight $11$. We report a threshold near $4.6\\%$ for the small-set-flip decoder. We also show that for similar rate, the performance of the hypergraph product is better than the performance of the toric code as soon as we deal with more than $500$ logical qubits and that for $3600$ logical qubits, the logical error rate for the hypergraph product code is several orders of magnitude smaller. The second family has rate $0.2$, qubits of weight $10$ and $20$ and stabilizers of weight $15$. We report a threshold near $2\\%$ for the small-set-flip decoder.", "arxiv_id": "1810.03681", "arxiv_version": "v2", "authors": ["Antoine Grospellier", "Anirudh Krishna"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "f1e6a83060f71beb876e927bc07e34b4ff88231cfa3bd62acdd0487f5747b277", "last_processed_at": "2026-02-21T13:39:50.919529+00:00", "links": {"abs_url": "https://arxiv.org/abs/1810.03681v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/1810.03681v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "small-set-flip", "hypergraph product"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "0364ed0fdfe09c936aaa0c07b3e1b49d64dc019bc9817068cc6e70f3f1c55348", "submitted_date": "2018-10-08", "tags": ["decoder", "hypergraph product", "quant-ph", "quantum ldpc", "relevance:relevant", "small-set-flip"], "title": "Numerical study of hypergraph product codes", "updated_date": "2019-05-02"}, {"abstract": "We study analytically and numerically decoding properties of finite rate hypergraph-product quantum LDPC codes obtained from random (3,4)-regular Gallager codes, with a simple model of independent X and Z errors. Several non-trival lower and upper bounds for the decodable region are constructed analytically by analyzing the properties of the homological difference, equal minus the logarithm of the maximum-likelihood decoding probability for a given syndrome. Numerical results include an upper bound for the decodable region from specific heat calculations in associated Ising models, and a minimum weight decoding threshold of approximately 7%.", "arxiv_id": "1804.01950", "arxiv_version": "v2", "authors": ["Alexey A. Kovalev", "Sanjay Prabhakar", "Ilya Dumer", "Leonid P. Pryadko"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b674cb48244976e11cf2ac0af3dfc28aac18cd1c7df5eb2f50a3d31bdf947361", "last_processed_at": "2026-02-21T13:39:51.613541+00:00", "links": {"abs_url": "https://arxiv.org/abs/1804.01950v2", "code_repo_urls": [], "doi": "10.1103/PhysRevA.97.062320", "pdf_url": "https://arxiv.org/pdf/1804.01950v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "d93d57ec920e805c52773b2690b51da4f915ed74f3be26624614e31622382cb1", "submitted_date": "2018-04-05", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Numerical and analytical bounds on threshold error rates for hypergraph-product codes", "updated_date": "2018-06-13"}, {"abstract": "We show that quantum expander codes, a constant-rate family of quantum LDPC codes, with the quasi-linear time decoding algorithm of Leverrier, Tillich and Zémor can correct a constant fraction of random errors with very high probability. This is the first construction of a constant-rate quantum LDPC code with an efficient decoding algorithm that can correct a linear number of random errors with a negligible failure probability. Finding codes with these properties is also motivated by Gottesman&#x27;s construction of fault tolerant schemes with constant space overhead. In order to obtain this result, we study a notion of $α$-percolation: for a random subset $W$ of vertices of a given graph, we consider the size of the largest connected $α$-subset of $W$, where $X$ is an $α$-subset of $W$ if $|X \\cap W| \\geq α|X|$.", "arxiv_id": "1711.08351", "arxiv_version": "v2", "authors": ["Omar Fawzi", "Antoine Grospellier", "Anthony Leverrier"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "9d9f91735cf23d045b82552d4811237310d9956e808ce65b15146e69ca7d949b", "last_processed_at": "2026-02-21T13:39:51.969337+00:00", "links": {"abs_url": "https://arxiv.org/abs/1711.08351v2", "code_repo_urls": [], "doi": "10.1145/3188745.3188886", "pdf_url": "https://arxiv.org/pdf/1711.08351v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "33ecde0bc34ac47d874d08b7f78787655df4a214839fd1860566e9fc9fc00315", "submitted_date": "2017-11-22", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Efficient decoding of random errors for quantum expander codes", "updated_date": "2018-03-25"}, {"abstract": "Quantum cryptography via key distribution mechanisms that utilize quantum entanglement between sender-receiver pairs will form the basis of future large-scale quantum networks. A key engineering challenge in such networks will be the ability to correct for decoherence effects in the distributed entanglement resources. It is widely believed that sophisticated quantum error correction codes, such as quantum low-density parity-check (LDPC) codes, will be pivotal in such a role. However, recently the importance of the channel mismatch effect in degrading the performance of deployed quantum LDPC codes has been pointed out. In this work we help remedy this situation by proposing new quantum LDPC decoding strategies that can significantly reduce performance degradation by as much as $50\\%$. Our new strategies for the quantum LDPC decoder are based on previous insights from classical LDPC decoders in mismatched channels, where an asymmetry in performance is known as a function of the estimated channel noise. We show how similar asymmetries carry over to the quantum depolarizing channel, and how an estimate of the depolarization flip parameter weighted to larger values leads to significant performance improvement.", "arxiv_id": "1204.4223", "arxiv_version": "v2", "authors": ["Yixuan Xie", "Jun Li", "Robert Malaney", "Jinhong Yuan"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b602bc71a93fa6e25db8b7843d7d6c67e958a1faa90eacd567313914f19342b3", "last_processed_at": "2026-02-21T13:39:52.221452+00:00", "links": {"abs_url": "https://arxiv.org/abs/1204.4223v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/1204.4223v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoder", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "354aea7928fbf4bab81b8f23869b3701d7c6876309167a33e672450a4565e8f0", "submitted_date": "2012-04-18", "tags": ["cs.IT", "decoder", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Improved Quantum LDPC Decoding Strategies For The Misidentified Quantum Depolarizing Channel", "updated_date": "2015-05-13"}, {"abstract": "We present an efficient decoding algorithm for constant rate quantum hypergraph-product LDPC codes which provably corrects adversarial errors of weight $Ω(\\sqrt{n})$ for codes of length $n$. The algorithm runs in time linear in the number of qubits, which makes its performance the strongest to date for linear-time decoding of quantum codes. The algorithm relies on expanding properties, not of the quantum code&#x27;s factor graph directly, but of the factor graph of the original classical code it is constructed from.", "arxiv_id": "1504.00822", "arxiv_version": "v1", "authors": ["Anthony Leverrier", "Jean-Pierre Tillich", "Gilles Zémor"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "61ebc9351495d5464923f6469bfa9dc068f94e4c190719e428a06bb0ee73b20f", "last_processed_at": "2026-02-21T13:39:52.565093+00:00", "links": {"abs_url": "https://arxiv.org/abs/1504.00822v1", "code_repo_urls": [], "doi": "10.1109/FOCS.2015.55", "pdf_url": "https://arxiv.org/pdf/1504.00822v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.35, "label": "maybe", "matched_keywords": ["decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "cce9ec44e8201a3525d6d54d929781c94b32e95d874fd630dd2798de53dca8b1", "submitted_date": "2015-04-03", "tags": ["cs.IT", "decoding", "quant-ph", "relevance:maybe"], "title": "Quantum Expander Codes", "updated_date": "2015-04-03"}, {"abstract": "We study the decoding transition for quantum error correcting codes with the help of a mapping to random-bond Wegner spin models. Families of quantum low density parity-check (LDPC) codes with a finite decoding threshold lead to both known models (e.g., random bond Ising and random plaquette $\\Z2$ gauge models) as well as unexplored earlier generally non-local disordered spin models with non-trivial phase diagrams. The decoding transition corresponds to a transition from the ordered phase by proliferation of extended defects which generalize the notion of domain walls to non-local spin models. In recently discovered quantum LDPC code families with finite rates the number of distinct classes of such extended defects is exponentially large, corresponding to extensive ground state entropy of these codes. Here, the transition can be driven by the entropy of the extended defects, a mechanism distinct from that in the local spin models where the number of defect types (domain walls) is always finite.", "arxiv_id": "1311.7688", "arxiv_version": "v2", "authors": ["Alexey A. Kovalev", "Leonid P. Pryadko"], "categories": ["quant-ph", "cond-mat.stat-mech"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "16c9f3ed37b93f59c5a112f772bceaf078ee872d7035fb1ab7ab7a0e571b5d99", "last_processed_at": "2026-02-21T13:39:53.040126+00:00", "links": {"abs_url": "https://arxiv.org/abs/1311.7688v2", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/1311.7688v2"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "66383006040d5fbb81770aee992d1062e386334c4b21b3eb7f0bbdd5bf595b2f", "submitted_date": "2013-11-29", "tags": ["cond-mat.stat-mech", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Spin glass reflection of the decoding transition for quantum error correcting codes", "updated_date": "2014-02-10"}, {"abstract": "As in classical coding theory, quantum analogues of low-density parity-check (LDPC) codes have offered good error correction performance and low decoding complexity by employing the Calderbank-Shor-Steane (CSS) construction. However, special requirements in the quantum setting severely limit the structures such quantum codes can have. While the entanglement-assisted stabilizer formalism overcomes this limitation by exploiting maximally entangled states (ebits), excessive reliance on ebits is a substantial obstacle to implementation. This paper gives necessary and sufficient conditions for the existence of quantum LDPC codes which are obtainable from pairs of identical LDPC codes and consume only one ebit, and studies the spectrum of attainable code parameters.", "arxiv_id": "1108.0679", "arxiv_version": "v4", "authors": ["Yuichiro Fujiwara", "Vladimir D. Tonchev"], "categories": ["cs.IT", "math.CO", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "b3e2d4c8abf52206e93714eeeeb2b2816cf02e5fc8960cee8960e07647f311ed", "last_processed_at": "2026-02-21T13:39:53.262049+00:00", "links": {"abs_url": "https://arxiv.org/abs/1108.0679v4", "code_repo_urls": [], "doi": "10.1109/TIT.2013.2247461", "pdf_url": "https://arxiv.org/pdf/1108.0679v4"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "b477bb615dd4bb043c43c23ab201a4cf17d31ea0f12b6c28c312b0de5553046e", "submitted_date": "2011-08-02", "tags": ["cs.IT", "decoding", "math.CO", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "A characterization of entanglement-assisted quantum low-density parity-check codes", "updated_date": "2012-10-07"}, {"abstract": "Due to their fast decoding algorithms, quantum generalizations of low-density parity check, or LDPC, codes have been investigated as a solution to the problem of decoherence in fragile quantum states. However, the additional twisted inner product requirements of quantum stabilizer codes force four-cycles and eliminate the possibility of randomly generated quantum LDPC codes. Moreover, the classes of quantum LDPC codes discovered thus far generally have unknown or small minimum distance, or a fixed rate. This paper presents several new classes of quantum LDPC codes constructed from finite projective planes. These codes have rates that increase with the block length $n$ and minimum weights proportional to $n^{1/2}$.", "arxiv_id": "1207.0732", "arxiv_version": "v1", "authors": ["Jacob Farinholt"], "categories": ["quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "09de30d254b369130186b01a717ade891b6aff3817be2840747f353b9ff9ce18", "last_processed_at": "2026-02-21T13:39:53.549013+00:00", "links": {"abs_url": "https://arxiv.org/abs/1207.0732v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/1207.0732v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "752efa77c35f4bb6a3bad55787f11b5b9d00c074796a17fca465ccffcd2389ec", "submitted_date": "2012-07-03", "tags": ["decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "Quantum LDPC Codes Constructed from Point-Line Subsets of the Finite Projective Plane", "updated_date": "2012-07-03"}, {"abstract": "We generalize a construction of non-binary quantum LDPC codes over $\\F_{2^m}$ due to \\cite{KHIS11a} and apply it in particular to toric codes. We obtain in this way not only codes with better rates than toric codes but also improve dramatically the performance of standard iterative decoding. Moreover, the new codes obtained in this fashion inherit the distance properties of the underlying toric codes and have therefore a minimum distance which grows as the square root of the length of the code for fixed $m$.", "arxiv_id": "1202.3338", "arxiv_version": "v1", "authors": ["Iryna Andriyanova", "Denise Maurice", "Jean-Pierre Tillich"], "categories": ["quant-ph", "cs.IT"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "73c70e32b7061b2bb839ef7496c3bad808ab75d864df61dba399a5d6df0622c2", "last_processed_at": "2026-02-21T13:39:54.172655+00:00", "links": {"abs_url": "https://arxiv.org/abs/1202.3338v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/1202.3338v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "quant-ph", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding"], "rationale": "Fallback extraction from abstract only (OpenAI key unavailable)."}, "source_hash": "e7c0d78a1ae165dfce6e88740edcc090ef26c646d0bc4e0be9c1ae4aad4c64c7", "submitted_date": "2012-02-15", "tags": ["cs.IT", "decoding", "quant-ph", "quantum ldpc", "relevance:relevant"], "title": "New constructions of CSS codes obtained by moving to higher alphabets", "updated_date": "2012-02-15"}, {"abstract": "In this work we probe the impact of channel estimation on the performance of quantum LDPC codes. Our channel estimation is based on an optimal estimate of the relevant decoherence parameter via its quantum Fisher information. Using state-of-the art quantum LDPC codes designed for the quantum depolarization channel, and utilizing various quantum probes with different entanglement properties, we show how the performance of such codes can deteriorate by an order of magnitude when optimal channel identification is fed into a belief propagation decoding algorithm. Our work highlights the importance in quantum communications of a viable channel identification campaign prior to decoding, and highlights the trade-off between entanglement consumption and quantum LDPC code performance.", "arxiv_id": "1202.0357", "arxiv_version": "v1", "authors": ["Yixuan Xie", "Jun Li", "Robert Malaney", "Jinhong Yuan"], "categories": ["cs.IT", "quant-ph"], "decoder": {"algorithm_outline": [], "complexity_claims": [], "decoder_family": null, "high_level_description": "Unknown / not specified from available text.", "implementation_notes": [], "key_ideas": [], "name": null}, "extraction_hash": "32bf52f45ca540fc31a996d64c4600e761222e6d1ae66dadb22568e969db0462", "last_processed_at": "2026-02-21T13:39:54.524958+00:00", "links": {"abs_url": "https://arxiv.org/abs/1202.0357v1", "code_repo_urls": [], "doi": null, "pdf_url": "https://arxiv.org/pdf/1202.0357v1"}, "missing_fields": ["decoder.name", "decoder.algorithm_outline", "decoder.complexity_claims", "performance_claims.thresholds", "performance_claims.runtime_scaling_claims", "simulations", "links.code_repo_urls"], "primary_category": "cs.IT", "relevance": {"confidence": 0.55, "label": "relevant", "matched_keywords": ["quantum ldpc", "decoding", "belief
