arxiv:
  base_url: "http://export.arxiv.org/api/query"
  rate_limit_seconds: 3.2
  retries: 3
  max_results_per_query: 100
  user_agent: "qldpcwatch/0.1 (+https://github.com/your-org/your-repo)"

queries:
  - expression: 'abs:"quantum ldpc" AND (abs:decode OR abs:decoding OR abs:decoder)'
  - expression: 'abs:"quantum low-density parity-check" AND (abs:decode OR abs:decoding OR abs:decoder)'
  - expression: 'abs:"hypergraph product" AND (abs:decode OR abs:decoding OR abs:decoder)'
  - expression: 'abs:"balanced product" AND (abs:decode OR abs:decoding OR abs:decoder)'
  - expression: 'abs:"lifted product" AND (abs:decode OR abs:decoding OR abs:decoder)'
  - expression: 'abs:"belief propagation" AND (abs:"quantum ldpc" OR abs:"quantum low-density parity-check")'
  - expression: '(abs:"small-set-flip" OR abs:SSF OR abs:"union-find" OR abs:MWPM) AND (abs:"quantum ldpc" OR abs:"quantum low-density parity-check")'

filters:
  categories:
    - quant-ph
    - cs.IT
    - math.IT
    - cs.DS

openai:
  default_model: "gpt-5"
  max_text_chars: 120000

site:
  enabled: true
